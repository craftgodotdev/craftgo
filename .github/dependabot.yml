version: 2
updates:
  # Root Go module — one grouped PR per week instead of one per dependency.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns:
          - "*"

  # GitHub Actions referenced by the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Docs site (VitePress) npm dependencies.
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    groups:
      docs:
        patterns:
          - "*"
