name: Deploy Docs

# Builds the VitePress site in docs/ and publishes it to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment →
# Source: "GitHub Actions". No gh-pages branch needed.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# GITHUB_TOKEN permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build (base = /craftgo/)
        run: npm run build
      - name: Disable Jekyll
        run: touch .vitepress/dist/.nojekyll
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
