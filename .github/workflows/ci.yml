name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"
          cache: true

      # ---- lint -------------------------------------------------------------
      - name: vet
        run: go vet ./...

      - name: fmt-check
        run: |
          diff=$(gofmt -l -s .)
          if [ -n "$diff" ]; then
            echo "unformatted files:"; echo "$diff"; exit 1
          fi

      # ---- build ------------------------------------------------------------
      - name: build root (CLI + LSP)
        run: go build ./...

      - name: build submodules
        run: |
          set -e
          for d in example/todo example/upload example/raw example/ecommerce \
                   tests/e2e/matrix; do
            echo "→ build $d"
            (cd "$d" && go build ./...)
          done

      # ---- generate + drift gate -------------------------------------------
      # Regenerate every example / e2e fixture from current source. Any
      # diff against the committed output is a codegen regression.
      - name: generate
        run: |
          set -e
          for d in example/todo example/upload example/raw example/ecommerce; do
            echo "→ gen $d"
            go run ./cmd/craftgo gen -f "$d/design" -c "$d"
          done
          for d in tests/e2e/matrix; do
            echo "→ gen $d"
            go run ./cmd/craftgo gen "$d/design"
          done

      - name: drift gate (gen output must match committed)
        run: |
          if ! git diff --exit-code; then
            echo "::error::generated files drifted from committed output — run \`make gen-all\` and commit the diff"
            exit 1
          fi

      # ---- test -------------------------------------------------------------
      # Core (lexer / parser / ast / semantic) is the language-shape
      # surface. Race detector + coverage profile collected for inspection,
      # but no enforced threshold — many helpers in internal/ast are
      # cross-package (used by parser/semantic/codegen tests) and per-
      # package coverage under-counts them, producing noisy false misses.
      - name: test core
        run: |
          go test -race -count=1 -coverprofile=core.cov -covermode=atomic \
            ./internal/lexer/... \
            ./internal/parser/... \
            ./internal/ast/... \
            ./internal/semantic/...
          go tool cover -func=core.cov | tail -20

      # Everything else: codegen / lsp / config / format / idents /
      # pkg/* / cmd/*. Drift gate above is the primary signal for codegen;
      # race detector covers concurrency.
      - name: test rest (root module)
        run: |
          go test -race -count=1 \
            ./internal/codegen/... \
            ./internal/lsp/... \
            ./internal/idents/... \
            ./internal/errcat/... \
            ./internal/strfmt/... \
            ./internal/format/... \
            ./internal/config/... \
            ./internal/bench/... \
            ./pkg/... \
            ./cmd/...

      - name: test e2e orchestrator
        run: go test -count=1 ./tests/e2e/...

      - name: test submodules
        run: |
          set -e
          for d in example/todo example/upload example/raw example/ecommerce \
                   tests/e2e/matrix; do
            echo "→ test $d"
            (cd "$d" && go test -count=1 ./...)
          done
