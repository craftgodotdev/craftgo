name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test core with coverage
        run: |
          go test -race -coverprofile=core.cov -covermode=atomic \
            ./internal/lexer/... \
            ./internal/parser/... \
            ./internal/ast/... \
            ./internal/semantic/...
      - name: enforce 100% line coverage on core
        run: |
          go tool cover -func=core.cov | tee coverage.txt
          fail=0
          while IFS= read -r line; do
            case "$line" in
              total:*) continue ;;
            esac
            pct=$(echo "$line" | awk '{print $NF}')
            if [ "$pct" != "100.0%" ]; then
              echo "❌ missing coverage: $line"
              fail=1
            fi
          done < coverage.txt
          exit $fail
