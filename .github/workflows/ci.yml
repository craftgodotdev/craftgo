name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same branch / PR to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint, vulnerability scan, and the codegen drift gate. All OS-independent,
  # so they run once on Linux; the cross-OS suite is the `test` job below.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # single source of truth for the Go version
          cache: true

      - name: vet
        run: go vet ./...

      - name: fmt-check
        run: |
          diff=$(gofmt -l -s .)
          if [ -n "$diff" ]; then
            echo "unformatted files:"; echo "$diff"; exit 1
          fi

      # Fails on a known vulnerability that the code actually reaches (call-graph
      # analysis); advisory-only findings in unused code do not break the build.
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: build root (CLI + LSP)
        run: go build ./...

      - name: build submodules
        run: |
          set -e
          for d in example/todo example/upload example/raw example/ecommerce \
                   tests/e2e/matrix; do
            echo "→ build $d"
            (cd "$d" && go build ./...)
          done

      # Regenerate every example / e2e fixture from current source; any diff
      # against the committed output is a codegen regression.
      - name: generate
        run: |
          set -e
          for d in example/todo example/upload example/raw example/ecommerce; do
            echo "→ gen $d"
            go run ./cmd/craftgo gen -f "$d/design" -c "$d"
          done
          for d in tests/e2e/matrix; do
            echo "→ gen $d"
            go run ./cmd/craftgo gen "$d/design"
          done

      - name: drift gate (gen output must match committed)
        run: |
          if ! git diff --exit-code; then
            echo "::error::generated files drifted from committed output — run \`make gen-all\` and commit the diff"
            exit 1
          fi

  # The project ships binaries for Linux, macOS, and Windows, so the suite runs
  # on each — catching path / file / line-ending bugs a Linux-only run misses.
  # The race detector needs a C toolchain the Windows runner lacks, so it is
  # enabled on Linux/macOS only.
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, race: "-race" }
          - { os: macos-latest, race: "-race" }
          - { os: windows-latest, race: "" }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash # Git Bash on Windows, so the loops below work everywhere
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build root + submodules
        run: |
          set -e
          go build ./...
          for d in example/todo example/upload example/raw example/ecommerce \
                   tests/e2e/matrix; do
            (cd "$d" && go build ./...)
          done

      - name: test core (lexer / parser / ast / semantic)
        run: |
          go test ${{ matrix.race }} -count=1 \
            ./internal/lexer/... ./internal/parser/... \
            ./internal/ast/... ./internal/semantic/...

      - name: test rest (root module)
        run: |
          go test ${{ matrix.race }} -count=1 \
            ./internal/codegen/... ./internal/lsp/... ./internal/idents/... \
            ./internal/errcat/... ./internal/strfmt/... ./internal/format/... \
            ./internal/config/... ./internal/bench/... ./pkg/... ./cmd/...

      - name: test e2e orchestrator
        run: go test -count=1 ./tests/e2e/...

      - name: test submodules
        run: |
          set -e
          for d in example/todo example/upload example/raw example/ecommerce \
                   tests/e2e/matrix; do
            echo "→ test $d"
            (cd "$d" && go test ${{ matrix.race }} -count=1 ./...)
          done
