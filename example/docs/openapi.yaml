        sku:
          $ref: '#/components/schemas/SkuCode'
        unitCents:
          $ref: '#/components/schemas/Cents'
      required:
      - productId
      - sku
      - quantity
      - unitCents
      type: object
    ListOrdersReq:
      description: |-
        ListOrdersReq mirrors shared.Pagination's field set locally
        because v1's query binder doesn't auto-resolve cross-package
        request types — see users.ListUsersReq for the full rationale.
      properties:
        cursor:
          nullable: true
          type: string
        limit:
          type: integer
      required:
      - limit
      type: object
    ListOrdersReqQuery:
      properties:
        cursor:
          nullable: true
          type: string
        limit:
          type: integer
      required:
      - limit
      type: object
    ListOrdersRespBody:
      $ref: '#/components/schemas/OrderList'
    ListProjectsReq:
      description: |-
        ListProjectsReq mirrors shared.Pagination — see the
        users.ListUsersReq comment for the rationale.
      properties:
        cursor:
          nullable: true
          type: string
        limit:
          type: integer
      required:
      - limit
      type: object
    ListProjectsReqQuery:
      properties:
        cursor:
          nullable: true
          type: string
        limit:
          type: integer
      required:
      - limit
      type: object
    ListProjectsRespBody:
      $ref: '#/components/schemas/ProjectList'
    ListSuspendedUsersReqQuery:
      properties:
        cursor:
          nullable: true
          type: string
        limit:
          type: integer
      required:
      - limit
      type: object
    ListSuspendedUsersRespBody:
      $ref: '#/components/schemas/UserList'
    ListTasksReq:
      description: |-
        ListTasksReq is the LIST + EXTRA FILTER pattern: re-declares the
        pagination contract inline (cross-package mixin would render the
        trailing-segment without its package prefix in v1, so this is the
        idiomatic alternative when a list endpoint needs more than just
        cursor + limit) and adds a `projectId` query-bound filter.

        The verb is GET and `projectId` has no explicit binding
        decorator, so codegen auto-binds it as a query parameter.
      properties:
        cursor:
          nullable: true
          type: string
        limit:
          type: integer
        projectId:
          nullable: true
          type: string
      required:
      - limit
      type: object
    ListTasksReqQuery:
      properties:
        cursor:
          nullable: true
          type: string
        limit:
          type: integer
        projectId:
          nullable: true
          type: string
      required:
      - limit
      type: object
    ListTasksRespBody:
      $ref: '#/components/schemas/TaskList'
    ListUsersReq:
      description: |-
        ListUsersReq mirrors shared.Pagination's field set. The v1 query
        binder resolves field-by-name only against types in the same DSL
        package as the service — using shared.Pagination directly leaves
        `cursor` / `limit` unbound at request time. Keeping a local copy
        is the idiomatic workaround until cross-package query binding
        lands; the field shape stays canonical so the wire contract is
        indistinguishable from the shared reference.
      properties:
        cursor:
          nullable: true
          type: string
        limit:
          type: integer
      required:
      - limit
      type: object
    ListUsersReqQuery:
      properties:
        cursor:
          nullable: true
          type: string
        limit:
          type: integer
      required:
      - limit
      type: object
    ListUsersRespBody:
      $ref: '#/components/schemas/UserList'
    Longitude:
      type: number
    MaintenanceWindowErr:
      description: ServiceUnavailable error response (HTTP 503).
      properties:
        estimatedEndAt:
          type: string
        reason:
          $ref: '#/components/schemas/MaintenanceWindowReason'
      type: object
    MaintenanceWindowReason:
      enum:
      - ScheduledMaintenance
      - IncidentRecovery
      - CapacityExpansion
      type: string
    MalformedRequestErr:
      description: BadRequest error response (HTTP 400).
      properties:
        column:
          type: integer
        detail:
          type: string
        line:
          type: integer
      type: object
    NonEmptyID:
      type: string
    OkResp:
      description: |-
        OkResp is the conventional response shape for write endpoints
        that don't return a domain entity. Reusing it across services
        keeps the wire vocabulary tight: clients learn ONE success
        envelope, not one per service.
      properties:
        ok:
          type: boolean
      required:
      - ok
      type: object
    Order:
      deprecated: true
      description: |-
        Order is the deeply-nested aggregate root. Demonstrates EVERY
        presence-state and almost every validator on its 14 fields.

        `@deprecated` at the type level surfaces in the generated Go as
        `// Deprecated: ...` so `staticcheck` flags every read of the
        type — useful for migrating clients off a legacy aggregate while
        keeping the schema available during the transition window.

        Scalar types (OrderID, CurrencyCode, ...) are referenced by name
        — every field of that scalar type inherits the validators from
        the scalar's declaration, so the field-level decorator chain
        stays focused on PRESENCE rules (`@required`, `@nullable`).
      properties:
        auditedBy:
          $ref: '#/components/schemas/UserRef'
        cosignedBy:
          $ref: '#/components/schemas/UserRef'
        createdAt:
          description: |-
            Required ISO timestamp at the wrapper level. Top-level
            datetime is always required for audit trails.
          type: string
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        customer:
          $ref: '#/components/schemas/Customer'
        id:
          $ref: '#/components/schemas/OrderID'
        items:
          description: |-
            Required slice of nested LineItems with bound. @minItems
            forbids "empty order"; @maxItems caps explosion attacks.
          items:
            $ref: '#/components/schemas/LineItem'
          type: array
        metadata:
          additionalProperties:
            $ref: '#/components/schemas/SafeURL'
          description: |-
            MAP-OF-SCALAR — both the key and the value are scalars.
            Codegen emits two per-element loops:

              for k := range v.Metadata     { /* Tag's @minLength + @maxLength + @pattern on k   */ }
              for _, val := range v.Metadata { /* SafeURL's @format(url) + @maxLength on val      */ }

            So the wire shape `{"primary": "https://...", ...}` rejects
            both an upper-case key (fails Tag pattern) and a non-URL
            value (fails SafeURL format) at the validator boundary.
          nullable: true
          type: object
        notes:
          description: |-
            Optional string with maxLength validator. When omitted the
            field stays absent on the wire (`omitempty`).
          nullable: true
          type: string
        payment:
          $ref: '#/components/schemas/Payment'
        shippedAt:
          description: |-
            4-STATE PRESENCE: optional + nullable. The wire payload may:
              - omit `shippedAt` entirely         (nil pointer, no key)
              - send `"shippedAt": null`          (nil pointer)
              - send `"shippedAt": "2026-01-..."` (validated as datetime)
            Validators run only when the value is non-null.
          nullable: true
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        tags:
          description: |-
            ARRAY OF SCALAR — `tags Tag[]` inherits the Tag scalar's
            per-element validators (@minLength, @maxLength, @pattern)
            automatically. The field-level chain only carries the
            array-level rules (@minItems, @maxItems, @uniqueItems).
          items:
            $ref: '#/components/schemas/Tag'
          type: array
        totalCents:
          $ref: '#/components/schemas/Cents'
      required:
      - id
      - customer
      - items
      - auditedBy
      - totalCents
      - status
      - tags
      - createdAt
      type: object
    OrderID:
      type: string
    OrderList:
      description: |-
        OrderList is the ListOrders response — same envelope contract
        as UserList / ProjectList / TaskList.
      properties:
        cursor:
          nullable: true
          type: string
        items:
          items:
            $ref: '#/components/schemas/Order'
          type: array
        total:
          nullable: true
          type: integer
      required:
      - items
      type: object
    OrderStatus:
      enum:
      - pending
      - paid
      - shipped
      - delivered
      - cancelled
      type: string
    OwnershipConflictErr:
      description: Conflict error response (HTTP 409).
      properties:
        owner:
          $ref: '#/components/schemas/UserRef'
      type: object
    Pagination:
      description: |-
        Pagination is the canonical input shape for every list endpoint
        in the project. Re-using one DTO across services means cursor +
        limit semantics stay identical: handlers and clients agree on the
        wire format without per-service re-derivation.

        Validators are declared once here; consumers inherit them by
        referencing this type, so a `?limit=999` query is rejected the
        same way regardless of which service receives it.
      properties:
        cursor:
          description: |-
            cursor is an opaque continuation token returned by the
            previous page. Empty / absent on the first request.
          nullable: true
          type: string
        limit:
          description: |-
            limit caps the page size. Logic treats 0 as "use the default"
            (the v1 query binder doesn't support optional ints, so 0
            serves as the "absent" sentinel); the upper bound is
            enforced here so a hostile client can't request 1M rows.
          type: integer
      required:
      - limit
      type: object
    Payment:
      properties:
        authCents:
          type: integer
        cardLast4:
          description: 4-state on a length-strict + pattern-strict field.
          nullable: true
          type: string
        method:
          $ref: '#/components/schemas/PaymentMethod'
        receiptURL:
          $ref: '#/components/schemas/SafeURL'
        referenceId:
          $ref: '#/components/schemas/NonEmptyID'
      required:
      - method
      - referenceId
      - authCents
      type: object
    PaymentMethod:
      enum:
      - card
      - bank
      - wallet
      - invoice
      type: string
    PercentBP:
      type: integer
    PluginConfig:
      description: |-
        PluginConfig is a key/value bag stored for each installed
        plugin. The value is `any` because each plugin defines its own
        schema — central craftgo stays plugin-agnostic.
      properties:
        pluginId:
          type: string
        settings:
          description: |-
            settings is a JSON object whose shape is plugin-defined.
            `@example` documents one canonical shape in the OpenAPI
            doc without committing the framework to it.
        version:
          description: |-
            version pins the schema revision so a plugin can migrate
            its settings shape without breaking older entries.
          type: integer
      required:
      - pluginId
      - settings
      - version
      type: object
    Precision:
      description: |-
        Precision is level 5. Demonstrates `@positive` plus `@multipleOf`
        on a float — radii are quantized to half-meters because most GPS
        hardware doesn't realistically deliver finer granularity.
      properties:
        confidence:
          description: |-
            Confidence is a 0-1 ratio. @range pins both sides; the
            codegen rejects values outside the closed interval.
          type: number
        gpsFix:
          $ref: '#/components/schemas/GpsFix'
        radiusMeters:
          type: number
        source:
          $ref: '#/components/schemas/GeoSource'
      required:
      - radiusMeters
      - source
      - confidence
      type: object
    Project:
      description: |-
        Project is the full entity. Demonstrates two cross-package
        nesting patterns at once:

          - `owner users.UserRef` — single-value cross-package reference.
            The generated Go embeds `users.UserRef` as a field; the codegen
            adds the matching `users` import to types.go automatically.
          - `members users.UserRef[]` — slice-of-cross-package nested
            refs. Same import resolution, different cardinality.
      properties:
        description:
          nullable: true
          type: string
        id:
          type: string
        members:
          description: |-
            members is the project's collaborator list. Empty array is
            valid (a fresh project has only its owner); the @maxItems
            gate caps explosion attacks.
          items:
            $ref: '#/components/schemas/UserRef'
          type: array
        name:
          type: string
        owner:
          $ref: '#/components/schemas/UserRef'
      required:
      - id
      - name
      - owner
      - members
      type: object
    ProjectList:
      description: |-
        ProjectList is the ListProjects response. Same shape contract as
        users.UserList — generic clients can reuse their pagination
        helpers across resources.
      properties:
        cursor:
          nullable: true
          type: string
        items:
          items:
            $ref: '#/components/schemas/Project'
          type: array
        total:
          nullable: true
          type: integer
      required:
      - items
      type: object
    ProjectRef:
      description: |-
        ProjectRef is the lightweight reference shape — id + name —
        embedded by the tasks package so a Task can mention its parent
        project without dragging in the full member list. Mirrors the
        `users.UserRef` pattern: every cross-package mention of a domain
        entity flows through a Ref type.
      properties:
        id:
          type: string
        name:
          type: string
      required:
      - id
      - name
      type: object
    RateLimitedErr:
      description: TooManyRequests error response (HTTP 429).
      properties:
        bucket:
          type: string
        retry_after:
          type: integer
      type: object
    RestoreUserReqPath:
      properties:
        id:
          type: string
      required:
      - id
      type: object
    RestoreUserRespBody:
      $ref: '#/components/schemas/OkResp'
    SafeURL:
      format: url
      type: string
    SkuCode:
      type: string
    StaleVersionErr:
      description: PreconditionFailed error response (HTTP 412).
      properties:
        actual_version:
          type: integer
        expected_version:
          type: integer
      type: object
    SuspendUserReqPath:
      properties:
        id:
          type: string
      required:
      - id
      type: object
    SuspendUserRespBody:
      $ref: '#/components/schemas/OkResp'
    Tag:
      type: string
    Task:
      description: |-
        Task is the marquee multi-nested type. It demonstrates:

          - Cross-package required nested ref (`project projects.ProjectRef`)
          - Cross-package OPTIONAL nested ref via `T?` (`assignee users.UserRef?`)
            — the wire field is omitted when no one is assigned, which
            codegen renders as `*users.UserRef` in the Go struct.
          - Slice of nested type whose own fields cross another package
            (`comments Comment[]`, where each Comment carries a UserRef).
          - Enum field with default validation via the generated UnmarshalJSON.

        Validators on the wrapper (`@required`, `@length`, `@maxItems`)
        fire at the handler boundary; the nested types' own validators
        can be invoked explicitly from logic when deep validation is
        required (v1 doesn't auto-recurse).
      properties:
        assignee:
          $ref: '#/components/schemas/UserRef'
        comments:
          description: |-
            Slice of nested struct. Empty array is fine; @maxItems caps
            pathological growth.
          items:
            $ref: '#/components/schemas/Comment'
          type: array
        id:
          type: string
        project:
          $ref: '#/components/schemas/ProjectRef'
        status:
          $ref: '#/components/schemas/TaskStatus'
        title:
          type: string
      required:
      - id
      - title
      - status
      - project
      - comments
      type: object
    TaskAssignmentConflictErr:
      description: Conflict error response (HTTP 409).
      properties:
        currentAssignee:
          $ref: '#/components/schemas/UserRef'
        pendingStatus:
          $ref: '#/components/schemas/TaskStatus'
      type: object
    TaskList:
      description: |-
        TaskList is the ListTasks response — same envelope contract as
        UserList / ProjectList for consistent client pagination.
      properties:
        cursor:
          nullable: true
          type: string
        items:
          items:
            $ref: '#/components/schemas/Task'
          type: array
        total:
          nullable: true
          type: integer
      required:
      - items
      type: object
    TaskNotFoundErr:
      description: NotFound error response (HTTP 404).
      type: object
    TaskStatus:
      enum:
      - open
      - in_progress
      - done
      - archived
      type: string
    UpdateUserReq:
      description: |-
        UpdateUserReq is the PATCH body. Every domain field is OPTIONAL
        (PATCH semantics: only the fields the client supplies change).
        `id` carries `@path` so the route segment binds straight onto the
        struct.
      properties:
        avatar:
          $ref: '#/components/schemas/Avatar'
        bio:
          nullable: true
          type: string
        id:
          type: string
        name:
          nullable: true
          type: string
      required:
      - id
      type: object
    UpdateUserReqBody:
      properties:
        avatar:
          $ref: '#/components/schemas/Avatar'
        bio:
          nullable: true
          type: string
        name:
          nullable: true
          type: string
      type: object
    UpdateUserReqPath:
      properties:
        id:
          type: string
      required:
      - id
      type: object
    UpdateUserRespBody:
      $ref: '#/components/schemas/User'
    UpstreamTimeoutErr:
      description: GatewayTimeout error response (HTTP 504).
      properties:
        elapsedMs:
          type: integer
        upstream:
          type: string
      type: object
    User:
      description: |-
        User is the full entity. Notice the + @length / @format
        combo on every meaningful field — the generated Validate() rejects
        bad input at the handler boundary so logic code can assume the
        invariant holds.
      properties:
        avatar:
          $ref: '#/components/schemas/Avatar'
        bio:
          nullable: true
          type: string
        email:
          type: string
        id:
          type: string
        name:
          type: string
      required:
      - id
      - email
      - name
      type: object
    UserGoneErr:
      description: Gone error response (HTTP 410).
      type: object
    UserList:
      description: |-
        UserList is the ListUsers response. Each list endpoint in the
        project wraps its items in a per-service envelope that carries
        a cursor + total — these field names stay identical across
        services so a generic client can paginate without per-resource
        special-casing.
      properties:
        cursor:
          nullable: true
          type: string
        items:
          items:
            $ref: '#/components/schemas/User'
          type: array
        total:
          nullable: true
          type: integer
      required:
      - items
      type: object
    UserNotFoundErr:
      description: NotFound error response (HTTP 404).
      type: object
    UserRef:
      description: |-
        UserRef is the lightweight reference shape — id + display name —
        embedded by other packages whenever they need to *mention* a user
        without dragging in the heavy User payload (avatar, bio, etc.).

        Cross-package nesting through UserRef is the canonical pattern for
        avoiding bloated wire payloads while keeping responses self-
        contained (no client-side join lookup needed).
      properties:
        id:
          type: string
        name:
          type: string
      required:
      - id
      - name
      type: object
    UsernameTakenErr:
      description: Conflict error response (HTTP 409).
      properties:
        username:
          type: string
      type: object
    ValidationFailedErr:
      description: UnprocessableEntity error response (HTTP 422).
      properties:
        fields:
          items:
            type: string
          type: array
        hint:
          type: string
      type: object
    WebhookEvent:
      description: |-
        WebhookEvent is the canonical envelope for webhook deliveries.
        `data` carries the provider-specific payload as raw JSON — the
        craftgo layer only enforces presence and shape of the envelope;
        logic code unmarshals `data` into a typed struct keyed off
        `eventType`.
      properties:
        data:
          description: |-
            data is the provider's payload. The framework leaves it as
            raw JSON (json.RawMessage in Go); a `@required` here simply
            means the field must be present and non-null in the request.
        deliveryId:
          description: |-
            deliveryId uniquely identifies the attempt — clients use it
            to deduplicate retries.
          type: string
        eventType:
          description: |-
            eventType selects which logic-side struct decodes `data`.
            Pattern restricts to `dotted.lower-case` so the dispatch
            table stays predictable.
          type: string
        metadata:
          description: |-
            metadata is optional free-form context the producer may
            attach; logic side reads it with a type assertion / second
            unmarshal when needed. `@nullable` marks "explicit null is
            OK"; `?` would also let the field be omitted entirely.
          nullable: true
      required:
      - eventType
      - deliveryId
      - data
      type: object
  securitySchemes:
    bearer:
      bearerFormat: JWT
      scheme: bearer
      type: http
    oauth2:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  title: CraftGo Showcase
  version: 1.0.0
openapi: 3.1.0
paths:
  /orders:
    get:
      description: List orders with cursor pagination.
      operationId: ListOrders
      parameters:
      - in: query
        name: cursor
        schema:
          nullable: true
          type: string
      - in: query
        name: limit
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOrdersRespBody'
          description: OK
        default:
          description: ""
      tags:
      - orders
    post:
      description: Create a new order. The server fills id, status, totalCents, auditedBy,
        and createdAt; the client supplies customer + items + optional payment metadata.
      operationId: CreateOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderRespBody'
          description: OK
        default:
          description: ""
      tags:
      - orders
  /orders/{id}:
    delete:
      description: Delete an order. Returns shared.OkResp regardless of prior state
        — idempotent.
      operationId: DeleteOrder
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteOrderRespBody'
          description: OK
        default:
          description: ""
      tags:
      - orders
    get:
      description: Fetch one order by id.
      operationId: GetOrder
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrderRespBody'
          description: OK
        default:
          description: ""
      tags:
      - orders
  /orders/by-status/{status}:
    get:
      description: Filter orders by status. Demonstrates enum + scalar in path/query/header/cookie
        bindings — the wire value is a string but the Go field lands as the typed
        alias, and req.Validate() rejects values outside the enum / failing the scalar's
        @format/@pattern.
      operationId: FilterOrders
      parameters:
      - in: path
        name: status
        required: true
        schema:
          $ref: '#/components/schemas/OrderStatus'
      - in: query
        name: contact
        required: true
        schema:
          $ref: '#/components/schemas/Email'
      - in: query
        name: method
        required: true
        schema:
          $ref: '#/components/schemas/PaymentMethod'
      - in: query
        name: limit
        required: true
        schema:
          $ref: '#/components/schemas/Cents'
      - in: header
        name: idemKey
        required: true
        schema:
          $ref: '#/components/schemas/OrderID'
      - in: cookie
        name: lastFilter
        required: true
        schema:
          $ref: '#/components/schemas/OrderStatus'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterOrdersRespBody'
          description: OK
        default:
          description: ""
      tags:
      - orders
  /orders/defaults:
    post:
      description: 'Showcase endpoint exercising every supported @default form: primitive,
        optional, scalar (wrapping primitive), enum, array of primitives, array of
        enums.'
      operationId: DefaultsShowcase
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DefaultsShowcaseReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultsShowcaseRespBody'
          description: OK
        default:
          description: ""
      tags:
      - orders
  /projects:
    get:
      description: List projects with cursor pagination. Same shape as shared.Pagination
        — see ListUsersReq for the cross-package binding caveat.
      operationId: ListProjects
      parameters:
      - in: query
        name: cursor
        schema:
          nullable: true
          type: string
      - in: query
        name: limit
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectsRespBody'
          description: OK
        default:
          description: ""
      tags:
      - projects
    post:
      description: Create a new project. ownerId is verified by logic against the
        users store before persisting.
      operationId: CreateProject
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectRespBody'
          description: OK
        default:
          description: ""
      tags:
      - projects
  /projects/{id}:
    delete:
      description: Delete a project. Idempotent.
