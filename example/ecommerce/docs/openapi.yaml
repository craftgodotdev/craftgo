info:
  title: Ecommerce API
  version: 1.0.0
openapi: 3.1.0
paths:
  /catalog/categories:
    get:
      description: List categories.
      operationId: ListCategories
      parameters:
      - in: query
        name: cursor
        schema:
          type:
          - string
          - "null"
      - in: query
        name: limit
        required: true
        schema:
          maximum: 100
          minimum: 0
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCategoriesRespBody'
          description: OK
        default:
          description: ""
      tags:
      - catalog
  /catalog/products:
    get:
      description: List products with cursor pagination.
      operationId: ListProducts
      parameters:
      - in: query
        name: cursor
        schema:
          type:
          - string
          - "null"
      - in: query
        name: limit
        required: true
        schema:
          maximum: 100
          minimum: 0
          type: integer
      - in: query
        name: category
        schema:
          type:
          - string
          - "null"
      - in: query
        name: tag
        schema:
          type:
          - string
          - "null"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProductsRespBody'
          description: OK
        default:
          description: ""
      tags:
      - catalog
    post:
      description: Create a product (admin only).
      operationId: CreateProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProductRespBody'
          description: Created
        default:
          description: ""
      security:
      - bearer: []
      tags:
      - catalog
  /catalog/products/{id}:
    delete:
      description: Delete a product (admin only).
      operationId: DeleteProduct
      parameters:
      - in: path
        name: id
        required: true
        schema:
          maxLength: 64
          minLength: 1
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteProductRespBody'
          description: OK
        default:
          description: ""
      security:
      - oauth2: []
      tags:
      - catalog
    get:
      description: Fetch one product by id.
