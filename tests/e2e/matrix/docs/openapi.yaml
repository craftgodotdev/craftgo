          type: string
        email:
          format: email
          maxLength: 254
          type: string
        greeting:
          default: hello
          maxLength: 100
          minLength: 1
          type:
          - string
          - "null"
        name:
          maxLength: 80
          minLength: 1
          type: string
      required:
      - name
      - email
      - code
