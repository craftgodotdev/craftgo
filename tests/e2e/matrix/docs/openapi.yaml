    TagSliceRespBody:
      $ref: '#/components/schemas/Arr_TagSlice'
    Team:
      description: |-
        Team gates `members` with both the array-level bound decorators
        (`@minItems`, `@maxItems`) AND per-element nested validation.
        Codegen produces:

          if len(v.Members) < 1 { ... }
          if len(v.Members) > 50 { ... }
          for i0 := range v.Members { v.Members[i0].Validate() }
      properties:
        members:
          items:
            $ref: '#/components/schemas/NestedUser'
          maxItems: 50
          minItems: 1
