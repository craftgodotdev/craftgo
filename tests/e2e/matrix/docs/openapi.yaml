          - integer
          - "null"
      - in: query
        name: cursor
        schema:
          type:
          - string
          - "null"
      - in: query
        name: total
        schema:
          type:
          - integer
          - "null"
      - in: query
        name: query
        schema:
          type:
          - string
          - "null"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersRespBody'
          description: OK
      tags:
      - UserService
    post:
      operationId: UserServiceCreateUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserServiceCreateUserReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserServiceCreateUserRespBody'
          description: Created
      tags:
      - UserService
  /users/{id}:
    delete:
      operationId: UserServiceDeleteUser
      parameters:
      - in: path
        name: id
        required: true
        schema:
          maxLength: 64
          minLength: 1
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserServiceDeleteUserRespBody'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErr'
          description: NotFound
        "409":
          content:
            application/json:
