                $ref: '#/components/schemas/CombineConstraintsRespBody'
          description: Created
      tags:
      - strings
  /strings/echo:
    post:
      description: Echo a request that carries one field per interesting validator
        shape (length, pattern, format, optional, default). Logic just returns the
        payload after Validate() so smoke tests can assert the round-trip preserves
        wire fidelity.
      operationId: Echo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoRespBody'
          description: Created
      tags:
      - strings
  /strings/formats:
    post:
      description: Validate every @format(name) in the catalogue. The request body
        is AllFormats — one field per format — so a malformed value in any slot fails
        the boundary check.
      operationId: ValidateAllFormats
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateAllFormatsReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateAllFormatsRespBody'
          description: Created
      tags:
      - strings
  /users:
