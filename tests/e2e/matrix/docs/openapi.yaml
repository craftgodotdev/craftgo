        creditcard:
          format: creditcard
          maxLength: 19
          minLength: 12
          type: string
        date:
          format: date
          maxLength: 10
          minLength: 10
          type: string
        datetime:
          format: datetime
          maxLength: 40
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        hexcolor:
          format: hexcolor
          maxLength: 7
