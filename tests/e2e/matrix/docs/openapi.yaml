        max entries 100. The emitted code is `if len(v.Counts) < 1 / > 100`.
      properties:
        counts:
          additionalProperties:
            type: integer
          maxProperties: 100
          minProperties: 1
          type: object
      required:
      - counts
      type: object
    Map_KeyAndValue:
      description: |-
        Map_KeyAndValue puts scalars on BOTH sides — NonEmptyID on the key,
        Email on the value. Generator should emit TWO loops: one for keys
        (`for k0 := range v.Index`) and one for values
        (`for _, val0 := range v.Index`), each running the matching
        scalar's validators.
      properties:
        index:
          additionalProperties:
            $ref: '#/components/schemas/CollectionsEmail'
          propertyNames:
            maxLength: 64
            minLength: 1
            type: string
          type: object
      required:
      - index
      type: object
    Map_Optional:
      description: |-
        Map_Optional is the optional-map case. The field carries no bounds,
        so its validator reduces to an outer nil-guard around any inner
        iteration.
      properties:
        counts:
          additionalProperties:
            type: integer
          type:
          - object
          - "null"
      type: object
    Map_Plain:
      description: |-
        Map_Plain is the simplest case — no validators, no scalars, no
        optionality. The generator should emit NO validator block for this
        field (presence is implicit; len() > 0 is not enforced).
      properties:
        counts:
          additionalProperties:
            type: integer
          type: object
      required:
      - counts
      type: object
    Map_ScalarValue:
      description: |-
        Map_ScalarValue uses a scalar value type (Tag). Unlike the struct
        case, the scalar-leaves walk DOES descend into the value side here:
        the generator emits `for _, val0 := range v.Labels` and fires Tag's
        @minLength + @maxLength + @pattern on `val0`.
      properties:
        labels:
          additionalProperties:
            $ref: '#/components/schemas/CollectionsTag'
          type: object
      required:
      - labels
      type: object
    Map_StructAddress:
      description: |-
        Map_StructAddress is the second struct-valued map case, with
        Address as the value. Each entry's `street` / `city` validators fire
        through the per-entry `val.Validate()` call.
      properties:
        addresses:
          additionalProperties:
            $ref: '#/components/schemas/CollectionsAddress'
          type: object
      required:
      - addresses
      type: object
    Map_StructValue:
      description: |-
        Map_StructValue is the struct-valued map. The generator emits a
        per-entry `val.Validate()` call so each User's `name` / `email`
        fields are validated, including the `email` scalar's @format(email).
      properties:
        users:
          additionalProperties:
            $ref: '#/components/schemas/CollectionsUser'
          type: object
      required:
      - users
      type: object
    MapKeyValueReqBody:
      description: |-
        Map_KeyAndValue puts scalars on BOTH sides — NonEmptyID on the key,
        Email on the value. Generator should emit TWO loops: one for keys
        (`for k0 := range v.Index`) and one for values
        (`for _, val0 := range v.Index`), each running the matching
        scalar's validators.
      properties:
        index:
          additionalProperties:
            $ref: '#/components/schemas/CollectionsEmail'
          propertyNames:
            maxLength: 64
            minLength: 1
            type: string
          type: object
      required:
      - index
      type: object
    MapKeyValueRespBody:
      $ref: '#/components/schemas/Map_KeyAndValue'
    MapStructReqBody:
      description: |-
        Map_StructValue is the struct-valued map. The generator emits a
        per-entry `val.Validate()` call so each User's `name` / `email`
        fields are validated, including the `email` scalar's @format(email).
      properties:
        users:
          additionalProperties:
            $ref: '#/components/schemas/CollectionsUser'
          type: object
      required:
      - users
      type: object
    MapStructRespBody:
      $ref: '#/components/schemas/Map_StructValue'
    MapValueGeneric:
      description: |-
        MapValueGeneric verifies that generic instances ride the `map<K, V>`
        builtin without losing their synthetic name: the value branch goes
        through schemaForTypeRef recursively, so `Page<Order>` is registered
        the same way it would be at top level.
      properties:
        bucket:
          additionalProperties:
            $ref: '#/components/schemas/PageOfScalarsOrder'
          type: object
      required:
      - bucket
      type: object
    Matrix:
      description: |-
        Matrix is the 2-D slice of nested case. Codegen emits two nested
        for-loops; each loop indexes one bracket dim.
      properties:
        grid:
          items:
            items:
              $ref: '#/components/schemas/Node'
            type: array
          type: array
      required:
      - grid
      type: object
    MaybeOfScalarsOrder:
      description: |-
        Maybe<T> stacks generic-param with the `?` optional marker. The
        emitted Go field is `*T` (pointer) with `omitempty`.
      properties:
        value:
          anyOf:
          - $ref: '#/components/schemas/ScalarsOrder'
          - type: "null"
      type: object
    MaybeOrder:
      description: |-
        MaybeOrder exercises the `T?` substitution path inside the generic
        body. The `Maybe<T>` decl has `value T?` so substituting T=Order
        yields a nullable-optional Order field, preserving the `?` through
        substitution.
      properties:
        hit:
          $ref: '#/components/schemas/MaybeOfScalarsOrder'
      required:
      - hit
      type: object
    MeRespBody:
      $ref: '#/components/schemas/AccountProfile'
    MixedReq:
      description: MixedReq wraps NumberMixed (mixed strict/inclusive).
      properties:
        body:
          $ref: '#/components/schemas/NumberMixed'
      required:
      - body
      type: object
    Money:
      description: |-
        Money is the canonical currency-aware amount: an integer minor-
        unit value paired with the ISO-4217 currency code. `currency` is
        fixed at exactly three characters; `amount` is non-negative so
        the wire type cannot carry a debit (refunds are represented by a
        separate flow, not by a negative Money).
      properties:
        amount:
          minimum: 0
          type: integer
        currency:
          maxLength: 3
          minLength: 3
          type: string
      required:
      - amount
      - currency
      type: object
    MultiDimReqBody:
      description: |-
        Arr_Tag2D — `Tag[][]` is the 2D scalar array. The generator emits
        doubly-nested for-loops so each `v.Grid[i0][i1]` runs Tag's three
        validators.
      properties:
        grid:
          items:
            items:
              $ref: '#/components/schemas/CollectionsTag'
            type: array
          type: array
      required:
      - grid
      type: object
    MultiDimRespBody:
      $ref: '#/components/schemas/Arr_Tag2D'
    NestedAddress:
      description: |-
        Address is the simplest leaf nested type. The two string fields
        carry independent @minLength so the generated Validate() returns
        the FIRST violation when either is empty.
      properties:
        city:
          minLength: 1
          type: string
        street:
          minLength: 1
          type: string
      required:
      - street
      - city
      type: object
    NestedOrder:
      description: |-
        Order is a tiny leaf used by ListPage below. Stays minimal so
        the page envelope's validate cascade has a single field to
        reach.
      properties:
        id:
          minLength: 1
          type: string
      required:
      - id
      type: object
    NestedUser:
      allOf:
      - properties:
          addr:
            $ref: '#/components/schemas/NestedAddress'
          alias:
            type:
            - string
            - "null"
          boss:
            anyOf:
            - $ref: '#/components/schemas/NestedUser'
            - type: "null"
            description: Self-optional - the marquee recursion case.
          name:
            type:
            - string
            - "null"
        required:
        - addr
        type: object
      - anyOf:
        - properties:
            name:
              not:
                type: "null"
          required:
          - name
        - properties:
            alias:
              not:
                type: "null"
          required:
          - alias
      description: |-
        User couples an addr to a self-referential optional boss + an
        optional alias for the cross-field-validator showcase below.

        `boss User?` is the SELF-OPTIONAL recursion case: codegen must
        emit `Boss *User` in Go and gate the recursive Validate() call
        with `if v.Boss != nil { ... }`.

        `@requiresOneOf(name, alias)` rides on User to demonstrate that
        type-level cross-field validators COMPOSE with nested validation
        - the cross-field check runs AFTER every nested Validate() call.
      type: object
    Node:
      description: |-
        Node is the canonical recursive tree node. `children Node[]` is
        the slice-of-self pattern; the codegen emits ONE Validate()
        function per type so the recursion stays bounded at runtime.
      properties:
        children:
          items:
            $ref: '#/components/schemas/Node'
          type: array
        id:
          minLength: 1
          type: string
      required:
      - id
      - children
      type: object
    NonEmpty:
      description: NonEmpty is the "must be at least one character" string scalar.
      minLength: 1
      type: string
    NonEmptyID:
      description: |-
        NonEmptyID is the canonical id scalar (non-empty, bounded length).
        Used as a map KEY in maps.craftgo to confirm that key-side scalar
        decorators emit a key-only iteration loop.
      maxLength: 64
      minLength: 1
      type: string
    NotFoundErr:
      description: NotFound error response (HTTP 404).
      properties:
        id:
          $ref: '#/components/schemas/ID'
        resource:
          type: string
      required:
      - resource
      - id
      type: object
    NumberBoundary:
      description: |-
        NumberBoundary pins bounds at the exact type-capacity edges. The
        semantic phase rejects bounds beyond a type's representable range;
        these must all sit AT the boundary and pass clean.
      properties:
        int8Full:
          description: int8 full range
          maximum: 127
          minimum: -128
          type: integer
        int8Range:
          maximum: 127
          minimum: -128
          type: integer
        int16Full:
          description: int16 full range
          maximum: 32767
          minimum: -32768
          type: integer
        int32Full:
          description: int32 full range
          maximum: 2147483647
          minimum: -2147483648
          type: integer
        uint8Full:
          maximum: 255
          minimum: 0
          type: integer
        uint8Range:
          description: uint8 full range
          maximum: 255
          minimum: 0
          type: integer
        uint16Full:
          description: uint16 full range
          maximum: 65535
          minimum: 0
          type: integer
        uint32Full:
          description: uint32 full range
          maximum: 4294967295
          minimum: 0
          type: integer
      required:
      - int8Full
      - int8Range
      - int16Full
      - int32Full
      - uint8Range
      - uint8Full
      - uint16Full
      - uint32Full
      type: object
    NumberCounter:
      description: |-
        NumberCounter exercises every standard int* signed type with all
        three pair flavours: @range (inclusive both), @gte/@lte (inclusive
        both), @gt/@lt (strict both). Also adds @positive, @negative, and
        @multipleOf on int to cover the marquee combinations.
      properties:
        gtLtInt:
          exclusiveMaximum: 1000
          exclusiveMinimum: 0
          type: integer
        gtLtInt8:
          exclusiveMaximum: 100
          exclusiveMinimum: -100
          type: integer
        gtLtInt16:
          exclusiveMaximum: 32000
          exclusiveMinimum: -32000
          type: integer
        gtLtInt32:
          exclusiveMaximum: 2147483647
          exclusiveMinimum: -2147483648
          type: integer
        gtLtInt64:
          exclusiveMaximum: 1000000000000
          exclusiveMinimum: 0
          type: integer
        gteLteInt:
          maximum: 1000
          minimum: 0
          type: integer
        gteLteInt8:
          maximum: 100
          minimum: -100
          type: integer
        gteLteInt16:
          maximum: 32000
          minimum: -32000
          type: integer
        gteLteInt32:
          maximum: 2147483647
          minimum: 0
          type: integer
        gteLteInt64:
          maximum: 9000000000000000000
          minimum: -9000000000000000000
          type: integer
        negInt:
          exclusiveMaximum: 0
          type: integer
        posInt:
          description: '@positive / @negative — flag decorators (no parens).'
          exclusiveMinimum: 0
          type: integer
        posInt64:
          exclusiveMinimum: 0
          type: integer
        rangeInt:
          description: |-
            int — defaults to the platform's native word width but the
            semantic capacity check treats it as int64 for portability.
          maximum: 1000
          minimum: 0
          type: integer
        rangeInt8:
          description: int8 — bound capacity edge (the validator should narrow safely).
          maximum: 50
          minimum: -50
          type: integer
        rangeInt16:
          description: int16
          maximum: 1000
          minimum: -1000
          type: integer
        rangeInt32:
          description: int32 — tests MaxInt32-ish boundaries.
          maximum: 2000000000
          minimum: -2000000000
          type: integer
        rangeInt64:
          description: int64 — the widest signed.
          maximum: 1000000000
          minimum: -1000000000
          type: integer
        stepInt:
          description: '@multipleOf on int.'
          multipleOf: 5
          type: integer
        stepInt64:
          multipleOf: 100
          type: integer
      required:
      - rangeInt
      - gteLteInt
      - gtLtInt
      - rangeInt8
      - gteLteInt8
      - gtLtInt8
      - rangeInt16
      - gteLteInt16
      - gtLtInt16
      - rangeInt32
      - gteLteInt32
      - gtLtInt32
      - rangeInt64
      - gteLteInt64
      - gtLtInt64
      - posInt
      - negInt
      - posInt64
      - stepInt
      - stepInt64
      type: object
    NumberExact:
      description: |-
        NumberExact is the boundary case where @gte and @lte share the
        same value — exactly one accepted value. The semantic allows this
        closed-form pair; only the strict variants on equal endpoints
        (e.g. @gt(5) @lt(5)) emit empty-range diagnostics.
      properties:
        exactly0:
          description: Only value = 0
          maximum: 0
          minimum: 0
          type: integer
        exactly5:
          description: Only value = 5 is accepted.
          maximum: 5
          minimum: 5
          type: integer
        exactlyHalf:
          description: Only value = 0.5
          maximum: 0.5
          minimum: 0.5
          type: number
      required:
      - exactly5
      - exactly0
      - exactlyHalf
      type: object
    NumberMixed:
      description: NumberMixed exercises mixed strict/inclusive pair combinations.
      properties:
        floatGtLte:
          description: Asymmetric float
          exclusiveMinimum: 0
          maximum: 1
          type: number
        gtLte:
          description: strict-lower + inclusive-upper
          exclusiveMinimum: 0
          maximum: 100
          type: integer
        gteLt:
          description: inclusive-lower + strict-upper
          exclusiveMaximum: 100
          minimum: 0
          type: integer
        negRange:
          description: All-negative inclusive range — only negative values accepted.
          maximum: -1
          minimum: -100
          type: integer
        negStrict:
          description: All-negative strict range.
          exclusiveMaximum: -1
          exclusiveMinimum: -100
          type: integer
      required:
      - gtLte
      - gteLt
      - negRange
      - negStrict
      - floatGtLte
      type: object
    NumberOptional:
      description: |-
        NumberOptional exercises the optional / nullable / default axes
        against numeric primitives.
      properties:
        defaultFloat:
          default: 3.14
          type:
          - number
          - "null"
        defaultInt:
          default: 42
          description: 'Defaults: @default fills in the value when the field is absent.'
          type:
          - integer
          - "null"
        defaultStep:
          default: 10
          description: |-
            Default + range — present and below-default sends 0 which still
            passes the @gte(0).
          maximum: 100
          minimum: 0
          type:
          - integer
          - "null"
        maybeInt:
          description: |-
            4-state: optional + nullable. Numbers wire shape: missing key,
            null, or a valid value.
          maximum: 100
          minimum: 0
          type:
          - integer
          - "null"
        nullableFloat:
          maximum: 1
          minimum: 0
          type:
          - number
          - "null"
        nullableInt:
          description: |-
            @nullable on a non-optional numeric — forces a pointer in
            codegen so the wire can carry explicit null.
          maximum: 100
          minimum: 0
          type:
          - integer
          - "null"
        optFloat:
          maximum: 1
          minimum: 0
          type:
          - number
          - "null"
        optInt:
          description: |-
            Bare optional ints/floats with bound — the decoder treats
            "missing key" as zero-value, and Validate skips when nil.
          maximum: 100
          minimum: 0
          type:
          - integer
          - "null"
        optUint:
          maximum: 1000
          minimum: 0
          type:
          - integer
          - "null"
      required:
      - nullableInt
      - nullableFloat
      type: object
    NumberPrice:
      description: |-
        NumberPrice exercises float32 + float64 with float literal bounds.
        Float-typed literals such as @gte(0.5) and @range(0.1, 0.9) must
        round-trip cleanly through parse → semantic → codegen.
      properties:
        gtLtF32:
          exclusiveMaximum: 1
          exclusiveMinimum: 0
          type: number
        gtLtF64:
          exclusiveMaximum: 0.9999
          exclusiveMinimum: 0.0001
          type: number
        gteLteF32:
          maximum: 1.5
          minimum: 0.5
          type: number
        gteLteF64:
          maximum: 1.5
          minimum: -1.5
          type: number
        negFloat:
          exclusiveMaximum: 0
          type: number
        posF32:
          exclusiveMinimum: 0
          type: number
        posFloat:
          description: '@positive / @negative on floats.'
          exclusiveMinimum: 0
          type: number
        rangeF32:
          description: float32 — narrower precision but same decorator surface.
          maximum: 1
          minimum: 0
          type: number
        rangeF64:
          description: float64 — the wide form. Includes a high-precision bound.
          maximum: 0.9
          minimum: 0.1
          type: number
      required:
      - rangeF32
      - gteLteF32
      - gtLtF32
      - rangeF64
      - gteLteF64
      - gtLtF64
      - posFloat
      - negFloat
      - posF32
      type: object
    NumberUnsigned:
      description: |-
        NumberUnsigned covers the full uint family. Lower bound 0 is
        implicit at the type level but we still emit @gte(0) explicitly to
        confirm codegen doesn't emit a dead `v < 0` for unsigned fields.
      properties:
        gtLtUint:
          exclusiveMaximum: 1000
          exclusiveMinimum: 0
          type: integer
        gtLtUint8:
          exclusiveMaximum: 255
          exclusiveMinimum: 0
          type: integer
        gtLtUint16:
          exclusiveMaximum: 65535
          exclusiveMinimum: 0
          type: integer
        gtLtUint32:
          exclusiveMaximum: 4294967295
          exclusiveMinimum: 0
          type: integer
        gtLtUint64:
          exclusiveMaximum: 1000000000000
          exclusiveMinimum: 0
          type: integer
        gteLteUint:
          maximum: 1000
          minimum: 0
          type: integer
        gteLteUint8:
          maximum: 255
          minimum: 0
          type: integer
        gteLteUint16:
          maximum: 65535
          minimum: 0
          type: integer
        gteLteUint32:
          maximum: 4294967295
          minimum: 0
          type: integer
        gteLteUint64:
          maximum: 1000000000000
          minimum: 0
          type: integer
        posUint:
          description: |-
            @positive on uint — semantically equivalent to @gt(0), but the
            unsigned domain makes @negative semantically vacuous (it is
            still accepted at the decorator layer, so we don't test that).
          exclusiveMinimum: 0
          type: integer
        rangeUint:
          description: uint
          maximum: 1000
          minimum: 0
          type: integer
        rangeUint8:
          description: uint8 — full capacity test.
          maximum: 255
          minimum: 0
          type: integer
        rangeUint16:
          description: uint16
          maximum: 65535
          minimum: 0
          type: integer
        rangeUint32:
          description: uint32 — boundary at MaxUint32.
          maximum: 4294967295
          minimum: 0
          type: integer
        rangeUint64:
          description: uint64 — even bigger.
          maximum: 1000000000000
          minimum: 0
          type: integer
      required:
      - rangeUint
      - gteLteUint
      - gtLtUint
      - rangeUint8
      - gteLteUint8
      - gtLtUint8
      - rangeUint16
      - gteLteUint16
      - gtLtUint16
      - rangeUint32
      - gteLteUint32
      - gtLtUint32
      - rangeUint64
      - gteLteUint64
      - gtLtUint64
      - posUint
      type: object
    OptionalPage:
      description: |-
        OptionalPage probes the OUTER `?` on a generic instance: the
