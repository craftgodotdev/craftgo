            pattern: ^\+\d+$
            type:
            - string
            - "null"
        type: object
      - anyOf:
        - properties:
            email:
              not:
                type: "null"
          required:
          - email
        - properties:
            phone:
              not:
                type: "null"
          required:
          - phone
