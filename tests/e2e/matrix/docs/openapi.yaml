      - scalars
    post:
      description: Create an order from a full payload. Every scalar-typed field on
        Order runs its inherited validators.
      operationId: CreateOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderReqBody'
        required: true
      responses:
        "201":
