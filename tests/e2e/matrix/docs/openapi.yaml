        field surfaces in OpenAPI as anyOf:[{$ref}, {type:null}] with the bound
        as a sibling.
      properties:
        nulCapped:
          anyOf:
          - $ref: '#/components/schemas/RgCents'
          - type: "null"
          maximum: 100
        nulEmail:
          anyOf:
          - $ref: '#/components/schemas/RgEmail'
          - type: "null"
        optCapped:
          anyOf:
          - $ref: '#/components/schemas/RgCents'
          - type: "null"
          maximum: 50
        plainCents:
          allOf:
          - $ref: '#/components/schemas/RgCents'
          - maximum: 1000
      required:
      - nulCapped
      - nulEmail
      - plainCents
      type: object
    EchoNullableScalarsRespBody:
      $ref: '#/components/schemas/RgNullableScalars'
    EchoOrgReqBody:
      description: |-
        Org demonstrates OPTIONAL slice of nested. The Go field is
        `Teams []Team` but the wire field is `omitempty`; codegen still
        emits the per-element loop without a nil-guard because Go's
        `range` on a nil slice is a no-op.
      properties:
        teams:
          items:
            $ref: '#/components/schemas/Team'
          type:
          - array
          - "null"
      type: object
    EchoOrgRespBody:
      $ref: '#/components/schemas/Org'
    EchoPageReqBody:
      $ref: '#/components/schemas/RgPageOfRgEmail'
    EchoPageRespBody:
      $ref: '#/components/schemas/RgPageOfRgEmail'
    EchoPersonReqBody:
      description: |-
        Person → Home → Room → Furniture chain. Each level adds one
        nested call to the validator dispatch, demonstrating that the
        cascade carries the deepest violation back to the top.
      properties:
        home:
          $ref: '#/components/schemas/Home'
      required:
      - home
      type: object
    EchoPersonRespBody:
      $ref: '#/components/schemas/Person'
    EchoPresenceReqBody:
      description: |-
        PresenceMatrix is the canonical presence-state matrix.

        Row map (DSL → Go → wire contract):

          plain        string                          → string   required, non-null
          optional     string?                         → *string  optional, may be omitted OR null
          nullable     string @nullable                → *string  required, value may be JSON null
          bothNullable string? @nullable               → *string  4-state (same as optional, redundant @nullable)
          defValue     string? @default("d")           → *string  optional + pre-fill (the `?` is mandatory under @default)
          defNullable  string? @nullable @default("d") → *string  optional + nullable + pre-fill

        Wire contract diffs row-by-row (OpenAPI 3.1: null rides the `type`
        list, so a nullable string is `type: [string, "null"]`):

          plain:        required[] yes, type: string
          optional:     required[] no,  type: [string, "null"]
          nullable:     required[] yes, type: [string, "null"]
          bothNullable: required[] no,  type: [string, "null"]
          defValue:     required[] no,  type: [string, "null"], default: "d"
          defNullable:  required[] no,  type: [string, "null"], default: "d"

        The `bothNullable` and `defNullable` rows trip the "redundant
        @nullable on `T?`" warning (the optionality already permits null);
        the linter should surface that without rejecting the file.
      properties:
        bothNullable:
          type:
          - string
          - "null"
        defNullable:
          default: d
          type:
          - string
          - "null"
        defValue:
          default: d
          type:
          - string
          - "null"
        nullable:
          type:
          - string
          - "null"
        optional:
          type:
          - string
          - "null"
        plain:
          type: string
      required:
      - plain
      - nullable
      type: object
    EchoPresenceRespBody:
      $ref: '#/components/schemas/PresenceMatrix'
    EchoRefMetaReqBody:
      description: |-
        @nullable on a named ref emits the null union; @default / @deprecated on
        a non-optional ref ride a wrapper schema.
      properties:
        depColor:
          allOf:
          - $ref: '#/components/schemas/RgColor'
          deprecated: true
          description: 'Deprecated: use status'
        nulColor:
          anyOf:
          - $ref: '#/components/schemas/RgColor'
          - type: "null"
        nulInner:
          anyOf:
          - $ref: '#/components/schemas/RgInner'
          - type: "null"
        roleReq:
          anyOf:
          - $ref: '#/components/schemas/RgCents'
          - type: "null"
          default: 7
      required:
      - nulInner
      - nulColor
      - depColor
      type: object
    EchoRefMetaRespBody:
      $ref: '#/components/schemas/RgRefMeta'
    EchoReqBody:
      description: |-
        Str_EchoReq is the request body for the service's echo endpoint —
        it bundles a sample of each interesting validator shape so logic
        code receives a single struct with the full menu of constraints
        already enforced at the handler boundary.
      properties:
        bio:
          maxLength: 500
          type:
          - string
          - "null"
        code:
          pattern: ^[A-Z]{2,4}$
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        greeting:
          default: hello
          maxLength: 100
          minLength: 1
          type:
          - string
          - "null"
        name:
          maxLength: 80
          minLength: 1
          type: string
      required:
      - name
      - email
      - code
      type: object
    EchoRespBody:
      $ref: '#/components/schemas/Str_EchoResp'
    EchoRespReqBody:
      description: |-
        A response mixing a mixin and a @header field keeps the mixin's body
        fields (createdAt) in the per-operation response body schema.
      properties:
        createdAt:
          minLength: 1
          type: string
      required:
      - createdAt
      type: object
    EchoRespRespBody:
      properties:
        createdAt:
          minLength: 1
          type: string
        name:
          type: string
      required:
      - createdAt
      - name
      type: object
    EchoScalarReqBody:
      description: |-
        DefaultsScalar uses a numeric-scalar default. The literal is a plain
        int — the codegen casts it to the scalar's defined type
        (`PageSize(20)`) so the pointer pre-fill `__d := PageSize(20)` keeps
        the field's `*PageSize` type.
      properties:
        size:
          anyOf:
          - $ref: '#/components/schemas/PageSize'
          - type: "null"
          default: 20
      type: object
    EchoScalarRespBody:
      $ref: '#/components/schemas/DefaultsScalar'
    EchoStackedReqBody:
      description: |-
        Stacked same-family bounds intersect in OpenAPI exactly as the runtime
        validator enforces them (tightest wins): `@gte(10) @lte(90) @range(0,100)`
        advertises minimum 10 / maximum 90, and `@length(5) @minLength(3)
        @maxLength(10)` advertises an exact length of 5.
      properties:
        a:
          maxLength: 5
          minLength: 5
          type: string
        b:
          maximum: 90
          minimum: 10
          type: integer
      required:
      - b
      - a
      type: object
    EchoStackedRespBody:
      $ref: '#/components/schemas/Rg6Stacked'
    EchoTeamReqBody:
      description: |-
        Team gates `members` with both the array-level bound decorators
        (`@minItems`, `@maxItems`) AND per-element nested validation.
        Codegen produces:

          if len(v.Members) < 1 { ... }
          if len(v.Members) > 50 { ... }
          for i0 := range v.Members { v.Members[i0].Validate() }
      properties:
        members:
          items:
            $ref: '#/components/schemas/NestedUser'
          maxItems: 50
          minItems: 1
          type: array
      required:
      - members
      type: object
    EchoTeamRespBody:
      $ref: '#/components/schemas/Team'
    EchoUserReqBody:
      allOf:
      - properties:
          addr:
            $ref: '#/components/schemas/NestedAddress'
          alias:
            type:
            - string
            - "null"
          boss:
            anyOf:
            - $ref: '#/components/schemas/NestedUser'
            - type: "null"
            description: Self-optional - the marquee recursion case.
          name:
            type:
            - string
            - "null"
        required:
        - addr
        type: object
      - anyOf:
        - properties:
            name:
              not:
                type: "null"
          required:
          - name
        - properties:
            alias:
              not:
                type: "null"
          required:
          - alias
      description: |-
        User couples an addr to a self-referential optional boss + an
        optional alias for the cross-field-validator showcase below.

        `boss User?` is the SELF-OPTIONAL recursion case: codegen must
        emit `Boss *User` in Go and gate the recursive Validate() call
        with `if v.Boss != nil { ... }`.

        `@requiresOneOf(name, alias)` rides on User to demonstrate that
        type-level cross-field validators COMPOSE with nested validation
        - the cross-field check runs AFTER every nested Validate() call.
      type: object
    EchoUserRespBody:
      $ref: '#/components/schemas/NestedUser'
    EchoWidthReqBody:
      description: |-
        DefaultsWidth parks a @default on each narrow numeric width. The same
        pre-fill cast a scalar needs applies to a bare narrow primitive: the
        literal is cast to the field's type (`int32(7)`) so `__d := int32(7)`
        keeps the field's `*int32`. Without it `__d := 7` infers Go `int` and
        `&__d` (*int) can't assign. `int` / `float64` need no cast (the
        literal already matches their inferred type); the widths below do.
      properties:
        w32:
          default: 7
          type:
          - integer
          - "null"
        w64:
          default: 9
          type:
          - integer
          - "null"
        wf32:
          default: 1.5
          type:
          - number
          - "null"
        wu16:
          default: 3
          type:
          - integer
          - "null"
      type: object
    EchoWidthRespBody:
      $ref: '#/components/schemas/DefaultsWidth'
    EchoWireRespBody:
      $ref: '#/components/schemas/Item'
