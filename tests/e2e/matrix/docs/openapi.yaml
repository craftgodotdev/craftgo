      - createdAt
      - updatedAt
      type: object
    XBagOfMapOfStringAndXColor:
      description: |-
        XBag is a cross-package generic. xrefs instantiates it as
        `xshared.XBag<X>` for various X — local types, primitives, and
        xshared types — covering the qualified-generic codegen path.
      properties:
        cap:
          maximum: 1000
          minimum: 0
          type: integer
        items:
          items:
            additionalProperties:
              $ref: '#/components/schemas/XColor'
            type: object
          type: array
      required:
      - items
      - cap
      type: object
    XBagOfString:
      description: |-
        XBag is a cross-package generic. xrefs instantiates it as
        `xshared.XBag<X>` for various X — local types, primitives, and
        xshared types — covering the qualified-generic codegen path.
      properties:
        cap:
          maximum: 1000
          minimum: 0
          type: integer
        items:
          items:
            type: string
          type: array
      required:
      - items
      - cap
      type: object
    XBagOfXLocalItem:
      description: |-
        XBag is a cross-package generic. xrefs instantiates it as
        `xshared.XBag<X>` for various X — local types, primitives, and
        xshared types — covering the qualified-generic codegen path.
      properties:
        cap:
          maximum: 1000
          minimum: 0
          type: integer
        items:
          items:
            $ref: '#/components/schemas/XLocalItem'
          type: array
      required:
      - items
      - cap
      type: object
    XBagOfXOwner:
      description: |-
        XBag is a cross-package generic. xrefs instantiates it as
        `xshared.XBag<X>` for various X — local types, primitives, and
        xshared types — covering the qualified-generic codegen path.
      properties:
        cap:
          maximum: 1000
          minimum: 0
          type: integer
        items:
          items:
            $ref: '#/components/schemas/XOwner'
          type: array
      required:
      - items
      - cap
      type: object
    XBagPromoteReq:
      allOf:
      - $ref: '#/components/schemas/XWrapInBagOfXOwner'
      - type: object
      description: |-
        XBagPromoteReq instantiates the generic mixin host xshared.XWrapInBag
        (which embeds XBag<T>); OpenAPI must register XBagOfXOwner, not a phantom
        XBagOfT with a dangling element $ref.
      type: object
    XBodyPromoteReq:
      allOf:
      - $ref: '#/components/schemas/XPromoteBody'
      - type: object
      description: |-
        XBodyPromoteReq promotes a cross-package mixin's BODY fields: the POST
        handler must emit the JSON decode (its only body fields come from the
        mixin) and pre-fill the promoted scalar / enum defaults with qualified
        casts (xshared.XSize(20), xshared.XColorGreen).
      type: object
    XByKeyReq:
      allOf:
      - $ref: '#/components/schemas/XPathKey'
      - type: object
      description: |-
        XByKeyReq draws its only field — the `@path`-bound `key` — from the
        cross-package mixin xshared.XPathKey. The GetByKey route's `{key}`
        segment binds through that mixin; the per-package path-param pass can't
        expand a sibling-package mixin, so the project-level check owns it.
      type: object
    XColor:
      description: |-
        XColor exercises cross-package enum refs. Used by xrefs in every
        shape — direct, optional, array, map-key, map-value — so the
        switch-case validity check, OpenAPI enum schema, and binding casts
        resolve through the resolver rather than the local pkg.Enums.
      enum:
      - Red
      - Green
      - Blue
      type: string
    XEmail:
      description: |-
        XEmail exercises cross-package scalar refs with inherited
        validators. The @format(email) + @maxLength(254) inherit into every
        xrefs field typed `xshared.XEmail` (scalar inheritance resolves via
        resolver.LookupScalar against the project ScalarTable).
      format: email
      maxLength: 254
      type: string
    XEnumDefault:
      description: |-
        XEnumDefault exercises `@default(Red)` on a cross-pkg enum field:
        the enum value is referenced by bare ident, not a string literal,
        since enum identity is by name. Transport pre-fill qualifies the
        constant (`xshared.XColorRed`) and registers the xshared import on
        the handler file.
      properties:
        color:
          anyOf:
          - $ref: '#/components/schemas/XColor'
          - type: "null"
          default: Red
      type: object
    XEnumMaps:
      description: |-
        XEnumMaps exercises enum keys / values in maps. The walker emits a
        switch on either side independently (key-only, value-only, or both).
      properties:
        bothEnum:
          additionalProperties:
            $ref: '#/components/schemas/XColor'
          propertyNames:
            enum:
            - Red
            - Green
            - Blue
            type: string
          type: object
        byEnum:
          additionalProperties:
            type: string
          propertyNames:
            enum:
            - Red
            - Green
            - Blue
            type: string
          type: object
        byString:
          additionalProperties:
            $ref: '#/components/schemas/XColor'
          type: object
      required:
      - byString
      - byEnum
      - bothEnum
      type: object
    XEnumScalar:
      description: |-
        XEnumScalar exercises direct + optional + array enum field shapes.
        The validator emits a switch-case per shape; the OpenAPI schema
        inlines the enum values list (or $refs the enum schema).
      properties:
        flat:
          $ref: '#/components/schemas/XColor'
        many:
          items:
            $ref: '#/components/schemas/XColor'
          type: array
        maybe:
          anyOf:
          - $ref: '#/components/schemas/XColor'
          - type: "null"
      required:
      - flat
      - many
      type: object
    XGeneric:
      description: |-
        XGeneric exercises cross-pkg generic instantiations. Each argument
        kind takes a different generic-arg resolution path. OpenAPI
        registers one component per (decl, args) tuple under the
        FastAPI-style `XBagOfFoo` naming, not bare `xshared.XBag`.
      properties:
        ofLocal:
          $ref: '#/components/schemas/XBagOfXLocalItem'
        ofMap:
          $ref: '#/components/schemas/XBagOfMapOfStringAndXColor'
        ofPrim:
          $ref: '#/components/schemas/XBagOfString'
        ofXType:
          $ref: '#/components/schemas/XBagOfXOwner'
      required:
      - ofLocal
      - ofXType
      - ofPrim
      - ofMap
      type: object
    XGetReq:
      type: object
    XGrand:
      description: |-
        XGrand is a leaf mixin reached only through a CHAIN of mixins: XParent
        embeds it (bare, same-package ref inside xshared), and a consumer in
        another package embeds XParent. So a field here sits two mixin levels
        deep, the inner link being a bare ref inside a cross-package mixin —
        the case the codegen flattener and the path-param check must qualify as
        `xshared.XGrand`, or `gKey`'s @path and `g32`'s @default silently drop.
      properties:
        g32:
          default: 7
          type:
          - integer
          - "null"
      type: object
    XHeaderResp:
      description: |-
        XHeaderResp is used as a QUALIFIED cross-package response
        (`response xshared.XHeaderResp`) by xrefs. Its @header / @cookie fields
        must be written by the handler even though the response type is
        cross-package — the response-binding collector resolves it through the
        project resolver, or the values silently drop (the fields are `json:"-"`)
        while OpenAPI still advertises the header/cookie.
      properties:
        id:
          type: string
      required:
      - id
      type: object
    XHolder:
      allOf:
      - $ref: '#/components/schemas/XHolderSub'
      - type: object
      description: |-
        XHolder is used as a QUALIFIED request type (`request xshared.XHolder`) by
        xrefs' service. Because the request type lives here, its bare nested mixin
        XHolderSub resolves in xshared — the binder must thread xshared as the
        flatten prefix, or `q` (the @query param) and `bod` (the body field) are
        silently dropped from the handler while the validator still enforces them.
      type: object
    XHolderSub:
      description: |-
        XHolderSub is a mixin embedded (bare) inside XHolder below. Its fields —
        a @query param, a JSON-body field, and a defaulted @query param — must
        survive when XHolder is used as a QUALIFIED request type from another
        package. The `limit` default must also PRE-FILL in the handler (the
        default-collection pass threads the same xshared prefix as the binder);
        without it the binder binds `limit` but the documented `default: 50` never
        seeds, so an omitted param yields 0 instead of 50.
      properties:
        bod:
          maxLength: 10
          minLength: 1
          type: string
      required:
      - bod
      type: object
    XLocalItem:
      properties:
        id:
          type: string
      required:
      - id
      type: object
    XMixinErr:
      allOf:
      - $ref: '#/components/schemas/XOwner'
      - properties:
          reason:
            maxLength: 200
            minLength: 1
            type: string
        required:
        - reason
        type: object
      description: Conflict error response (HTTP 409).
      type: object
    XNestedReq:
      allOf:
      - $ref: '#/components/schemas/XParent'
      - type: object
      description: |-
        XNestedReq reaches fields through a mixin nested INSIDE a cross-package
        mixin: xshared.XParent embeds xshared.XGrand. So `gKey` (@path) and
        `g32` (@default) live two mixin levels deep — the flattener must
        qualify the bare inner `XGrand` as `xshared.XGrand` to see them.
      type: object
    XNodeID:
      description: |-
        XNodeID exercises a numeric cross-package scalar. The cast in
        generated transport binding (`req.ID = xshared.XNodeID(int(_n))`)
        qualifies the type name and registers the xshared import.
      maximum: 1000000
      minimum: 1
      type: integer
    XNotFoundErr:
      description: NotFound error response (HTTP 404).
      properties:
        id:
          type: string
        resource:
          maxLength: 200
          minLength: 1
          type: string
      required:
      - resource
      - id
      type: object
    XOwner:
      description: |-
        XOwner is a cross-package type used in field positions, exercising
        recursive validate dispatch (`v.Owner.Validate()`) when the owner
        field's type lives in xshared.
      properties:
        email:
          $ref: '#/components/schemas/XEmail'
        id:
          maxLength: 64
          minLength: 1
          type: string
      required:
      - id
      - email
      type: object
    XParent:
      allOf:
      - $ref: '#/components/schemas/XGrand'
      - properties:
          p64:
            default: 9
            type:
            - integer
            - "null"
        type: object
      description: |-
        XParent embeds XGrand (bare) and adds its own default; consumers embed
        XParent to reach both levels.
      type: object
    XPathKey:
      description: |-
        XPathKey is a cross-package mixin that carries a `@path`-bound field.
        xrefs embeds it in a request whose route declares `{key}`; the path
        segment binds through the mixin. The per-package pass can't expand a
        sibling-package mixin, so the project-level path-param check owns the
        verdict — the same cross-package flattening the codegen binder does.
      type: object
    XPkgEnum:
      description: |-
        XPkgEnum exercises every shape a CROSS-PACKAGE enum reference can
        take inside a single field. Resolution routes through the
        project-wide EnumTable, so every shape emits the switch-case
        validity check.

          - flat:      `shared.Severity` direct field   → switch wrapped by shape().
          - many:      `shared.Severity[]`              → for-range + switch.
          - maybe:     `shared.Severity?`               → nil-check + switch.
          - byString:  `map<string, shared.Severity>`   → for-range value walk.
          - byEnum:    `map<shared.Severity, string>`   → for-range key walk.
          - bothEnum:  `map<shared.Severity, shared.Severity>` → both sides switch.
      properties:
        bothEnum:
          additionalProperties:
            $ref: '#/components/schemas/Severity'
          propertyNames:
            enum:
            - Info
            - Warning
            - Error
            - Critical
            type: string
          type: object
        byEnum:
          additionalProperties:
            type: string
          propertyNames:
            enum:
            - Info
            - Warning
            - Error
            - Critical
            type: string
          type: object
        byString:
          additionalProperties:
            $ref: '#/components/schemas/Severity'
          type: object
        flat:
          $ref: '#/components/schemas/Severity'
        many:
          items:
            $ref: '#/components/schemas/Severity'
          type: array
        maybe:
          anyOf:
          - $ref: '#/components/schemas/Severity'
          - type: "null"
      required:
      - flat
      - many
      - byString
      - byEnum
      - bothEnum
      type: object
    XPromoteBody:
      description: |-
        XPromoteBody bundles fields a consumer reaches only by EMBEDDING it
        across the package boundary: a required body field (the handler must
        emit the JSON decode), a cross-package scalar @default (the pre-fill
        must cast `xshared.XSize(20)`), and a cross-package enum @default (the
        pre-fill must qualify `xshared.XColorGreen`). Promotion re-qualifies
        each bare field type to xshared so the binder / pre-fill resolve it.
      properties:
        label:
          minLength: 1
          type: string
        size:
          anyOf:
          - $ref: '#/components/schemas/XSize'
          - type: "null"
          default: 20
        tone:
          anyOf:
          - $ref: '#/components/schemas/XColor'
          - type: "null"
          default: Green
      required:
      - label
      type: object
    XPromoteWire:
      description: |-
        XPromoteWire carries a cross-package scalar bound to @query, reached
        through a mixin: the binder must cast `xshared.XEmail(...)` AND pull in
        the xshared import, both of which need the promoted field's type
        re-qualified to its home package.
      type: object
    XRefsServiceGetItemRespBody:
      $ref: '#/components/schemas/XOwner'
    XRefsServiceListItemsRespBody:
      $ref: '#/components/schemas/XBagOfXOwner'
    XScalarBindings:
      description: |-
        XScalarBindings exercises scalar refs at wire binding sites. The
        transport handler emits qualified casts:
          - `req.Path = xshared.XEmail(r.PathValue("path"))`
          - `req.Q = xshared.XEmail(r.URL.Query().Get("q"))`
      type: object
    XScalarFields:
      description: |-
        XScalarFields exercises cross-pkg scalar refs in every shape. Each
        field inherits the scalar's @format / @length chain via the project
        ScalarTable, and the required-empty check on `flat` resolves the
        scalar's underlying primitive through the resolver.
      properties:
        flat:
          $ref: '#/components/schemas/XEmail'
        many:
          items:
            $ref: '#/components/schemas/XEmail'
          type: array
        maybe:
          anyOf:
          - $ref: '#/components/schemas/XEmail'
          - type: "null"
        stamps:
          items:
            $ref: '#/components/schemas/XTimestamp'
          type: array
      required:
      - flat
      - many
      - stamps
      type: object
    XSearchReq:
      description: |-
        XSearchReq exercises cross-package scalar binding casts. The /search
        handler emits qualified casts (`req.Q = xshared.XEmail(r.URL.Query()
        .Get("q"))`) so the assignment type-checks against the
        `*xshared.XEmail` field.
      type: object
    XSize:
      description: |-
        XSize is a numeric scalar used to pin cross-package scalar-default
        PROMOTION: a field of this type reached through a mixin must have its
        @default literal cast to the scalar's home-package type (xshared.XSize),
        not a bare int.
      maximum: 100
      minimum: 1
      type: integer
    XThirdReq:
      description: |-
        XThirdReq is used as a QUALIFIED request (`request xshared.XThirdReq`) by
        xrefs, and its field reaches a THIRD package (`shared`). The xrefs handler
        casts `shared.Severity(...)`, so the import collector must resolve the
        qualified request through the project resolver and pull in `shared` — or
        the cast compiles to `undefined: shared`.
      type: object
    XTimestamp:
      description: |-
        XTimestamp is a string-backed scalar with no inherited validator,
        exercising scalar resolution when the scalar has no decorators of
        its own.
      format: datetime
      type: string
    XTypeFields:
      description: |-
        XTypeFields exercises cross-pkg type refs in every shape. Each field
        dispatches `v.Field.Validate()` (or per-element when nested).
      properties:
        byKey:
          additionalProperties:
            $ref: '#/components/schemas/XOwner'
          type: object
        flat:
          $ref: '#/components/schemas/XOwner'
        many:
          items:
            $ref: '#/components/schemas/XOwner'
          type: array
        maybe:
          anyOf:
          - $ref: '#/components/schemas/XOwner'
          - type: "null"
      required:
      - flat
      - many
      - byKey
      type: object
    XTypeMixin:
      allOf:
      - $ref: '#/components/schemas/XAudit'
      - properties:
          id:
            maxLength: 64
            minLength: 1
            type: string
        required:
        - id
        type: object
      description: |-
        XTypeMixin exercises mixin embedding from cross-pkg. The `XAudit`
        mixin's fields land via Go field-promotion; the host's Validate
        calls `v.XAudit.Validate()` explicitly since Go method promotion
        doesn't auto-invoke on the host.
      type: object
    XWirePromoteReq:
      allOf:
      - $ref: '#/components/schemas/XPromoteWire'
      - type: object
      description: |-
        XWirePromoteReq promotes a cross-package scalar bound to @query: the GET
        handler must cast xshared.XEmail and import xshared.
      type: object
    XWrapInBagOfXLocalItem:
      allOf:
      - $ref: '#/components/schemas/XBagOfXLocalItem'
      - properties:
          wrapNote:
            type:
            - string
            - "null"
        type: object
      description: |-
        XParametric is a generic mixin host: `XWrapInBag` embeds `XBag<T>` and a
        consumer instantiates it. The OpenAPI mixin branch must substitute the
        host's type-param into the embedded generic's args, or it registers a
        phantom `XBagOfT` whose element `$ref` dangles.
      type: object
    XWrapInBagOfXOwner:
      allOf:
      - $ref: '#/components/schemas/XBagOfXOwner'
      - properties:
          wrapNote:
            type:
            - string
            - "null"
        type: object
      description: |-
        XParametric is a generic mixin host: `XWrapInBag` embeds `XBag<T>` and a
        consumer instantiates it. The OpenAPI mixin branch must substitute the
        host's type-param into the embedded generic's args, or it registers a
        phantom `XBagOfT` whose element `$ref` dangles.
      type: object
  securitySchemes:
    AdminBearer:
      scheme: bearer
      type: http
    AdminWriteScope:
      scheme: bearer
      type: http
    MFA:
      in: header
      name: X-MFA-Token
      type: apiKey
    ProfileAuth:
      scheme: bearer
      type: http
info:
  title: Cornercase API
  version: 1.0.0
openapi: 3.1.0
paths:
  /:
    get:
      operationId: ListProjects
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectsRespBody'
          description: OK
      tags:
      - ProjectService
  /account-users/ping:
    get:
      description: Ping is a liveness-style endpoint with no body.
      operationId: AccountUserServicePing
      responses:
        "204":
          description: No Content
      tags:
      - AccountUserService
  /account-users/users:
    post:
      description: CreateUser stores a new user and returns the freshly created entity.
      operationId: AccountUserServiceCreateUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUserServiceCreateUserReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountUserServiceCreateUserRespBody'
          description: Created
      tags:
      - AccountUserService
  /account-users/users/{id}:
    delete:
      operationId: AccountUserServiceDeleteUser
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountUserServiceDeleteUserRespBody'
          description: OK
      tags:
      - AccountUserService
    get:
      description: GetUser returns the user identified by req.ID.
      operationId: AccountUserServiceGetUser
      parameters:
      - in: path
        name: id
        required: true
        schema:
          description: id locates the user.
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountUserServiceGetUserRespBody'
          description: OK
      tags:
      - AccountUserService
    put:
      operationId: UpdateUser
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserRespBody'
          description: OK
      tags:
      - AccountUserService
  /account/admin/{id}:
    delete:
      description: 'Delete an account — admin-only. Chain: [RateLimit, BasicAuth,
        Audit].'
      operationId: DeleteAccount
      parameters:
      - in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/ID'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountRespBody'
          description: OK
      tags:
      - account
      - admin
  /account/admin/reset:
    post:
      description: Hard reset — bypasses BasicAuth, uses its own minimal chain.
      operationId: AccountServiceReset
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountServiceResetRespBody'
          description: Created
      tags:
      - account
      - admin
  /account/login:
    post:
      description: Log in — public, only inherits rate limiting.
      operationId: Login
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginRespBody'
          description: Created
      tags:
      - account
  /account/logout:
    post:
      description: Logout — inherits RateLimit + AuthRequired. Also appends Audit
        at method level.
      operationId: Logout
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutRespBody'
          description: Created
      tags:
      - account
      - authenticated
      - audited
  /account/me:
    get:
      description: Get the current user — inherits RateLimit + AuthRequired.
      operationId: Me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeRespBody'
          description: OK
      tags:
      - account
      - authenticated
  /account/signup:
    post:
      description: Sign up — public, only inherits rate limiting.
      operationId: Signup
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupRespBody'
          description: Created
      tags:
      - account
  /admin/inventory:
    get:
      description: List inventory items. Inherits auth + tags from the extend block.
      operationId: AdminInventoryServiceListItems
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminInventoryServiceListItemsRespBody'
          description: OK
      security:
      - AdminBearer: []
      tags:
      - admin
  /admin/inventory/{itemId}/promote:
    post:
      description: Promote an item to the featured slot. Inherits the same auth chain
        plus a method-level admin scope.
      operationId: PromoteItem
      parameters:
      - in: path
        name: itemId
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteItemReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteItemRespBody'
          description: Created
      security:
      - AdminBearer: []
      - AdminWriteScope: []
      tags:
      - admin
  /admin/inventory/health:
    get:
      description: Liveness probe. Public on purpose - operators hit this before secrets
        are loaded.
      operationId: AdminInventoryServiceHealth
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminInventoryServiceHealthRespBody'
          description: OK
      tags:
      - AdminInventoryService
  /bindings/by-color:
    get:
      description: Search by colors with an enum-array @query default. An absent `colors`
        keeps the [Red, Blue] pre-fill; a present `?colors=green` REPLACES it (not
        appends), so the result is exactly the requested set.
      operationId: SearchByColor
      parameters:
      - in: query
        name: colors
        schema:
          default:
          - Red
          - Blue
          items:
            $ref: '#/components/schemas/BindingsColor'
          type:
          - array
          - "null"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchByColorRespBody'
          description: OK
      tags:
      - bindings
  /bindings/health:
    get:
      description: Health probe. No request, no response — just a 200 OK when the
        service is reachable, plus the rate-limit 429 envelope.
      operationId: BindingsServiceHealth
      responses:
        "204":
          description: No Content
        "429":
          content:
