  /v1/admin/dashboard:
    get:
      description: DashboardStats reuses ListProfilesResp as a minimal stat payload.
      operationId: DashboardStats
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStatsRespBody'
          description: OK
      tags:
      - admin
      - ops
      - ops/v2
  /v1/admin/health:
    get:
      description: |-
        Health is path-less so it falls back to the kebab-cased method
        name. End URL: `/api/v1/admin/health`.
      operationId: AdminServiceHealth
      responses:
        "204":
          description: No Content
      tags:
      - admin
      - ops
      - ops/v2
  /v1/admin/profiles:
    get:
      description: |-
        AdminListProfiles is auth-gated. The `@middlewares` decorator
        wraps the handler with ProfileAuth at gen time; unauthenticated
        callers get a 401 from the middleware before the handler runs.
      operationId: AdminListProfiles
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListProfilesRespBody'
          description: OK
      security:
      - ProfileAuth: []
      tags:
      - ProfileService
  /v1/admin/snapshot:
    get:
      description: |-
        Snapshot stacks an additional method-level middleware on top of
        the service-level ProfileAuth chain. The combined order at gen
        time is `[ProfileAuth, RequestStamp]` — ProfileAuth wraps
        outermost, so unauthenticated callers never reach RequestStamp.
        Method-level `@tags(snapshot)` adds to the service-level tags
        list, NOT replacing it — clients see [admin, ops, snapshot].
      operationId: Snapshot
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotRespBody'
          description: OK
      tags:
      - admin
      - ops
      - ops/v2
      - snapshot
  /v1/profiles:
    get:
      description: ListProfiles returns every stored profile in id order.
      operationId: ListProfiles
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProfilesRespBody'
          description: OK
      tags:
      - ProfileService
    post:
      description: |-
        CreateProfile stores a new profile and assigns its id. The handler
        surfaces every error in the @errors list with the matching HTTP
        status driven by its category.
      operationId: CreateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProfileRespBody'
          description: Created
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateEmailErr'
          description: Conflict
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileValidationFailedErr'
          description: UnprocessableEntity
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PfRateLimitedErr'
          description: TooManyRequests
      tags:
      - ProfileService
  /v1/profiles/{id}:
    get:
      description: GetProfile returns the profile with the given id.
      operationId: GetProfile
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfileRespBody'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileNotFoundErr'
          description: NotFound
      tags:
      - ProfileService
    patch:
      description: |-
        PatchProfile exercises every binding kind end-to-end. It echoes
        path id, query dryRun, header X-Idempotency-Key, cookie session,
        and a body displayName so each value's transport binding is
        verifiable.
      operationId: PatchProfile
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      - in: query
        name: dryRun
        required: true
        schema:
          type: string
      - in: header
        name: idempotencyKey
        required: true
        schema:
          type: string
      - in: cookie
        name: sessionToken
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProfileReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatchProfileRespBody'
          description: OK
      tags:
      - ProfileService
  /xrefs/by-key/{key}:
    get:
      description: Pins cross-package mixin @path binding. The {key} segment binds
        through xshared.XPathKey's field; the project-level path-param check must
        resolve the sibling-package mixin or it false-rejects this route.
      operationId: GetByKey
      parameters:
      - in: path
        name: key
        required: true
        schema:
          maxLength: 64
          minLength: 1
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetByKeyRespBody'
          description: OK
      tags:
      - XRefsService
  /xrefs/defaults:
    post:
      description: Pins cross-package enum `@default` pre-fill in transport. Body
        decode must seed `req.Color = &__d` with `__d := xshared.XColorRed` before
        JSON.Decode runs; without resolver the default literal silently drops because
        the local pkg.Enums miss.
      operationId: PostDefault
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostDefaultReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDefaultRespBody'
          description: Created
      tags:
      - XRefsService
  /xrefs/items:
    get:
      description: Pins cross-package response generic. Component must be `XBagOfXOwner`,
        not dangling `xshared.XBag`.
      operationId: XRefsServiceListItems
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XRefsServiceListItemsRespBody'
          description: OK
      tags:
      - XRefsService
  /xrefs/items/{id}:
    get:
      description: Pins cross-package @errors reference. xshared.XNotFound must register
        as a component schema AND appear in the operation's responses[404].body schema.
      operationId: XRefsServiceGetItem
      parameters:
      - in: path
        name: id
        required: true
        schema:
          maxLength: 64
          minLength: 1
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XRefsServiceGetItemRespBody'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XNotFoundErr'
          description: NotFound
      tags:
      - XRefsService
  /xrefs/nested/{gKey}:
    get:
      description: Pins a @path + @default nested two mixin levels deep through a
        cross-package mixin (xshared.XParent embeds xshared.XGrand). The {gKey} segment
        and g32/p64 defaults must all survive flattening — the bare inner XGrand resolves
        as xshared.XGrand.
      operationId: GetNested
      parameters:
      - in: path
        name: gKey
        required: true
        schema:
          maxLength: 40
          minLength: 1
          type: string
      - in: query
        name: g32
        schema:
          default: 7
          type:
          - integer
          - "null"
      - in: query
        name: p64
        schema:
          default: 9
          type:
          - integer
          - "null"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNestedRespBody'
          description: OK
      tags:
      - XRefsService
  /xrefs/promote-bag:
    post:
      description: 'Pins generic-mixin OpenAPI substitution: xshared.XWrapInBag<XOwner>
        must register XBagOfXOwner, no phantom XBagOfT / dangling $ref.'
      operationId: PromoteBag
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteBagReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteBagRespBody'
          description: Created
      tags:
      - XRefsService
  /xrefs/promote-body:
    post:
      description: 'Pins cross-package mixin BODY promotion: the POST handler decodes
        the body (its only body fields are promoted from xshared.XPromoteBody) and
        pre-fills the promoted scalar/enum defaults with qualified casts.'
      operationId: PromoteBody
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteBodyReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteBodyRespBody'
          description: Created
      tags:
      - XRefsService
  /xrefs/promote-holder/{id}:
    post:
      description: Pins a QUALIFIED request type whose fields come from a bare nested
        mixin (xshared.XHolder embeds xshared.XHolderSub). The handler must bind `q`
        from @query and decode `bod` from the body — without threading xshared as
        the flatten prefix both silently drop while the validator still enforces them.
      operationId: PromoteHolder
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      - in: query
        name: q
        required: true
        schema:
          maxLength: 5
          minLength: 2
          type: string
      - in: query
        name: limit
        schema:
          default: 50
          type:
          - integer
          - "null"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteHolderReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteHolderRespBody'
          description: Created
      tags:
      - XRefsService
  /xrefs/promote-wire:
    get:
      description: 'Pins cross-package scalar @query promotion: the GET handler casts
        xshared.XEmail and imports xshared, both needing the promoted field''s type
        re-qualified.'
      operationId: PromoteWire
      parameters:
      - in: query
        name: q
        required: true
        schema:
          $ref: '#/components/schemas/XEmail'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteWireRespBody'
          description: OK
      tags:
      - XRefsService
  /xrefs/search:
    get:
      description: Pins cross-package scalar BINDING casts. Handler must emit `req.Q
        = xshared.XEmail(r.URL.Query().Get("q"))` (qualified cast) — bare strings
        fail to compile against the *xshared.XEmail field type.
      operationId: Search
      parameters:
      - in: query
        name: q
        required: true
        schema:
          $ref: '#/components/schemas/XEmail'
      - in: query
        name: num
        required: true
        schema:
          $ref: '#/components/schemas/XNodeID'
      - in: header
        name: hdr
        required: true
        schema:
          $ref: '#/components/schemas/XEmail'
      - in: cookie
        name: ck
        required: true
        schema:
          $ref: '#/components/schemas/XEmail'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchRespBody'
          description: OK
      tags:
      - XRefsService
  /xrefs/third/{id}:
    get:
      description: 'Pins a QUALIFIED request whose field reaches a THIRD package (xshared.XThirdReq.sev
        is shared.Severity). The xrefs handler casts shared.Severity(...), so the
        import collector must resolve the qualified request and pull in `shared` —
        else `undefined: shared`. Also pins an error (XMixinErr) whose body embeds
        a cross-package mixin, so the error emitter''s import walk must collect xshared.'
      operationId: GetThird
      parameters:
      - in: path
        name: id
        required: true
        schema:
          maxLength: 64
          minLength: 1
          type: string
      - in: query
        name: sev
        required: true
        schema:
          $ref: '#/components/schemas/Severity'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetThirdRespBody'
          description: OK
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XMixinErr'
          description: Conflict
      tags:
      - XRefsService
  /xrefs/traced/{id}:
    get:
      description: Pins a QUALIFIED cross-package RESPONSE with @header/@cookie (xshared.XHeaderResp).
        The handler must write w.Header().Set / http.SetCookie even though the response
        type is cross-package — else the values silently drop (json:"-") while OpenAPI
        advertises them.
      operationId: GetTraced
      parameters:
      - in: path
        name: id
        required: true
        schema:
          maxLength: 64
          minLength: 1
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTracedRespBody'
          description: OK
          headers:
            Set-Cookie:
              description: 'Sets cookies: xs-session'
              schema:
                type: string
            X-Trace-Id:
              schema:
                type: string
      tags:
      - XRefsService
  /xrefs/wrap-local:
    post:
      description: 'Pins a QUALIFIED GENERIC request with a LOCAL type-arg (xshared.XWrapInBag<XLocalItem>).
        The handler renders `var req xshared.XWrapInBag[types.XLocalItem]`, so it
        must keep the canonical `types` import for the local arg even though the outer
        type is cross-package — otherwise `undefined: types`.'
      operationId: WrapLocal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WrapLocalReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrapLocalRespBody'
          description: Created
      tags:
      - XRefsService
servers:
- url: /api
