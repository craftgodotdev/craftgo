    PageSize:
      description: |-
        PageSize is a numeric scalar — every field of this type inherits
        the @gte/@lte bounds, carried on PageSize.Validate(). Used in
        DefaultScalar below to verify that the @default literal threads
        through the scalar's defined type without losing the inherited
        validators.
      maximum: 100
      minimum: 1
      type: integer
    PageWithAuditOfScalarsOrder:
      allOf:
      - $ref: '#/components/schemas/AuditFields'
      - properties:
          items:
            items:
              $ref: '#/components/schemas/ScalarsOrder'
            type: array
          total:
            type: integer
        required:
        - items
        - total
        type: object
      description: |-
        GenericWithMixin exercises mixin substitution through generics: a
        generic body that embeds a mixin carries the mixin's fields through
        instantiation. `PageWithAudit<T>` mixes `AuditFields` inside its
        body; the substituted `PageWithAudit<Order>` component lists
        `createdAt` / `updatedAt` (from AuditFields) in addition to its own
        `items` / `total`.
      type: object
    PaginatedResp:
      description: |-
        PaginatedResp carries a JSON list plus response-only fields:
        `X-Total-Count` advertises the total (a non-string int, formatted via
        strconv.Itoa), `X-Next-Page` is an optional header (nil-guarded so an
        absent value writes no header at all), `has_more` is a bool cookie
        (strconv.FormatBool), and the `session` cookie refreshes the auth
        token without a separate /refresh round trip. All four stay out of
        the JSON body via the runtime header/cookie writers.
      properties:
        items:
          items:
            $ref: '#/components/schemas/ID'
          type: array
      required:
      - items
      type: object
    Pagination:
      description: |-
        Pagination is the canonical cursor/limit envelope every list
        endpoint embeds. `limit` carries the standard 1..100 cap with a
        pre-fill of 20 when the caller omits it; `cursor` is the opaque
        continuation token returned by the previous page; `total` is the
        optional total-count summary (omitted when the upstream store can
        not cheaply compute it).

        Consumers embed this DTO via the implicit mixin form
        (`type ListUsersReq { shared.Pagination  query string? }`) so the
        pagination contract stays identical across services without copy-
        paste.
      properties:
        cursor:
          type:
          - string
          - "null"
        limit:
          default: 20
          maximum: 100
          minimum: 1
          type:
          - integer
          - "null"
        total:
          type:
          - integer
          - "null"
      type: object
    PairOfScalarsOrderAndProductRef:
      description: |-
        Pair<A, B> is the multi-parameter generic. Each field references
        a distinct type parameter so the codegen substitutes two
        arguments at the concrete site.
      properties:
        left:
          $ref: '#/components/schemas/ScalarsOrder'
        right:
          $ref: '#/components/schemas/ProductRef'
      required:
      - left
      - right
      type: object
    PairUserOrder:
      description: |-
        PairUserOrder forces a multi-parameter instantiation through the
        emitter: `Pair<Order, ProductRef>` must emit `PairOfOrderAndProductRef`
        (the `And` separator distinguishes args). Reuse the existing scalars
        types so the fixture stays self-contained.
      properties:
        pair:
          $ref: '#/components/schemas/PairOfScalarsOrderAndProductRef'
      required:
      - pair
      type: object
    PairsArr:
      description: "PairsArr stacks the array-level decorators (@minItems, @maxItems,\n@uniqueItems).
        Per-element constraints belong on a scalar: declare\nthe element type as a
        named scalar and the validator walker emits\nthe inner checks automatically
        through scalar leaf inheritance —\nno explicit per-element decorator required.\n\n\tscalar
        Tag string @length(1, 20)\n\ttype PairsArr { tags Tag[] @minItems(1) @maxItems(10)
        @uniqueItems }"
      properties:
        tags:
          items:
            type: string
          maxItems: 10
          minItems: 1
          type: array
          uniqueItems: true
      required:
      - tags
      type: object
    PairsChoice:
      allOf:
      - properties:
          a:
            type:
            - string
            - "null"
          b:
            type:
            - string
            - "null"
          c:
            type:
            - string
            - "null"
        type: object
      - not:
          properties:
            a:
              not:
                type: "null"
            b:
              not:
                type: "null"
          required:
          - a
          - b
      - anyOf:
        - properties:
            a:
              not:
                type: "null"
          required:
          - a
        - properties:
            b:
              not:
                type: "null"
          required:
          - b
        - properties:
            c:
              not:
                type: "null"
          required:
          - c
      description: |-
        PairsChoice puts @mutuallyExclusive and @requiresOneOf on the same
        type with overlapping field references. The semantics layer should
        treat the two decorators as orthogonal:

          - @mutuallyExclusive(a, b): at most one of a / b may be present.
          - @requiresOneOf(a, b, c):  at least one of a / b / c is present.

        So `c` alone satisfies the file, and `a` alone or `b` alone is also
        valid; sending both `a` and `b` fails the exclusivity check even if
        `c` is absent.
      type: object
    PairsContact:
      allOf:
      - properties:
          email:
            format: email
            type:
            - string
            - "null"
          phone:
            pattern: ^\+\d+$
            type:
            - string
            - "null"
        type: object
      - anyOf:
        - properties:
            email:
              not:
                type: "null"
          required:
          - email
        - properties:
            phone:
              not:
                type: "null"
          required:
          - phone
      description: |-
        PairsContact pairs a type-level @requiresOneOf with two per-field
        decorator stacks. The wire payload must carry at least one of email
        / phone; when present, each field is independently validated by its
        own decorator chain.
      type: object
    PairsNum:
      description: |-
        PairsNum stacks @range (lo,hi pair) with @multipleOf and the
        strict-bound @gt / @lte. Both the soft and strict bounds are present
        so the validator firing order is visible in the generated code:
        each decorator should emit one comparison.
      properties:
        score:
          exclusiveMinimum: -1
          maximum: 99
          minimum: 0
          multipleOf: 5
          type: integer
      required:
      - score
      type: object
    PairsStr:
      description: |-
        PairsStr stacks every string validator the generator supports on a
        single field, plus a separate field for the cheap baseline.

          - email: @length + @format(email) + @pattern — all four constraints
            fire in declaration order. The pattern is a domain restriction
            on top of the format check.
      properties:
        email:
          format: email
          maxLength: 254
          minLength: 3
          pattern: ^.*@example\.com$
          type: string
      required:
      - email
      type: object
    PatchProfileReq:
      description: |-
        PatchProfileReq mixes every binding kind in a single request: path id,
        query dryRun, header idempotency key, cookie session, and a body
        payload containing the new display name. The handler binds each from
        the matching part of the HTTP request.
      properties:
        displayName:
          maxLength: 50
          minLength: 1
          type: string
      required:
      - displayName
      type: object
    PatchProfileReqBody:
      properties:
        displayName:
          maxLength: 50
          minLength: 1
          type: string
      required:
      - displayName
      type: object
    PatchProfileResp:
      description: |-
        PatchProfileResp is the symmetric response: echoes back every value
        the handler bound so the e2e test can assert end-to-end.
      properties:
        displayName:
          type: string
        dryRun:
          type: string
        id:
          type: string
        idempotencyKey:
          type: string
        sessionToken:
          type: string
      required:
      - id
      - dryRun
      - idempotencyKey
      - sessionToken
      - displayName
      type: object
    PatchProfileRespBody:
      $ref: '#/components/schemas/PatchProfileResp'
    PathEnumReq:
      description: |-
        PathEnumReq drives the enum-typed @path binder. The wire value is
        a string ("red" / "green" / "blue"); req.Validate() rejects any
        value outside the enum's declared set.
      type: object
    PathExplicitNameReq:
      description: |-
        PathExplicitNameReq exercises the `@path("user_id")` form where the
        DSL field name (`userId`) differs from the URL placeholder
        (`{user_id}`). The codegen binds against the explicit wire name so
        the generated handler reads `r.PathValue("user_id")`.
      type: object
    PathScalarReq:
      description: |-
        PathScalarReq replaces the bare `string` with the UUID scalar. The
        generator emits `req.Id = UUID(r.PathValue("id"))` so the field
        lands as the typed alias and the inherited @format(uuid) validator
        fires at request time.
      type: object
    PathStringReq:
      description: |-
        PathStringReq is the canonical path-bound DTO: a single `id string`
        field that auto-binds (or explicitly binds) to the `{id}` segment
        of `/items/{id}`.
      type: object
    Percent:
      description: |-
        Percent is a 0-1 ratio. @gte/@lte on a float64 scalar exercises
        the numeric-bound emitter on a non-integer primitive.
      maximum: 1
      minimum: 0
      type: number
    Person:
      description: |-
        Person → Home → Room → Furniture chain. Each level adds one
        nested call to the validator dispatch, demonstrating that the
        cascade carries the deepest violation back to the top.
      properties:
        home:
          $ref: '#/components/schemas/Home'
      required:
      - home
      type: object
    PfAddress:
      description: |-
        PfAddress is a postal address. Country is the ISO 3166-1 alpha-2 code,
        so the length validator pins it to exactly two characters.
      properties:
        city:
          maxLength: 100
          minLength: 1
          type: string
        coords:
          anyOf:
          - $ref: '#/components/schemas/Coords'
          - type: "null"
        country:
          maxLength: 2
          minLength: 2
          type: string
        postal:
          type:
          - string
          - "null"
        street:
          maxLength: 200
          minLength: 1
          type: string
      required:
      - street
      - city
      - country
      type: object
    PfRateLimitedErr:
      description: TooManyRequests error response (HTTP 429).
      properties:
        code:
          default: RATE_LIMITED
          type:
          - string
          - "null"
        message:
          default: Slow down, please
          type:
          - string
          - "null"
        retry_after:
          type: integer
      required:
      - retry_after
      type: object
    PostDefaultReqBody:
      description: |-
        XEnumDefault exercises `@default(Red)` on a cross-pkg enum field:
        the enum value is referenced by bare ident, not a string literal,
        since enum identity is by name. Transport pre-fill qualifies the
        constant (`xshared.XColorRed`) and registers the xshared import on
        the handler file.
      properties:
        color:
          anyOf:
          - $ref: '#/components/schemas/XColor'
          - type: "null"
          default: Red
      type: object
    PostDefaultRespBody:
      $ref: '#/components/schemas/XOwner'
    PresenceMatrix:
      description: |-
        PresenceMatrix is the canonical presence-state matrix.

        Row map (DSL → Go → wire contract):

          plain        string                          → string   required, non-null
          optional     string?                         → *string  optional, may be omitted OR null
          nullable     string @nullable                → *string  required, value may be JSON null
          bothNullable string? @nullable               → *string  4-state (same as optional, redundant @nullable)
          defValue     string? @default("d")           → *string  optional + pre-fill (the `?` is mandatory under @default)
          defNullable  string? @nullable @default("d") → *string  optional + nullable + pre-fill

        Wire contract diffs row-by-row (OpenAPI 3.1: null rides the `type`
        list, so a nullable string is `type: [string, "null"]`):

          plain:        required[] yes, type: string
          optional:     required[] no,  type: [string, "null"]
          nullable:     required[] yes, type: [string, "null"]
          bothNullable: required[] no,  type: [string, "null"]
          defValue:     required[] no,  type: [string, "null"], default: "d"
          defNullable:  required[] no,  type: [string, "null"], default: "d"

        The `bothNullable` and `defNullable` rows trip the "redundant
        @nullable on `T?`" warning (the optionality already permits null);
        the linter should surface that without rejecting the file.
      properties:
        bothNullable:
          type:
          - string
          - "null"
        defNullable:
          default: d
          type:
          - string
          - "null"
        defValue:
          default: d
          type:
          - string
          - "null"
        nullable:
          type:
          - string
          - "null"
        optional:
          type:
          - string
          - "null"
        plain:
          type: string
      required:
      - plain
      - nullable
      type: object
    PriceReq:
      description: PriceReq wraps NumberPrice (float surface).
      properties:
        body:
          $ref: '#/components/schemas/NumberPrice'
      required:
      - body
      type: object
    Priority:
      description: |-
        Priority is a small local enum used purely to exercise a generic
        instantiated over an ENUM type parameter (`Page<Priority>`).
      enum:
      - low
      - medium
      - high
      type: string
    ProductPage:
      description: |-
        ProductPage instantiates Page<ProductRef> — separate scalar set
        proves that two concrete instantiations coexist without name
        clashes in the Validate generator.
      properties:
        page:
          $ref: '#/components/schemas/PageOfProductRef'
      required:
      - page
      type: object
    ProductRef:
      description: ProductRef exercises NonEmpty + Cents on a smaller surface.
      properties:
        price:
          allOf:
          - $ref: '#/components/schemas/Cents'
          description: 'SCALAR REF: Cents enforces @gte(0) + @lte(1000000000).'
        sku:
          allOf:
          - $ref: '#/components/schemas/NonEmpty'
          description: 'SCALAR REF: NonEmpty enforces @minLength(1).'
      required:
      - sku
      - price
      type: object
    Profile:
      description: |-
        Profile is the wire-level shape of a user profile, nesting a
        ContactInfo plus a slice of Addresses, each of which optionally
        embeds a Coords value.
      properties:
        addresses:
          items:
            $ref: '#/components/schemas/PfAddress'
          maxItems: 5
          minItems: 1
          type: array
        age:
          type:
          - integer
          - "null"
        contacts:
          $ref: '#/components/schemas/ContactInfo'
        displayName:
          maxLength: 50
          minLength: 1
          type: string
        id:
          type: string
        meta:
          additionalProperties:
            type: string
          type: object
        tags:
          items:
            type: string
          maxItems: 10
          type: array
      required:
      - id
      - displayName
      - contacts
      - addresses
      - tags
      - meta
      type: object
    ProfileNotFoundErr:
      description: NotFound error response (HTTP 404).
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
      type: object
    ProfileValidationFailedErr:
      description: UnprocessableEntity error response (HTTP 422).
      properties:
        code:
          default: PROFILE_VALIDATION_FAILED
          type:
          - string
          - "null"
        fields:
          items:
            type: string
          type: array
      required:
      - fields
      type: object
    Project:
      description: |-
        Project carries the cross-package `shared.ID` scalar (Go field
        type: `string`, validators inherited from the scalar decl) and
        the SAME-PACKAGE `UserRef` nested type — exercise of both the
        qualified and the bare type-reference paths in one DTO.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          minLength: 1
          type: string
        owner:
          $ref: '#/components/schemas/UserRef'
      required:
      - id
      - name
      - owner
      type: object
    ProjectsResp:
      description: |-
        ProjectsResp wraps a slice in an envelope so the response shape
        stays inside what `parseNamedTypeRef` accepts: the method body's
        `response` slot is a NamedTypeRef and never sees the array-suffix
        branch, so `response Project[]` does not parse.
      properties:
        items:
          items:
            $ref: '#/components/schemas/Project'
          type: array
      required:
      - items
      type: object
    PromoteBagReqBody:
      allOf:
      - $ref: '#/components/schemas/XWrapInBagOfXOwner'
      - type: object
      description: |-
        XBagPromoteReq instantiates the generic mixin host xshared.XWrapInBag
        (which embeds XBag<T>); OpenAPI must register XBagOfXOwner, not a phantom
        XBagOfT with a dangling element $ref.
      type: object
    PromoteBagRespBody:
      $ref: '#/components/schemas/XOwner'
    PromoteBodyReqBody:
      allOf:
      - $ref: '#/components/schemas/XPromoteBody'
      - type: object
      description: |-
        XBodyPromoteReq promotes a cross-package mixin's BODY fields: the POST
        handler must emit the JSON decode (its only body fields come from the
        mixin) and pre-fill the promoted scalar / enum defaults with qualified
        casts (xshared.XSize(20), xshared.XColorGreen).
      type: object
    PromoteBodyRespBody:
      $ref: '#/components/schemas/XOwner'
    PromoteHolderReqBody:
      properties:
        bod:
          maxLength: 10
          minLength: 1
          type: string
      required:
      - bod
      type: object
    PromoteHolderRespBody:
      $ref: '#/components/schemas/XOwner'
    PromoteItemReq:
      description: |-
        PromoteItemReq is path-bound by `itemId` and carries the slot
        position as a body field. `slot` is a positive int with a
        reasonable upper bound so out-of-range requests bounce at the
        transport gate.
      properties:
        itemId:
          minLength: 1
          type: string
        slot:
          maximum: 100
          minimum: 1
          type: integer
      required:
      - itemId
      - slot
      type: object
    PromoteItemReqBody:
      properties:
        slot:
          maximum: 100
          minimum: 1
          type: integer
      required:
      - slot
      type: object
    PromoteItemRespBody:
      $ref: '#/components/schemas/EntitlementsAuditTrail'
    PromoteWireRespBody:
      $ref: '#/components/schemas/XOwner'
    QuarantineRespBody:
      $ref: '#/components/schemas/HealthResp'
    QueryArrayEnumDefaultReq:
      description: |-
        QueryArrayEnumDefaultReq drives the enum-array @query @default path.
        The slice is pre-filled with the wire values of the default members
        ([Red, Blue]); the binder must REPLACE that pre-fill when the param
        is present, not append to it — so `?colors=green` yields ["green"],
        never ["red", "green", "blue"]. The has-default oracle the binder
        consults resolves the enum-member array literal so it agrees with the
        pre-fill that emitted the default.
      type: object
    QueryArrayIntReq:
      description: |-
        QueryArrayIntReq drives the `[]int @query` shape. Each repeated
        value goes through strconv.ParseInt + append; one bad value fails
        the whole request with HTTP 400.
      type: object
    QueryArrayStringReq:
      description: |-
        QueryArrayStringReq exercises the `[]string @query` shape. The
        generator emits `req.Tags = r.URL.Query()["tags"]` — repeated
        `?tags=a&tags=b` lands as `["a", "b"]`. CSV (`?tags=a,b`) is NOT
        auto-split.
      type: object
    QueryBoolReq:
      description: |-
        QueryBoolReq is the optional-bool query path: present → `*bool`,
        absent / empty → nil.
      type: object
    QueryEnumReq:
      description: |-
        QueryEnumReq drives the enum cast path through @query. Enums are
        string-shape on the wire, so optional is fine — the binder reads
        the raw string and casts up to the Color alias.
      type: object
    QueryIntReq:
      description: |-
        QueryIntReq is the optional-int query path. The binder reads the raw
        string, parses it on presence, and writes a `*int`; an absent or empty
        `?page=` leaves the field nil. `@gte(1)` runs on the dereferenced value.
      type: object
    QueryIntRequiredReq:
      description: |-
        QueryIntRequiredReq is the required-int variant: an absent `page`
        leaves the field at its zero value, and `@gte(1)` then rejects it.
      type: object
    QueryRequiredReq:
      description: |-
        QueryRequiredReq is the canonical "always required, capped" query
        param. Codegen emits the int parser with @gte / @lte gates so
        `?limit=0` and `?limit=101` are both rejected.
      type: object
    QueryStringReq:
      description: |-
        QueryStringReq exercises the optional-string query path. The
        generator emits a nil-guarded pointer write because Go has a clean
        "absent vs empty" sentinel for `*string`.
      type: object
    RateLimitExceededErr:
      description: TooManyRequests error response (HTTP 429).
      properties:
        retryAfter:
          minimum: 1
          type: integer
      required:
      - retryAfter
      type: object
    RateLimitedErr:
      description: TooManyRequests error response (HTTP 429).
      properties:
        code:
          type: string
        message:
          type: string
      required:
