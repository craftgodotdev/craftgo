info:
  title: Profiles API
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/admin/dashboard:
    get:
      description: DashboardStats reuses ListProfilesResp as a minimal stat payload.
      operationId: DashboardStats
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStatsRespBody'
          description: OK
        default:
          description: ""
      tags:
      - admin
      - ops
  /v1/admin/health:
    get:
      description: |-
        Health is path-less so it falls back to the kebab-cased method
        name. End URL: `/api/v1/admin/health`.
      operationId: Health
      responses:
        "204":
          description: No Content
        default:
          description: ""
      tags:
      - admin
      - ops
  /v1/admin/profiles:
    get:
      description: |-
        AdminListProfiles is the auth-gated demo. The `@middlewares`
        decorator wraps the handler with AuthRequired at gen time;
        unauthenticated callers get a 401 from the middleware before the
        handler runs.
      operationId: AdminListProfiles
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListProfilesRespBody'
          description: OK
        default:
          description: ""
      security:
      - AuthRequired: []
      tags:
      - ProfileService
  /v1/admin/snapshot:
    get:
      description: |-
        Snapshot stacks an additional method-level middleware on top of
        the service-level AuthRequired chain. The combined order at gen
        time is `[AuthRequired, RequestStamp]` — AuthRequired wraps
        outermost, so unauthenticated callers never reach RequestStamp.
        Method-level `@tags(snapshot)` adds to the service-level tags
        list, NOT replacing it — clients see [admin, ops, snapshot].
      operationId: Snapshot
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotRespBody'
          description: OK
        default:
          description: ""
      tags:
      - admin
      - ops
      - snapshot
  /v1/profiles:
    get:
      description: ListProfiles returns every stored profile in id order.
      operationId: ListProfiles
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProfilesRespBody'
          description: OK
        default:
          description: ""
      tags:
      - ProfileService
    post:
      description: |-
        CreateProfile stores a new profile and assigns its id. The handler
        surfaces every error in the @errors list with the matching HTTP
        status driven by its category.
      operationId: CreateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProfileRespBody'
          description: Created
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateEmailErr'
          description: Conflict
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileValidationFailedErr'
          description: UnprocessableEntity
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitedErr'
          description: TooManyRequests
        default:
          description: ""
      tags:
      - ProfileService
  /v1/profiles/{id}:
    get:
      description: GetProfile returns the profile with the given id.
      operationId: GetProfile
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfileRespBody'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileNotFoundErr'
          description: NotFound
        default:
          description: ""
      tags:
      - ProfileService
    patch:
      description: |-
        PatchProfile is the every-binding-kind end-to-end demo. It echoes
        path id, query dryRun, header X-Idempotency-Key, cookie session,
        and a body displayName so the e2e test can verify that each value
        arrived through the matching part of the HTTP request.
      operationId: PatchProfile
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      - in: query
        name: dryRun
        required: true
        schema:
          type: string
      - in: header
        name: idempotencyKey
        required: true
        schema:
          type: string
      - in: cookie
        name: sessionToken
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProfileReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatchProfileRespBody'
          description: OK
        default:
          description: ""
      tags:
      - ProfileService
  /xrefs/defaults:
    post:
      description: Pins cross-package enum `@default` pre-fill in transport. Body
        decode must seed `req.Color = &__d` with `__d := xshared.XColorRed` before
        JSON.Decode runs; without resolver the default literal silently drops because
        the local pkg.Enums miss.
      operationId: PostDefault
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostDefaultReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDefaultRespBody'
          description: Created
        default:
          description: ""
      tags:
      - XRefsService
  /xrefs/items:
    get:
      description: Pins cross-package response generic. Component must be `XBagOfXOwner`,
        not dangling `xshared.XBag`.
      operationId: ListItems
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListItemsRespBody'
          description: OK
        default:
          description: ""
      tags:
      - XRefsService
  /xrefs/items/{id}:
    get:
      description: Pins cross-package @errors reference. xshared.XNotFound must register
        as a component schema AND appear in the operation's responses[404].body schema.
      operationId: GetItem
      parameters:
      - in: path
        name: id
        required: true
        schema:
          maxLength: 64
          minLength: 1
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetItemRespBody'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XNotFoundErr'
          description: NotFound
        default:
          description: ""
      tags:
      - XRefsService
  /xrefs/search:
    get:
      description: Pins cross-package scalar BINDING casts. Handler must emit `req.Q
        = xshared.XEmail(r.URL.Query().Get("q"))` (qualified cast) — bare strings
        fail to compile against the *xshared.XEmail field type.
      operationId: Search
      parameters:
      - in: query
        name: q
        required: true
        schema:
          $ref: '#/components/schemas/XEmail'
      - in: query
        name: num
        required: true
        schema:
          $ref: '#/components/schemas/XNodeID'
      - in: header
        name: hdr
