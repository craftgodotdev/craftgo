        gtLtUint16:
          exclusiveMaximum: 65535
          exclusiveMinimum: 0
          type: integer
        gtLtUint32:
          exclusiveMaximum: 4294967295
          exclusiveMinimum: 0
          type: integer
        gtLtUint64:
          exclusiveMaximum: 1000000000000
          exclusiveMinimum: 0
          type: integer
        gteLteUint:
          maximum: 1000
          minimum: 0
          type: integer
        gteLteUint8:
          maximum: 255
          minimum: 0
          type: integer
        gteLteUint16:
          maximum: 65535
          minimum: 0
          type: integer
        gteLteUint32:
          maximum: 4294967295
          minimum: 0
          type: integer
        gteLteUint64:
          maximum: 1000000000000
          minimum: 0
          type: integer
        posUint:
