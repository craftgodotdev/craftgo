          $ref: '#/components/schemas/PairOfScalarsOrderAndProductRef'
      required:
      - pair
      type: object
    PairsArr:
      description: "PairsArr stacks the array-level decorators (@minItems, @maxItems,\n@uniqueItems).
        Per-element constraints belong on a scalar: declare\nthe element type as a
        named scalar and the validator walker emits\nthe inner checks automatically
        through scalar leaf inheritance —\nno explicit per-element decorator required.\n\n\tscalar
        Tag string @length(1, 20)\n\ttype PairsArr { tags Tag[] @minItems(1) @maxItems(10)
        @uniqueItems }"
      properties:
        tags:
          items:
            type: string
          maxItems: 10
          minItems: 1
          type: array
          uniqueItems: true
      required:
      - tags
      type: object
    PairsChoice:
      allOf:
      - properties:
          a:
            type:
            - string
            - "null"
          b:
            type:
            - string
            - "null"
          c:
            type:
            - string
            - "null"
        type: object
      - not:
          required:
          - a
          - b
      - anyOf:
        - required:
          - a
        - required:
          - b
        - required:
          - c
      description: |-
        PairsChoice puts @mutuallyExclusive and @requiresOneOf on the same
        type with overlapping field references. The semantics layer should
        treat the two decorators as orthogonal:

          - @mutuallyExclusive(a, b): at most one of a / b may be present.
          - @requiresOneOf(a, b, c):  at least one of a / b / c is present.

        So `c` alone satisfies the file, and `a` alone or `b` alone is also
        valid; sending both `a` and `b` fails the exclusivity check even if
        `c` is absent.
      type: object
    PairsContact:
      allOf:
      - properties:
          email:
            format: email
            type:
            - string
            - "null"
          phone:
            pattern: ^\+\d+$
            type:
            - string
            - "null"
        type: object
      - anyOf:
        - required:
          - email
        - required:
          - phone
      description: |-
        PairsContact pairs a type-level @requiresOneOf with two per-field
        decorator stacks. The wire payload must carry at least one of email
        / phone; when present, each field is independently validated by its
        own decorator chain.
      type: object
    PairsNum:
      description: |-
        PairsNum stacks @range (lo,hi pair) with @multipleOf and the
        strict-bound @gt / @lte. Both the soft and strict bounds are present
        so the validator firing order is visible in the generated code:
        each decorator should emit one comparison.
      properties:
        score:
          exclusiveMinimum: -1
          maximum: 99
          minimum: 0
          multipleOf: 5
          type: integer
      required:
      - score
      type: object
    PairsStr:
      description: |-
        PairsStr stacks every string validator the generator supports on a
        single field, plus a separate field for the cheap baseline.

          - email: @length + @format(email) + @pattern — all four constraints
            fire in declaration order. The pattern is a domain restriction
            on top of the format check.
      properties:
        email:
          format: email
          maxLength: 254
          minLength: 3
          pattern: ^.*@example\.com$
          type: string
      required:
      - email
      type: object
    PathEnumReq:
      description: |-
        PathEnumReq drives the enum-typed @path binder. The wire value is
        a string ("red" / "green" / "blue"); req.Validate() rejects any
        value outside the enum's declared set.
      properties:
        c:
          $ref: '#/components/schemas/BindingsColor'
      required:
      - c
      type: object
    PathExplicitNameReq:
      description: |-
        PathExplicitNameReq exercises the `@path("user_id")` form where the
        DSL field name (`userId`) differs from the URL placeholder
        (`{user_id}`). The codegen binds against the explicit wire name so
        the generated handler reads `r.PathValue("user_id")`.
      properties:
        userId:
          maxLength: 64
          minLength: 1
          type: string
      required:
      - userId
      type: object
    PathScalarReq:
      description: |-
        PathScalarReq replaces the bare `string` with the UUID scalar. The
        generator emits `req.Id = UUID(r.PathValue("id"))` so the field
        lands as the typed alias and the inherited @format(uuid) validator
        fires at request time.
      properties:
        id:
          $ref: '#/components/schemas/BindingsUUID'
      required:
      - id
      type: object
    PathStringReq:
      description: |-
        PathStringReq is the canonical path-bound DTO: a single `id string`
        field that auto-binds (or explicitly binds) to the `{id}` segment
        of `/items/{id}`.
      properties:
        id:
          maxLength: 64
          minLength: 1
          type: string
      required:
      - id
      type: object
    Percent:
      maximum: 1
      minimum: 0
      type: number
    Person:
      description: |-
        Person → Home → Room → Furniture chain. Each level adds one
        nested call to the validator dispatch, demonstrating that the
        cascade carries the deepest violation back to the top.
      properties:
        home:
          $ref: '#/components/schemas/Home'
      required:
      - home
      type: object
    PresenceMatrix:
      description: |-
        PresenceMatrix is the canonical presence-state matrix.

        Row map (DSL → Go → wire contract):

          plain        string                          → string   required, non-null
          optional     string?                         → *string  optional, may be omitted OR null
          nullable     string @nullable                → *string  required, value may be JSON null
          bothNullable string? @nullable               → *string  4-state (same as optional, redundant @nullable)
          defValue     string? @default("d")           → *string  optional + pre-fill (the `?` is mandatory under @default)
          defNullable  string? @nullable @default("d") → *string  optional + nullable + pre-fill

        Wire contract diffs row-by-row (OpenAPI 3.1: null rides the `type`
        list, so a nullable string is `type: [string, "null"]`):

          plain:        required[] yes, type: string
          optional:     required[] no,  type: [string, "null"]
          nullable:     required[] yes, type: [string, "null"]
          bothNullable: required[] no,  type: [string, "null"]
          defValue:     required[] no,  type: [string, "null"], default: "d"
          defNullable:  required[] no,  type: [string, "null"], default: "d"

        The `bothNullable` and `defNullable` rows trip the "redundant
        @nullable on `T?`" warning (the optionality already permits null);
        the linter should surface that without rejecting the file.
      properties:
        bothNullable:
          type:
          - string
          - "null"
        defNullable:
          default: d
          type:
          - string
          - "null"
        defValue:
          default: d
          type:
          - string
          - "null"
        nullable:
          type:
          - string
          - "null"
        optional:
          type:
          - string
          - "null"
        plain:
          type: string
      required:
      - plain
      - nullable
      type: object
    PriceReq:
      description: PriceReq wraps NumberPrice (float surface).
      properties:
        body:
          $ref: '#/components/schemas/NumberPrice'
      required:
      - body
      type: object
    Priority:
      enum:
      - low
      - medium
      - high
      type: string
    ProductPage:
      description: |-
        ProductPage instantiates Page<ProductRef> — separate scalar set
        proves that two concrete instantiations coexist without name
        clashes in the Validate generator.
      properties:
        page:
          $ref: '#/components/schemas/PageOfProductRef'
      required:
      - page
      type: object
    ProductRef:
      description: ProductRef exercises NonEmpty + Cents on a smaller surface.
      properties:
        price:
          $ref: '#/components/schemas/Cents'
        sku:
          $ref: '#/components/schemas/NonEmpty'
      required:
      - sku
      - price
      type: object
    Project:
      description: |-
        Project carries the cross-package `shared.ID` scalar (Go field
        type: `string`, validators inherited from the scalar decl) and
        the SAME-PACKAGE `UserRef` nested type — exercise of both the
        qualified and the bare type-reference paths in one DTO.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          minLength: 1
          type: string
        owner:
          $ref: '#/components/schemas/UserRef'
      required:
      - id
      - name
      - owner
      type: object
    ProjectsResp:
      description: |-
        ProjectsResp wraps a slice in an envelope so the response shape
        stays inside what `parseNamedTypeRef` accepts: the method body's
        `response` slot is a NamedTypeRef and never sees the array-suffix
        branch, so `response Project[]` does not parse.
      properties:
        items:
          items:
            $ref: '#/components/schemas/Project'
          type: array
      required:
      - items
      type: object
    PromoteItemReq:
      description: |-
        PromoteItemReq is path-bound by `itemId` and carries the slot
        position as a body field. `slot` is a positive int with a
        reasonable upper bound so out-of-range requests bounce at the
        transport gate.
      properties:
        itemId:
          minLength: 1
          type: string
        slot:
          maximum: 100
          minimum: 1
          type: integer
      required:
      - itemId
      - slot
      type: object
    PromoteItemReqBody:
      properties:
        slot:
          maximum: 100
          minimum: 1
          type: integer
      required:
      - slot
      type: object
    PromoteItemRespBody:
      $ref: '#/components/schemas/EntitlementsAuditTrail'
    QuarantineRespBody:
      $ref: '#/components/schemas/HealthResp'
    QueryArrayIntReq:
      description: |-
        QueryArrayIntReq drives the `[]int @query` shape. Each repeated
        value goes through strconv.ParseInt + append; one bad value fails
        the whole request with HTTP 400.
      properties:
        ids:
          items:
            type: integer
          type:
          - array
          - "null"
      type: object
    QueryArrayStringReq:
      description: |-
        QueryArrayStringReq exercises the `[]string @query` shape. The
        generator emits `req.Tags = r.URL.Query()["tags"]` — repeated
        `?tags=a&tags=b` lands as `["a", "b"]`. CSV (`?tags=a,b`) is NOT
        auto-split.
      properties:
        tags:
          items:
            type: string
          type:
          - array
          - "null"
      type: object
    QueryBoolReq:
      description: |-
        QueryBoolReq is the optional-bool query path: present → `*bool`,
        absent / empty → nil.
      properties:
        active:
          type:
          - boolean
          - "null"
      type: object
    QueryEnumReq:
      description: |-
        QueryEnumReq drives the enum cast path through @query. Enums are
        string-shape on the wire, so optional is fine — the binder reads
        the raw string and casts up to the Color alias.
      properties:
        c:
          anyOf:
          - $ref: '#/components/schemas/BindingsColor'
          - type: "null"
      type: object
    QueryIntReq:
      description: |-
        QueryIntReq is the optional-int query path. The binder reads the raw
        string, parses it on presence, and writes a `*int`; an absent or empty
        `?page=` leaves the field nil. `@gte(1)` runs on the dereferenced value.
      properties:
        page:
          minimum: 1
          type:
          - integer
          - "null"
      type: object
    QueryIntRequiredReq:
      description: |-
        QueryIntRequiredReq is the required-int variant: an absent `page`
        leaves the field at its zero value, and `@gte(1)` then rejects it.
      properties:
        page:
          minimum: 1
          type: integer
      required:
      - page
      type: object
    QueryRequiredReq:
      description: |-
        QueryRequiredReq is the canonical "always required, capped" query
        param. Codegen emits the int parser with @gte / @lte gates so
        `?limit=0` and `?limit=101` are both rejected.
      properties:
        limit:
          maximum: 100
          minimum: 1
          type: integer
      required:
      - limit
      type: object
    QueryStringReq:
      description: |-
        QueryStringReq exercises the optional-string query path. The
        generator emits a nil-guarded pointer write because Go has a clean
        "absent vs empty" sentinel for `*string`.
      properties:
        q:
          type:
          - string
          - "null"
      type: object
    RateLimitExceededErr:
      description: TooManyRequests error response (HTTP 429).
      properties:
        retryAfter:
          type: integer
      required:
      - retryAfter
      type: object
    RateLimitedErr:
      description: TooManyRequests error response (HTTP 429).
      type: object
    RecordNotFoundErr:
      description: NotFound error response (HTTP 404).
      type: object
    RecursiveHost:
      properties:
        root:
          $ref: '#/components/schemas/TreeOfScalarsOrder'
      required:
      - root
      type: object
    Room:
      description: |-
        Room owns a slice of Furniture. Two consecutive slice-of-nested
        fields in the chain (Home.rooms, Room.furniture) verify that
        each level scopes its own loop index.
      properties:
        furniture:
          items:
            $ref: '#/components/schemas/Furniture'
          type: array
      required:
      - furniture
      type: object
    ScalarFieldOverrides:
      description: |-
        ScalarFieldOverrides exercises a field-level decorator STACKED on a
        SCALAR-typed field. The scalar carries its own bounds (on its
        Validate()); the field NARROWS them further. Because scalars are
        DEFINED Go types (`type Cents int`), the generated validator
        derefs+casts the scalar to its primitive and runs each stacked
        decorator: `amount` rejects > 500 (Cents alone allows up to 1e9),
        `discount` the optional variant, `code` rejects len > 5 (Tag alone
        allows up to 20).
      properties:
        amount:
          $ref: '#/components/schemas/Cents'
        code:
          $ref: '#/components/schemas/ScalarsTag'
        discount:
          anyOf:
          - $ref: '#/components/schemas/Cents'
          - type: "null"
      required:
      - amount
      - code
      type: object
    ScalarsEmail:
      format: email
      maxLength: 254
      type: string
    ScalarsOrder:
      description: |-
        Order is the marquee type: six scalar-typed fields, all of which
        inherit format / bound / pattern validators from their respective
        scalar declarations. The Order's generated Validate() should fire
        the inherited checks WITHOUT any per-field decorator.
      properties:
        amount:
          $ref: '#/components/schemas/Cents'
        country:
          $ref: '#/components/schemas/ISO3'
        email:
          $ref: '#/components/schemas/ScalarsEmail'
        id:
          $ref: '#/components/schemas/ScalarsUUID'
        rate:
          $ref: '#/components/schemas/Percent'
        tag:
          $ref: '#/components/schemas/ScalarsTag'
      required:
      - id
      - email
      - amount
      - rate
      - tag
      - country
      type: object
    ScalarsTag:
      maxLength: 20
      minLength: 1
      pattern: ^[a-z-]+$
      type: string
    ScalarsUUID:
      format: uuid
      type: string
    Search:
      description: |-
        Search mixes OPTIONAL array-of-scalar with OPTIONAL scalar + default.
        The keywords field is `Tag[]?` so the wire may omit it entirely; when
        present every element runs Tag's @pattern check. The limit field
        uses a numeric scalar with @default — the default literal is parsed
        as the underlying primitive (int) and cast up to Cents.
      properties:
        keywords:
          items:
            $ref: '#/components/schemas/ScalarsTag'
          type:
          - array
          - "null"
        limit:
          anyOf:
          - $ref: '#/components/schemas/Cents'
          - type: "null"
          default: 20
      type: object
    SearchItemsRespBody:
      $ref: '#/components/schemas/ItemList'
    SearchProductsReqBody:
      properties:
        keywords:
          items:
            $ref: '#/components/schemas/ScalarsTag'
          type:
          - array
          - "null"
        limit:
          anyOf:
          - $ref: '#/components/schemas/Cents'
          - type: "null"
          default: 20
      type: object
    SearchProductsRespBody:
      $ref: '#/components/schemas/ProductPage'
    SearchReq:
      description: |-
        SearchReq mixes every supported @query shape in one struct. Note
        that the optional cursor stays a `string?` (the query binder
        supports `*string`), but the optional sort uses an enum (string-
        shape on the wire, so the optional binder works just like for
        plain strings).
      properties:
        active:
          type: boolean
        cursor:
          type:
          - string
          - "null"
        ids:
          items:
            type: integer
          type:
          - array
          - "null"
        limit:
          maximum: 100
          minimum: 1
          type: integer
        offset:
          minimum: 0
          type:
          - integer
          - "null"
        sort:
          anyOf:
          - $ref: '#/components/schemas/BindingsColor'
          - type: "null"
        verbose:
          type:
          - boolean
          - "null"
      required:
      - limit
      - active
      type: object
    SecuredServiceListItemsRespBody:
      $ref: '#/components/schemas/InventoryListResp'
    SecuredServiceResetRespBody:
      $ref: '#/components/schemas/HealthResp'
    ServicesUser:
      allOf:
      - $ref: '#/components/schemas/Audit'
      - properties:
          email:
            $ref: '#/components/schemas/SharedEmail'
          id:
            $ref: '#/components/schemas/ID'
          name:
            minLength: 1
            type: string
        required:
        - id
        - email
        - name
        type: object
      description: |-
        User is the full entity. Embeds `shared.Audit` via the implicit
        CROSS-PACKAGE MIXIN form (`shared.Audit` alone on a body line is
        a mixin reference, not a field) so the createdAt / updatedAt /
        createdBy bookkeeping lands at the wire root without a nested
        envelope.
      type: object
    Severity:
      enum:
      - Info
      - Warning
      - Error
      - Critical
      type: string
    SharedEmail:
      format: email
      maxLength: 254
      type: string
    SignupRespBody:
      $ref: '#/components/schemas/ID'
    Str_Combos:
      description: |-
        Str_Combos stacks length + pattern + format on a single field so
        the generator's decorator-ordering / emit-order assumptions get
        exercised together. Each combo line carries every gate the
        canonical "email or short identifier" use cases require.
      properties:
        codeID:
          maxLength: 16
          minLength: 3
          pattern: ^[A-Z0-9_]+$
          type: string
        email1:
          format: email
          maxLength: 80
          minLength: 1
          pattern: ^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$
          type: string
        email2:
          format: email
          maxLength: 254
          minLength: 3
          type: string
      required:
      - email1
      - email2
      - codeID
      type: object
    Str_Default:
      description: |-
        Str_Default covers the @default + @length combination. The DSL
        grammar requires `?` on the type whenever @default is supplied;
        the generated Go field is `*string` and the missing-value path
        substitutes the pre-fill before validation.
      properties:
        greeting:
          default: hello
          maxLength: 100
          minLength: 1
          type:
          - string
          - "null"
      type: object
    Str_EchoReq:
      description: |-
        Str_EchoReq is the request body for the service's echo endpoint —
        it bundles a sample of each interesting validator shape so logic
        code receives a single struct with the full menu of constraints
        already enforced at the handler boundary.
      properties:
        bio:
          maxLength: 500
          type:
          - string
          - "null"
        code:
          pattern: ^[A-Z]{2,4}$
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        greeting:
          default: hello
          maxLength: 100
          minLength: 1
          type:
          - string
          - "null"
        name:
          maxLength: 80
          minLength: 1
          type: string
      required:
      - name
      - email
      - code
      type: object
    Str_EchoResp:
      description: |-
        Str_EchoResp echoes the request shape back. Identical validators
        — the response is just the request after a round-trip — so the
        generated wire contract is symmetric.
      properties:
        bio:
          maxLength: 500
          type:
          - string
          - "null"
        code:
          pattern: ^[A-Z]{2,4}$
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        greeting:
          maxLength: 100
          minLength: 1
          type: string
        name:
          maxLength: 80
          minLength: 1
          type: string
      required:
      - name
      - email
      - code
      - greeting
      type: object
    Str_Lengths:
      description: |-
        Str_Lengths probes the boundary forms of @length / @minLength /
        @maxLength. The interesting bits:

          - zeroLower: @length(0, 100) — the lower bound is zero, so any
            `len(x) < 0` check the generator emits would be dead code.
          - exact: @length(5, 5) — lo == hi, "exactly 5 chars".
          - separate min/max: @minLength(1) and @maxLength(100) on
            distinct fields to confirm the single-bound path.
      properties:
        exact:
          maxLength: 5
          minLength: 5
          type: string
        nonEmpty:
          maxLength: 100
          minLength: 1
          type: string
        onlyMax:
          maxLength: 100
          type: string
        onlyMin:
          minLength: 1
          type: string
        zeroLower:
          maxLength: 100
          type: string
      required:
      - zeroLower
      - nonEmpty
      - exact
      - onlyMin
      - onlyMax
      type: object
    Str_Nullable:
      description: |-
        Str_Nullable forces a pointer via @nullable on a non-optional
        field. The wire payload may omit the value (validators must skip)
        but the Go type lands as `*string`. Length cap still applies when
        the field is present.
      properties:
        tag:
          maxLength: 50
          type:
          - string
          - "null"
      required:
      - tag
      type: object
    Str_Optionals:
      description: |-
        Str_Optionals exercises the optional + validator combinations.
        Each field is `string?` so the generator MUST nil-guard before
        dereferencing. The interesting case is `pattOpt` — pattern against
        an optional should still emit the nil-guard prefix.
      properties:
        bothOpt:
          format: email
          maxLength: 80
          minLength: 1
          type:
          - string
          - "null"
        lenOpt:
          maxLength: 100
          minLength: 1
          type:
          - string
          - "null"
        mailOpt:
          format: email
          type:
          - string
          - "null"
        pattOpt:
          pattern: ^[A-Z]{2,4}$
          type:
          - string
          - "null"
      type: object
    Str_Patterns:
      description: |-
        Str_Patterns covers @pattern with Go regex syntax. Four flavours:

          - Plain anchors + quantifier: ^[A-Z]{2,4}$.
          - Escaped plus: ^\+?[0-9]+$ — the leading `\+` is a literal `+`,
            not a regex quantifier.
          - Numeric runs separated by literal `-`: \d{3}-\d{3}-\d{4}.
          - A regex containing a literal BACKTICK. The validator emits the
            pattern as a %q-quoted Go string, so a backtick survives in the
            generated literal.
      properties:
        codeSpan:
          pattern: ^`[^`]+`$
          type: string
        intlNum:
          pattern: ^\+?[0-9]+$
          type: string
        phoneUS:
          pattern: \d{3}-\d{3}-\d{4}
          type: string
        upper:
          pattern: ^[A-Z]{2,4}$
          type: string
      required:
      - upper
      - intlNum
      - phoneUS
      - codeSpan
      type: object
    Str_UTF8:
      description: |-
        Str_UTF8 carries @example values containing multi-byte UTF-8
        content so the OpenAPI emitter has to preserve them through YAML
        quoting. No runtime validator difference — the test is purely on
        the docs side.
      properties:
        jaName:
          example: 日本語
          maxLength: 80
          minLength: 1
          type: string
        vnName:
          example: tên người dùng
          maxLength: 80
          minLength: 1
          type: string
      required:
      - vnName
      - jaName
      type: object
    TagSliceReqBody:
      properties:
        tags:
          items:
            $ref: '#/components/schemas/CollectionsTag'
          maxItems: 10
          minItems: 1
          type: array
          uniqueItems: true
      required:
      - tags
      type: object
    TagSliceRespBody:
      $ref: '#/components/schemas/Arr_TagSlice'
    Team:
      description: |-
        Team gates `members` with both the array-level bound decorators
        (`@minItems`, `@maxItems`) AND per-element nested validation.
        Codegen produces:

          if len(v.Members) < 1 { ... }
          if len(v.Members) > 50 { ... }
          for i0 := range v.Members { v.Members[i0].Validate() }
      properties:
        members:
          items:
            $ref: '#/components/schemas/NestedUser'
          maxItems: 50
          minItems: 1
          type: array
      required:
      - members
      type: object
    TreeOfScalarsOrder:
      description: |-
        Tree<T> is the marquee recursive-generic test: the body references
        `Tree<T>` itself through the `kids` field. The instance registers
        as `TreeOfOrder`, emits its body, hits `kids: Tree<T>[]` substituted
        to `Tree<Order>[]`, asks the registry for the component name, finds
        `TreeOfOrder` already registered, and emits `$ref:TreeOfOrder` — the
        cycle terminates as a reference.
      properties:
        kids:
          items:
            $ref: '#/components/schemas/TreeOfScalarsOrder'
          type: array
        val:
          $ref: '#/components/schemas/ScalarsOrder'
      required:
      - val
      - kids
      type: object
    URL:
      format: url
      type: string
    UnsignedReq:
      description: UnsignedReq wraps NumberUnsigned.
      properties:
        body:
          $ref: '#/components/schemas/NumberUnsigned'
      required:
      - body
      type: object
    UploadAvatarReqBody:
      properties:
        caption:
          maxLength: 280
          type:
          - string
          - "null"
        file:
          format: binary
          type: string
      required:
      - file
      type: object
    UploadAvatarRespBody:
      $ref: '#/components/schemas/UserAvatar'
    UploadReq:
      description: |-
        UploadReq pairs the path-bound id with the form-file upload. The
        id is auto-bound to the `{id}` segment of /users/{id}/avatar; the
        file rides the multipart body and runs @maxSize + @mimeTypes at
        validate time. `caption` is an OPTIONAL form field — it proves the
        multipart schema's required[] lists only the mandatory file, not the
        optional text field (and never the path-bound `id`).

        Both form fields use an EXPLICIT `@form("wire_name")` distinct from
        the Go field name, so the multipart property name and the runtime
        r.FormFile / r.FormValue key both equal the wire name (`avatar_file`
        / `note`), not the field name (`file` / `caption`).
      properties:
        caption:
          maxLength: 280
          type:
          - string
          - "null"
        file:
          format: binary
          type: string
        id:
          maxLength: 64
          minLength: 1
          type: string
      required:
      - id
      - file
      type: object
    UserAvatar:
      description: |-
        UserAvatar is the UploadAvatar response. Carries the resolved URL
        where the freshly-uploaded blob can be fetched plus the storage
        key clients can pin for cache busting.
      properties:
        key:
          maxLength: 256
          minLength: 1
          type: string
        url:
          format: url
          maxLength: 2048
          type: string
      required:
      - url
      - key
      type: object
    UserRef:
      description: |-
        UserRef is the lightweight handle: id + email. Used as a BODY
        request (POST CreateUser, POST BanUser) and as the owner field
        of services.Project. Both fields are cross-package scalars
        (`shared.ID`, `shared.Email`) resolved across the import edge.
      properties:
        email:
          $ref: '#/components/schemas/SharedEmail'
        id:
          $ref: '#/components/schemas/ID'
      required:
      - id
      - email
      type: object
    ValidateAllFormatsReqBody:
      properties:
        base64:
          format: base64
          maxLength: 8192
          type: string
        base64url:
          format: base64url
          maxLength: 8192
          type: string
        cidr:
          format: cidr
          maxLength: 43
          type: string
        creditcard:
          format: creditcard
          maxLength: 19
          minLength: 12
          type: string
        date:
          format: date
          maxLength: 10
          minLength: 10
          type: string
        datetime:
          format: datetime
          maxLength: 40
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        hexcolor:
          format: hexcolor
          maxLength: 7
          type: string
        hostname:
          format: hostname
          maxLength: 253
          type: string
        ipv4:
          format: ipv4
          maxLength: 15
          type: string
        ipv6:
          format: ipv6
          maxLength: 45
          type: string
        jsonField:
          format: json
          maxLength: 65536
          type: string
        mac:
          format: mac
          maxLength: 17
          type: string
        phone:
          format: phone
          maxLength: 20
          type: string
        timeField:
          format: time
          maxLength: 8
          minLength: 8
          type: string
        uri:
          format: uri
          maxLength: 2048
          type: string
        url:
          format: url
          maxLength: 2048
          type: string
        uuid:
          format: uuid
          maxLength: 36
          minLength: 36
          type: string
      required:
      - email
      - url
      - uri
      - uuid
      - datetime
      - date
      - timeField
      - phone
      - hostname
      - ipv4
      - ipv6
      - cidr
      - mac
      - creditcard
      - base64
      - base64url
      - hexcolor
      - jsonField
      type: object
    ValidateAllFormatsRespBody:
      $ref: '#/components/schemas/AllFormats'
    ValidateArrReqBody:
      properties:
        tags:
          items:
            type: string
          maxItems: 10
          minItems: 1
          type: array
          uniqueItems: true
      required:
      - tags
      type: object
    ValidateArrRespBody:
      $ref: '#/components/schemas/PairsArr'
    ValidateChoiceReqBody:
      properties:
        a:
          type:
          - string
          - "null"
        b:
          type:
          - string
          - "null"
        c:
          type:
          - string
          - "null"
      type: object
    ValidateChoiceRespBody:
      $ref: '#/components/schemas/PairsChoice'
    ValidateContactReqBody:
      properties:
        email:
          format: email
          type:
          - string
          - "null"
        phone:
          pattern: ^\+\d+$
          type:
          - string
          - "null"
      type: object
    ValidateContactRespBody:
      $ref: '#/components/schemas/PairsContact'
    ValidateNumReqBody:
      properties:
        score:
          exclusiveMinimum: -1
          maximum: 99
          minimum: 0
          multipleOf: 5
          type: integer
      required:
      - score
      type: object
    ValidateNumRespBody:
      $ref: '#/components/schemas/PairsNum'
    ValidateStrReqBody:
      properties:
        email:
          format: email
          maxLength: 254
          minLength: 3
          pattern: ^.*@example\.com$
          type: string
      required:
      - email
      type: object
    ValidateStrRespBody:
      $ref: '#/components/schemas/PairsStr'
    WipeRespBody:
      $ref: '#/components/schemas/HealthResp'
    WireRenameReq:
      description: |-
        WireRenameReq combines explicit-name bindings in all four parameter
        locations. Each field's wire name (the decorator argument) differs
        from its Go field name on purpose so the OpenAPI parameter name and
        the runtime binder stay provably in lock-step. Header/cookie fields
        stay non-optional (the binder rejects `string? @header`); the query
        field is optional to also cover the optional-param wire-name path.
      properties:
        q:
          type:
          - string
          - "null"
        userId:
          maxLength: 64
          minLength: 1
          type: string
      required:
      - userId
      type: object
    Wrapped:
      description: |-
        Wrapped nests two generic instantiations: outer Page<…> over inner
        Envelope<Order>. Probes whether codegen handles a generic argument
        that is itself a generic instance.
      properties:
        results:
          $ref: '#/components/schemas/PageOfEnvelopeOfScalarsOrder'
      required:
      - results
      type: object
    XPkgEnum:
      description: |-
        XPkgEnum exercises every shape a CROSS-PACKAGE enum reference can
        take inside a single field. Resolution routes through the
        project-wide EnumTable, so every shape emits the switch-case
        validity check.

          - flat:      `shared.Severity` direct field   → switch wrapped by shape().
          - many:      `shared.Severity[]`              → for-range + switch.
          - maybe:     `shared.Severity?`               → nil-check + switch.
          - byString:  `map<string, shared.Severity>`   → for-range value walk.
          - byEnum:    `map<shared.Severity, string>`   → for-range key walk.
          - bothEnum:  `map<shared.Severity, shared.Severity>` → both sides switch.
      properties:
        bothEnum:
          additionalProperties:
            $ref: '#/components/schemas/Severity'
          propertyNames:
            enum:
            - Info
            - Warning
            - Error
            - Critical
            type: string
          type: object
        byEnum:
          additionalProperties:
            type: string
          propertyNames:
            enum:
            - Info
            - Warning
            - Error
            - Critical
            type: string
          type: object
        byString:
          additionalProperties:
            $ref: '#/components/schemas/Severity'
          type: object
        flat:
          $ref: '#/components/schemas/Severity'
        many:
          items:
            $ref: '#/components/schemas/Severity'
          type: array
        maybe:
          anyOf:
          - $ref: '#/components/schemas/Severity'
          - type: "null"
      required:
      - flat
      - many
      - byString
      - byEnum
      - bothEnum
      type: object
  securitySchemes:
    AdminBearer:
      bearerFormat: JWT
      scheme: bearer
      type: http
    AdminWriteScope:
      bearerFormat: JWT
      scheme: bearer
      type: http
    MFA:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  title: Cornercase API
  version: 1.0.0
openapi: 3.1.0
paths:
  /:
    get:
      operationId: ListProjects
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectsRespBody'
          description: OK
        default:
          description: ""
      tags:
      - ProjectService
  /account/admin/{id}:
    delete:
      description: 'Delete an account — admin-only. Chain: [RateLimit, BasicAuth,
        Audit].'
      operationId: DeleteAccount
      parameters:
      - in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/ID'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountRespBody'
          description: OK
        default:
          description: ""
      tags:
      - account
      - admin
  /account/admin/reset:
    post:
      description: Hard reset — bypasses BasicAuth, uses its own minimal chain.
      operationId: AccountServiceReset
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountServiceResetRespBody'
          description: Created
        default:
          description: ""
      tags:
      - account
      - admin
  /account/login:
    post:
      description: Log in — public, only inherits rate limiting.
      operationId: Login
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginRespBody'
          description: Created
        default:
          description: ""
      tags:
      - account
  /account/logout:
    post:
      description: Logout — inherits RateLimit + AuthRequired. Also appends Audit
        at method level.
      operationId: Logout
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutRespBody'
          description: Created
        default:
          description: ""
      tags:
      - account
      - authenticated
      - audited
  /account/me:
    get:
      description: Get the current user — inherits RateLimit + AuthRequired.
      operationId: Me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeRespBody'
          description: OK
        default:
          description: ""
      tags:
      - account
      - authenticated
  /account/signup:
    post:
      description: Sign up — public, only inherits rate limiting.
      operationId: Signup
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupRespBody'
          description: Created
        default:
          description: ""
      tags:
      - account
  /admin/inventory:
    get:
      description: List inventory items. Inherits auth + tags from the extend block.
      operationId: AdminInventoryServiceListItems
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminInventoryServiceListItemsRespBody'
          description: OK
        default:
          description: ""
      security:
      - AdminBearer: []
      tags:
      - admin
  /admin/inventory/{itemId}/promote:
    post:
      description: Promote an item to the featured slot. Inherits the same auth chain
        plus a method-level admin scope.
      operationId: PromoteItem
      parameters:
      - in: path
        name: itemId
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteItemReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteItemRespBody'
          description: Created
        default:
          description: ""
      security:
      - AdminBearer: []
      - AdminWriteScope: []
      tags:
      - admin
  /admin/inventory/health:
    get:
      description: Liveness probe. Public on purpose - operators hit this before secrets
        are loaded.
      operationId: AdminInventoryServiceHealth
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminInventoryServiceHealthRespBody'
          description: OK
        default:
          description: ""
      tags:
      - AdminInventoryService
  /bindings/health:
    get:
      description: Health probe. No request, no response — just a 200 OK when the
        service is reachable, plus the rate-limit 429 envelope.
      operationId: BindingsServiceHealth
      responses:
        "204":
          description: No Content
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitExceededErr'
          description: TooManyRequests
        default:
          description: ""
      tags:
      - bindings
  /bindings/items:
    get:
      description: Search items. Demonstrates the full @query matrix — optional string
        cursor, required int limit, optional enum sort, repeated int ids, required
        bool active, optional int offset, optional bool verbose.
      operationId: SearchItems
      parameters:
      - in: query
        name: cursor
        schema:
          type:
          - string
          - "null"
      - in: query
        name: limit
        required: true
        schema:
          maximum: 100
          minimum: 1
          type: integer
      - in: query
        name: sort
        schema:
          anyOf:
          - $ref: '#/components/schemas/BindingsColor'
          - type: "null"
      - in: query
        name: ids
        schema:
          items:
            type: integer
          type:
          - array
          - "null"
      - in: query
        name: active
        required: true
        schema:
          type: boolean
      - in: query
        name: offset
        schema:
          minimum: 0
          type:
          - integer
          - "null"
      - in: query
        name: verbose
        schema:
          type:
          - boolean
          - "null"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchItemsRespBody'
          description: OK
        default:
          description: ""
      tags:
      - bindings
    post:
      description: Create a new item. Surfaces DuplicateKey (409) on unique-constraint
        conflict and InvalidInput (400) on validation failure.
      operationId: AddItem
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddItemRespBody'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidInputErr'
          description: BadRequest
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateKeyErr'
          description: Conflict
        default:
          description: ""
      tags:
      - bindings
  /bindings/items/{id}:
    delete:
      description: Delete an item. Idempotent. Surfaces RecordNotFound (404) for unknown
        ids and AccessDenied (403) when the caller lacks permission.
      operationId: DeleteItem
      parameters:
      - in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/BindingsUUID'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteItemRespBody'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedErr'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordNotFoundErr'
          description: NotFound
        default:
          description: ""
      tags:
      - bindings
    get:
      description: Fetch one item by id. The path placeholder lands as the UUID scalar
        type; the inherited @format(uuid) validator rejects malformed ids at the boundary.
      operationId: GetItem
      parameters:
      - in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/BindingsUUID'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetItemRespBody'
          description: OK
        default:
          description: ""
      tags:
      - bindings
  /bindings/users/{id}/avatar:
    post:
      description: Upload a user avatar. Demonstrates the path + multipart-form combo
        — id from /users/{id}/avatar, file via multipart/form-data with @maxSize +
        @mimeTypes validation.
      operationId: UploadAvatar
      parameters:
      - in: path
        name: id
        required: true
        schema:
          maxLength: 64
          minLength: 1
          type: string
      requestBody:
        content:
          multipart/form-data:
            encoding:
              avatar_file:
                contentType: image/png, image/jpeg
            schema:
              properties:
                avatar_file:
                  format: binary
                  type: string
                note:
                  maxLength: 280
                  type:
                  - string
                  - "null"
              required:
              - avatar_file
              type: object
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadAvatarRespBody'
          description: Created
        default:
          description: ""
      tags:
      - bindings
  /bindings/wire/{user_id}:
    get:
      description: Echo wire-renamed params. Path, query, header, and cookie each
        use an explicit @decorator("wire-name") distinct from the Go field name.
      operationId: EchoWire
      parameters:
      - in: path
        name: user_id
        required: true
        schema:
          maxLength: 64
          minLength: 1
          type: string
      - in: query
        name: search_q
        schema:
          type:
          - string
          - "null"
      - in: header
        name: X-API-Key
        required: true
        schema:
          type: string
      - in: cookie
        name: session_id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoWireRespBody'
          description: OK
        default:
          description: ""
      tags:
      - bindings
  /collections/array-bounds:
    post:
      description: |-
        ArrayBounds echoes the canonical @minItems + @maxItems +
        @uniqueItems combo from Arr_BoundsBasic.
      operationId: ArrayBounds
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArrayBoundsReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArrayBoundsRespBody'
          description: Created
        default:
          description: ""
      tags:
      - collections
  /collections/map-key-value:
    post:
      description: MapKeyValue is the scalar-on-both-sides map case.
      operationId: MapKeyValue
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapKeyValueReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapKeyValueRespBody'
          description: Created
        default:
          description: ""
      tags:
      - collections
  /collections/map-struct:
    post:
      description: |-
        MapStruct exposes the struct-valued map so the generated
        validate.go for Map_StructValue is visible in the e2e
        snapshot.
      operationId: MapStruct
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapStructReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapStructRespBody'
          description: Created
        default:
          description: ""
      tags:
      - collections
  /collections/multi-dim:
    post:
      description: |-
        MultiDim drives a 2D array of scalars through the request
        body so the doubly-nested loop emits on the wire boundary.
      operationId: MultiDim
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiDimReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiDimRespBody'
          description: Created
        default:
          description: ""
      tags:
      - collections
  /collections/tag-slice:
    post:
      description: |-
        TagSlice exercises the scalar-array case — per-element Tag
        validators (minLength + maxLength + pattern) fire on every
        element via the scalar-leaves walk.
      operationId: TagSlice
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagSliceReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagSliceRespBody'
          description: Created
        default:
          description: ""
      tags:
      - collections
  /combine/defaults/boundary:
    post:
      description: Echo the boundary-default matrix. Smoke tests assert that the pre-fill
        happens before req.Validate() so the defaulted values land in the response.
      operationId: EchoBoundary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoBoundaryReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoBoundaryRespBody'
          description: Created
        default:
          description: ""
      tags:
      - combine
  /combine/defaults/collection:
    post:
      description: Echo the array / map default shapes. The map<,>?-with-object-default
        field is expected to be rejected at codegen time.
      operationId: EchoCollection
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoCollectionReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoCollectionRespBody'
          description: Created
        default:
          description: ""
      tags:
      - combine
  /combine/defaults/conflict:
    post:
      description: Echo the deliberate default-vs-validator clash. The empty-string
        default would fail @minLength(1) — if codegen accepts the design, the handler
        will reject the pre-filled value.
      operationId: EchoConflict
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoConflictReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoConflictRespBody'
          description: Created
        default:
          description: ""
      tags:
      - combine
  /combine/defaults/enum:
    post:
      description: Echo the enum default. Missing c on the wire results in c=Red after
        pre-fill.
      operationId: EchoEnum
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoEnumReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoEnumRespBody'
          description: Created
        default:
          description: ""
      tags:
      - combine
  /combine/defaults/scalar:
    post:
      description: Echo the scalar default. Missing size on the wire results in size=20
        after pre-fill, and the scalar's @gte/@lte bounds still apply.
      operationId: EchoScalar
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoScalarReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoScalarRespBody'
          description: Created
        default:
          description: ""
      tags:
      - combine
  /combine/pairs/arr:
    post:
      description: Validate stacked array decorators (minItems + maxItems + uniqueItems
        + each(@length)). Outer bounds plus per-element check.
      operationId: ValidateArr
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateArrReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateArrRespBody'
          description: Created
        default:
          description: ""
      tags:
      - combine
  /combine/pairs/choice:
    post:
      description: Validate orthogonal @mutuallyExclusive + @requiresOneOf. Sending
        only c is valid; sending a+b fails exclusivity; sending nothing fails the
        one-of.
      operationId: ValidateChoice
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateChoiceReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateChoiceRespBody'
          description: Created
        default:
          description: ""
      tags:
      - combine
  /combine/pairs/contact:
    post:
      description: Validate per-field decorators under a type-level @requiresOneOf.
        Sending neither field fails the cross-field check; sending one passes.
      operationId: ValidateContact
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateContactReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateContactRespBody'
          description: Created
        default:
          description: ""
      tags:
      - combine
  /combine/pairs/num:
    post:
      description: Validate stacked numeric decorators (range + multipleOf + gt +
        lte). All four fire in declaration order.
      operationId: ValidateNum
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateNumReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateNumRespBody'
          description: Created
        default:
          description: ""
      tags:
      - combine
  /combine/pairs/str:
    post:
      description: Validate stacked string decorators (length + format + pattern).
        The handler fails any of the three independently.
      operationId: ValidateStr
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateStrReqBody'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateStrRespBody'
          description: Created
        default:
