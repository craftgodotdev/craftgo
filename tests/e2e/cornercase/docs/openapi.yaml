    MultiDimReqBody:
      properties:
        grid:
          items:
            items:
              $ref: '#/components/schemas/CollectionsTag'
            type: array
          type: array
      required:
      - grid
      type: object
    MultiDimRespBody:
      $ref: '#/components/schemas/Arr_Tag2D'
    NestedAddress:
      description: |-
        Address is the simplest leaf nested type. The two string fields
        carry independent @minLength so the generated Validate() returns
        the FIRST violation when either is empty.
      properties:
        city:
          minLength: 1
          type: string
        street:
          minLength: 1
          type: string
      required:
      - street
      - city
      type: object
    NestedOrder:
      description: |-
        Order is a tiny leaf used by ListPage below. Stays minimal so
        the page envelope's validate cascade has a single field to
        reach.
      properties:
        id:
          minLength: 1
          type: string
      required:
      - id
      type: object
    NestedUser:
      description: |-
        User couples an addr to a self-referential optional boss + an
        optional alias for the cross-field-validator showcase below.

        `boss User?` is the SELF-OPTIONAL recursion case: codegen must
        emit `Boss *User` in Go and gate the recursive Validate() call
        with `if v.Boss != nil { ... }`.

        `@requiresOneOf(name, alias)` rides on User to demonstrate that
        type-level cross-field validators COMPOSE with nested validation
        - the cross-field check runs AFTER every nested Validate() call.
      properties:
        addr:
          $ref: '#/components/schemas/NestedAddress'
        alias:
          nullable: true
          type: string
        boss:
          allOf:
          - $ref: '#/components/schemas/NestedUser'
          description: Self-optional - the marquee recursion case.
          nullable: true
        name:
          nullable: true
          type: string
      required:
      - addr
      type: object
    Node:
      description: |-
        Node is the canonical recursive tree node. `children Node[]` is
        the slice-of-self pattern; the codegen emits ONE Validate()
        function per type so the recursion stays bounded at runtime.
      properties:
        children:
          items:
            $ref: '#/components/schemas/Node'
          type: array
        id:
          minLength: 1
          type: string
      required:
      - id
      - children
      type: object
    NonEmpty:
      minLength: 1
      type: string
    NonEmptyID:
      maxLength: 64
      minLength: 1
      type: string
    NotFoundErr:
      description: NotFound error response (HTTP 404).
      properties:
        id:
          $ref: '#/components/schemas/ID'
        resource:
          type: string
      type: object
    NumberBoundary:
      description: |-
        NumberBoundary pins bounds at the exact type-capacity edges. The
        semantic phase rejects bounds beyond a type's representable range;
        these must all sit AT the boundary and pass clean.
      properties:
        int8Full:
          description: int8 full range
          maximum: 127
          minimum: -128
          type: integer
        int8Range:
          maximum: 127
          minimum: -128
          type: integer
        int16Full:
          description: int16 full range
          maximum: 32767
          minimum: -32768
          type: integer
        int32Full:
          description: int32 full range
          maximum: 2147483647
          minimum: -2147483648
          type: integer
        uint8Full:
          maximum: 255
          minimum: 0
          type: integer
        uint8Range:
          description: uint8 full range
          maximum: 255
          minimum: 0
          type: integer
        uint16Full:
          description: uint16 full range
          maximum: 65535
          minimum: 0
          type: integer
        uint32Full:
          description: uint32 full range
          maximum: 4294967295
          minimum: 0
          type: integer
      required:
      - int8Full
      - int8Range
      - int16Full
      - int32Full
      - uint8Range
      - uint8Full
      - uint16Full
      - uint32Full
      type: object
    NumberCounter:
      description: |-
        NumberCounter exercises every standard int* signed type with all
        three pair flavours: @range (inclusive both), @gte/@lte (inclusive
        both), @gt/@lt (strict both). Also adds @positive, @negative, and
        @multipleOf on int to cover the marquee combinations.
      properties:
        gtLtInt:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 1000
          minimum: 0
          type: integer
        gtLtInt8:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 100
          minimum: -100
          type: integer
        gtLtInt16:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 32000
          minimum: -32000
          type: integer
        gtLtInt32:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 2147483647
          minimum: -2147483648
          type: integer
        gtLtInt64:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 1000000000000
          minimum: 0
          type: integer
        gteLteInt:
          maximum: 1000
          minimum: 0
          type: integer
        gteLteInt8:
          maximum: 100
          minimum: -100
          type: integer
        gteLteInt16:
          maximum: 32000
          minimum: -32000
          type: integer
        gteLteInt32:
          maximum: 2147483647
          minimum: 0
          type: integer
        gteLteInt64:
          maximum: 9000000000000000000
          minimum: -9000000000000000000
          type: integer
        negInt:
          exclusiveMaximum: true
          maximum: 0
          type: integer
        posInt:
          description: '@positive / @negative — flag decorators (no parens).'
          exclusiveMinimum: true
          minimum: 0
          type: integer
        posInt64:
          exclusiveMinimum: true
          minimum: 0
          type: integer
        rangeInt:
          description: |-
            int — defaults to the platform's native word width but the
            semantic capacity check treats it as int64 for portability.
          maximum: 1000
          minimum: 0
          type: integer
        rangeInt8:
          description: int8 — bound capacity edge (the validator should narrow safely).
          maximum: 50
          minimum: -50
          type: integer
        rangeInt16:
          description: int16
          maximum: 1000
          minimum: -1000
          type: integer
        rangeInt32:
          description: int32 — tests MaxInt32-ish boundaries.
          maximum: 2000000000
          minimum: -2000000000
          type: integer
        rangeInt64:
          description: int64 — the widest signed.
          maximum: 1000000000
          minimum: -1000000000
          type: integer
        stepInt:
          description: '@multipleOf on int.'
          multipleOf: 5
          type: integer
        stepInt64:
          multipleOf: 100
          type: integer
      required:
      - rangeInt
      - gteLteInt
      - gtLtInt
      - rangeInt8
      - gteLteInt8
      - gtLtInt8
      - rangeInt16
      - gteLteInt16
      - gtLtInt16
      - rangeInt32
      - gteLteInt32
      - gtLtInt32
      - rangeInt64
      - gteLteInt64
      - gtLtInt64
      - posInt
      - negInt
      - posInt64
      - stepInt
      - stepInt64
      type: object
    NumberExact:
      description: |-
        NumberExact is the boundary case where @gte and @lte share the
        same value — exactly one accepted value. Sprint 3 allows this
        (only the strict variants on equal endpoints emit empty-range).
      properties:
        exactly0:
          description: Only value = 0
          maximum: 0
          minimum: 0
          type: integer
        exactly5:
          description: Only value = 5 is accepted.
          maximum: 5
          minimum: 5
          type: integer
        exactlyHalf:
          description: Only value = 0.5
          maximum: 0.5
          minimum: 0.5
          type: number
      required:
      - exactly5
      - exactly0
      - exactlyHalf
      type: object
    NumberMixed:
      description: NumberMixed exercises mixed strict/inclusive pair combinations.
      properties:
        floatGtLte:
          description: Asymmetric float
          exclusiveMinimum: true
          maximum: 1
          minimum: 0
          type: number
        gtLte:
          description: strict-lower + inclusive-upper
          exclusiveMinimum: true
          maximum: 100
          minimum: 0
          type: integer
        gteLt:
          description: inclusive-lower + strict-upper
          exclusiveMaximum: true
          maximum: 100
          minimum: 0
          type: integer
        negRange:
          description: All-negative inclusive range — only negative values accepted.
          maximum: -1
          minimum: -100
          type: integer
        negStrict:
          description: All-negative strict range.
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: -1
          minimum: -100
          type: integer
      required:
      - gtLte
      - gteLt
      - negRange
      - negStrict
      - floatGtLte
      type: object
    NumberOptional:
      description: |-
        NumberOptional exercises the optional / nullable / default axes
        against numeric primitives.
      properties:
        defaultFloat:
          default: 3.14
          nullable: true
          type: number
        defaultInt:
          default: 42
          description: 'Defaults: @default fills in the value when the field is absent.'
          nullable: true
          type: integer
        defaultStep:
          default: 10
          description: |-
            Default + range — present and below-default sends 0 which still
            passes the @gte(0).
          maximum: 100
          minimum: 0
          nullable: true
          type: integer
        maybeInt:
          description: |-
            4-state: optional + nullable. Numbers wire shape: missing key,
            null, or a valid value.
          maximum: 100
          minimum: 0
          nullable: true
          type: integer
        nullableFloat:
          maximum: 1
          minimum: 0
          nullable: true
          type: number
        nullableInt:
          description: |-
            @nullable on a non-optional numeric — forces a pointer in
            codegen so the wire can carry explicit null.
          maximum: 100
          minimum: 0
          nullable: true
          type: integer
        optFloat:
          maximum: 1
          minimum: 0
          nullable: true
          type: number
        optInt:
          description: |-
            Bare optional ints/floats with bound — the decoder treats
            "missing key" as zero-value, and Validate skips when nil.
          maximum: 100
          minimum: 0
          nullable: true
          type: integer
        optUint:
          maximum: 1000
          minimum: 0
          nullable: true
          type: integer
      required:
      - nullableInt
      - nullableFloat
      type: object
    NumberPrice:
      description: |-
        NumberPrice exercises float32 + float64 with float literal bounds.
        Sprint 3 specifically called out that @gte(0.5), @range(0.1, 0.9)
        must round-trip cleanly.
      properties:
        gtLtF32:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 1
          minimum: 0
          type: number
        gtLtF64:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 0.9999
          minimum: 0.0001
          type: number
        gteLteF32:
          maximum: 1.5
          minimum: 0.5
          type: number
        gteLteF64:
          maximum: 1.5
          minimum: -1.5
          type: number
        negFloat:
          exclusiveMaximum: true
          maximum: 0
          type: number
        posF32:
          exclusiveMinimum: true
          minimum: 0
          type: number
        posFloat:
          description: '@positive / @negative on floats.'
          exclusiveMinimum: true
          minimum: 0
          type: number
        rangeF32:
          description: float32 — narrower precision but same decorator surface.
          maximum: 1
          minimum: 0
          type: number
        rangeF64:
          description: float64 — the wide form. Includes a high-precision bound.
          maximum: 0.9
          minimum: 0.1
          type: number
      required:
      - rangeF32
      - gteLteF32
      - gtLtF32
      - rangeF64
      - gteLteF64
      - gtLtF64
      - posFloat
      - negFloat
      - posF32
      type: object
    NumberUnsigned:
      description: |-
        NumberUnsigned covers the full uint family. Lower bound 0 is
        implicit at the type level but we still emit @gte(0) explicitly to
        confirm codegen doesn't emit a dead `v < 0` for unsigned fields.
      properties:
        gtLtUint:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 1000
          minimum: 0
          type: integer
        gtLtUint8:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 255
          minimum: 0
          type: integer
        gtLtUint16:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 65535
          minimum: 0
          type: integer
        gtLtUint32:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 4294967295
          minimum: 0
          type: integer
        gtLtUint64:
          exclusiveMaximum: true
          exclusiveMinimum: true
          maximum: 1000000000000
          minimum: 0
          type: integer
        gteLteUint:
          maximum: 1000
          minimum: 0
          type: integer
        gteLteUint8:
          maximum: 255
          minimum: 0
          type: integer
        gteLteUint16:
          maximum: 65535
          minimum: 0
          type: integer
        gteLteUint32:
          maximum: 4294967295
          minimum: 0
          type: integer
        gteLteUint64:
          maximum: 1000000000000
          minimum: 0
          type: integer
        posUint:
          description: |-
            @positive on uint — semantically equivalent to @gt(0), but the
            unsigned domain makes @negative semantically vacuous (it is
            still accepted at the decorator layer, so we don't test that).
          exclusiveMinimum: true
          minimum: 0
          type: integer
        rangeUint:
          description: uint
          maximum: 1000
          minimum: 0
          type: integer
        rangeUint8:
          description: uint8 — full capacity test.
          maximum: 255
          minimum: 0
          type: integer
        rangeUint16:
          description: uint16
          maximum: 65535
          minimum: 0
          type: integer
        rangeUint32:
          description: uint32 — boundary at MaxUint32.
          maximum: 4294967295
          minimum: 0
          type: integer
        rangeUint64:
          description: uint64 — even bigger.
          maximum: 1000000000000
          minimum: 0
          type: integer
      required:
      - rangeUint
      - gteLteUint
      - gtLtUint
      - rangeUint8
      - gteLteUint8
      - gtLtUint8
      - rangeUint16
      - gteLteUint16
      - gtLtUint16
      - rangeUint32
      - gteLteUint32
      - gtLtUint32
      - rangeUint64
      - gteLteUint64
      - gtLtUint64
      - posUint
      type: object
    OptionalReq:
      description: OptionalReq wraps NumberOptional (presence axes).
      properties:
        body:
          $ref: '#/components/schemas/NumberOptional'
      required:
      - body
      type: object
    OrderPage:
      description: |-
        OrderPage instantiates Page<Order>. Codegen substitutes T=Order
        in items's element type and the validator chain calls
        .Validate() on each element via interface assertion in the
        generic body's loop.
      properties:
        page:
          properties:
            cursor:
              type: string
            items:
              items:
                $ref: '#/components/schemas/ScalarsOrder'
              type: array
            total:
              type: integer
          required:
          - items
          - total
          type: object
      required:
      - page
      type: object
    Org:
      description: |-
        Org demonstrates OPTIONAL slice of nested. The Go field is
        `Teams []Team` but the wire field is `omitempty`; codegen still
        emits the per-element loop without a nil-guard because Go's
        `range` on a nil slice is a no-op.
      properties:
        teams:
          items:
            $ref: '#/components/schemas/Team'
          nullable: true
          type: array
      type: object
    PageSize:
      maximum: 100
      minimum: 1
      type: integer
    Pagination:
      description: |-
        Pagination is the canonical cursor/limit envelope every list
        endpoint embeds. `limit` carries the standard 1..100 cap with a
        pre-fill of 20 when the caller omits it; `cursor` is the opaque
        continuation token returned by the previous page; `total` is the
        optional total-count summary (omitted when the upstream store can
        not cheaply compute it).

        Consumers embed this DTO via the implicit mixin form
        (`type ListUsersReq { shared.Pagination  query string? }`) so the
        pagination contract stays identical across services without copy-
        paste.
      properties:
        cursor:
          nullable: true
          type: string
        limit:
          default: 20
          maximum: 100
          minimum: 1
          nullable: true
          type: integer
        total:
          nullable: true
          type: integer
      type: object
    PairsArr:
      description: "PairsArr stacks the array-level decorators (@minItems, @maxItems,\n@uniqueItems).
        Per-element constraints belong on a scalar: declare\nthe element type as a
        named scalar and the validator walker emits\nthe inner checks automatically
        through scalar leaf inheritance —\nno explicit per-element decorator required.\n\n\tscalar
        Tag string @length(1, 20)\n\ttype PairsArr { tags Tag[] @minItems(1) @maxItems(10)
        @uniqueItems }"
      properties:
        tags:
          items:
            type: string
          maxItems: 10
          minItems: 1
          type: array
          uniqueItems: true
      required:
      - tags
      type: object
    PairsChoice:
      description: |-
        PairsChoice puts @mutuallyExclusive and @requiresOneOf on the same
        type with overlapping field references. The semantics layer should
        treat the two decorators as orthogonal:

          - @mutuallyExclusive(a, b): at most one of a / b may be present.
          - @requiresOneOf(a, b, c):  at least one of a / b / c is present.

        So `c` alone satisfies the file, and `a` alone or `b` alone is also
        valid; sending both `a` and `b` fails the exclusivity check even if
        `c` is absent.
      properties:
        a:
          nullable: true
          type: string
        b:
          nullable: true
          type: string
        c:
          nullable: true
          type: string
      type: object
    PairsContact:
      description: |-
        PairsContact pairs a type-level @requiresOneOf with two per-field
        decorator stacks. The wire payload must carry at least one of email
        / phone; when present, each field is independently validated by its
        own decorator chain.
      properties:
        email:
          format: email
          nullable: true
          type: string
        phone:
          nullable: true
          pattern: ^\+\d+$
          type: string
      type: object
    PairsNum:
      description: |-
        PairsNum stacks @range (lo,hi pair) with @multipleOf and the
        strict-bound @gt / @lte. Both the soft and strict bounds are present
        so the validator firing order is visible in the generated code:
        each decorator should emit one comparison.
      properties:
        score:
          exclusiveMinimum: true
          maximum: 99
          minimum: -1
          multipleOf: 5
          type: integer
      required:
      - score
      type: object
    PairsStr:
      description: |-
        PairsStr stacks every string validator the generator supports on a
        single field, plus a separate field for the cheap baseline.

          - email: @length + @format(email) + @pattern — all four constraints
            fire in declaration order. The pattern is a domain restriction
            on top of the format check.
      properties:
        email:
          format: email
          maxLength: 254
          minLength: 3
          pattern: ^.*@example\.com$
          type: string
      required:
      - email
      type: object
    PathEnumReq:
      description: |-
        PathEnumReq drives the enum-typed @path binder. The wire value is
        a string ("red" / "green" / "blue"); req.Validate() rejects any
        value outside the enum's declared set.
      properties:
        c:
          $ref: '#/components/schemas/BindingsColor'
      required:
      - c
      type: object
    PathExplicitNameReq:
      description: |-
        PathExplicitNameReq exercises the `@path("user_id")` form where the
        DSL field name (`userId`) differs from the URL placeholder
        (`{user_id}`). NOTE: the codegen currently ignores the decorator
        argument and emits `r.PathValue("userId")` regardless — flagged in
        the report as a wart, the runtime binding will not match.
      properties:
        userId:
          maxLength: 64
          minLength: 1
          type: string
      required:
      - userId
      type: object
    PathScalarReq:
      description: |-
        PathScalarReq replaces the bare `string` with the UUID scalar. The
        generator emits `req.Id = UUID(r.PathValue("id"))` so the field
        lands as the typed alias and the inherited @format(uuid) validator
        fires at request time.
      properties:
        id:
          $ref: '#/components/schemas/BindingsUUID'
      required:
      - id
      type: object
    PathStringReq:
      description: |-
        PathStringReq is the canonical path-bound DTO: a single `id string`
        field that auto-binds (or explicitly binds) to the `{id}` segment
        of `/items/{id}`.
      properties:
        id:
          maxLength: 64
          minLength: 1
          type: string
      required:
      - id
      type: object
    Percent:
      maximum: 1
      minimum: 0
      type: number
    Person:
      description: |-
        Person → Home → Room → Furniture chain. Each level adds one
        nested call to the validator dispatch, demonstrating that the
        cascade carries the deepest violation back to the top.
      properties:
        home:
          $ref: '#/components/schemas/Home'
      required:
      - home
      type: object
    PresenceMatrix:
      description: |-
        PresenceMatrix is the canonical presence-state matrix.

        Row map (DSL → Go → wire contract):

          plain        string                          → string   required, non-null
          optional     string?                         → *string  optional, may be omitted OR null
          nullable     string @nullable                → *string  required, value may be JSON null
          bothNullable string? @nullable               → *string  4-state (same as optional, redundant @nullable)
          defValue     string? @default("d")           → *string  optional + pre-fill (the `?` is mandatory under @default)
          defNullable  string? @nullable @default("d") → *string  optional + nullable + pre-fill

        Wire contract diffs row-by-row:

          plain:        required[] yes, nullable: false
          optional:     required[] no,  nullable: true
          nullable:     required[] yes, nullable: true
          bothNullable: required[] no,  nullable: true
          defValue:     required[] no,  nullable: true,  default: "d"
          defNullable:  required[] no,  nullable: true,  default: "d"

        The `bothNullable` and `defNullable` rows trip the "redundant
        @nullable on `T?`" warning (the optionality already permits null);
        the linter should surface that without rejecting the file.
      properties:
        bothNullable:
          nullable: true
          type: string
        defNullable:
          default: d
          nullable: true
          type: string
        defValue:
          default: d
          nullable: true
          type: string
        nullable:
          nullable: true
          type: string
        optional:
          nullable: true
          type: string
        plain:
          type: string
      required:
      - plain
      - nullable
      type: object
    PriceReq:
      description: PriceReq wraps NumberPrice (float surface).
      properties:
        body:
          $ref: '#/components/schemas/NumberPrice'
      required:
      - body
      type: object
    ProductPage:
      description: |-
        ProductPage instantiates Page<ProductRef> — separate scalar set
        proves that two concrete instantiations coexist without name
        clashes in the Validate generator.
      properties:
        page:
          properties:
            cursor:
              type: string
            items:
              items:
                $ref: '#/components/schemas/ProductRef'
              type: array
            total:
              type: integer
          required:
          - items
          - total
          type: object
      required:
      - page
      type: object
    ProductRef:
      description: ProductRef exercises NonEmpty + Cents on a smaller surface.
      properties:
        price:
          $ref: '#/components/schemas/Cents'
        sku:
          $ref: '#/components/schemas/NonEmpty'
      required:
      - sku
      - price
      type: object
    Project:
      description: |-
        Project carries the cross-package `shared.ID` scalar (Go field
        type: `string`, validators inherited from the scalar decl) and
        the SAME-PACKAGE `UserRef` nested type — exercise of both the
        qualified and the bare type-reference paths in one DTO.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          minLength: 1
          type: string
        owner:
          $ref: '#/components/schemas/UserRef'
      required:
      - id
      - name
      - owner
      type: object
    ProjectsResp:
      description: |-
        ProjectsResp wraps a slice in an envelope so the response shape
        stays inside what `parseNamedTypeRef` accepts. The brick wall
        the original spec hit: `response Project[]` won't parse — the
        method body's `response` slot is a NamedTypeRef and never sees
        the array-suffix branch.
      properties:
        items:
          items:
            $ref: '#/components/schemas/Project'
          type: array
      required:
      - items
      type: object
    QueryArrayIntReq:
      description: |-
        QueryArrayIntReq drives the `[]int @query` shape. Each repeated
        value goes through strconv.ParseInt + append; one bad value fails
        the whole request with HTTP 400.
      properties:
        ids:
          items:
            type: integer
          nullable: true
          type: array
      type: object
    QueryArrayStringReq:
      description: |-
        QueryArrayStringReq exercises the `[]string @query` shape. The
        generator emits `req.Tags = r.URL.Query()["tags"]` — repeated
        `?tags=a&tags=b` lands as `["a", "b"]`. CSV (`?tags=a,b`) is NOT
        auto-split.
      properties:
        tags:
          items:
            type: string
          nullable: true
          type: array
      type: object
    QueryBoolReq:
      description: |-
        QueryBoolReq mirrors QueryIntReq — optional non-string primitives
        hit the same v1 limitation, so the bool variant is kept as a
        required field for now.
      properties:
        active:
          type: boolean
      required:
      - active
      type: object
    QueryEnumReq:
      description: |-
        QueryEnumReq drives the enum cast path through @query. Enums are
        string-shape on the wire, so optional is fine — the binder reads
        the raw string and casts up to the Color alias.
      properties:
        c:
          allOf:
          - $ref: '#/components/schemas/BindingsColor'
          nullable: true
      type: object
    QueryIntRequiredReq:
      description: |-
        QueryIntRequiredReq sidesteps the optional-numeric limitation: the
        caller MUST supply `page` or the binder fails with HTTP 400.
      properties:
        page:
          minimum: 1
          type: integer
      required:
      - page
      type: object
    QueryRequiredReq:
      description: |-
        QueryRequiredReq is the canonical "always required, capped" query
        param. Codegen emits the int parser with @gte / @lte gates so
        `?limit=0` and `?limit=101` are both rejected.
      properties:
        limit:
          maximum: 100
          minimum: 1
          type: integer
      required:
      - limit
      type: object
    QueryStringReq:
      description: |-
        QueryStringReq exercises the optional-string query path. The
        generator emits a nil-guarded pointer write because Go has a clean
        "absent vs empty" sentinel for `*string`.
      properties:
        q:
          nullable: true
          type: string
      type: object
    RateLimitExceededErr:
      description: TooManyRequests error response (HTTP 429).
      properties:
        retryAfter:
          type: integer
      type: object
    RecordNotFoundErr:
      description: NotFound error response (HTTP 404).
      type: object
    Room:
      description: |-
        Room owns a slice of Furniture. Two consecutive slice-of-nested
        fields in the chain (Home.rooms, Room.furniture) verify that
        each level scopes its own loop index.
      properties:
        furniture:
          items:
            $ref: '#/components/schemas/Furniture'
          type: array
      required:
      - furniture
      type: object
    ScalarsEmail:
      format: email
      maxLength: 254
      type: string
    ScalarsOrder:
      description: |-
        Order is the marquee type: six scalar-typed fields, all of which
        inherit format / bound / pattern validators from their respective
        scalar declarations. The Order's generated Validate() should fire
        the inherited checks WITHOUT any per-field decorator.
      properties:
        amount:
          $ref: '#/components/schemas/Cents'
        country:
          $ref: '#/components/schemas/ISO3'
        email:
          $ref: '#/components/schemas/ScalarsEmail'
        id:
          $ref: '#/components/schemas/ScalarsUUID'
        rate:
          $ref: '#/components/schemas/Percent'
        tag:
          $ref: '#/components/schemas/ScalarsTag'
      required:
      - id
      - email
      - amount
      - rate
      - tag
      - country
      type: object
    ScalarsTag:
      maxLength: 20
      minLength: 1
      pattern: ^[a-z-]+$
      type: string
    ScalarsUUID:
      format: uuid
      type: string
    Search:
      description: |-
        Search mixes OPTIONAL array-of-scalar with OPTIONAL scalar + default.
        The keywords field is `Tag[]?` so the wire may omit it entirely; when
        present every element runs Tag's @pattern check. The limit field
        uses a numeric scalar with @default — the default literal is parsed
        as the underlying primitive (int) and cast up to Cents.
      properties:
        keywords:
          items:
            $ref: '#/components/schemas/ScalarsTag'
          nullable: true
          type: array
        limit:
          allOf:
          - $ref: '#/components/schemas/Cents'
          default: 20
          nullable: true
      type: object
    SearchItemsReqQuery:
      properties:
        active:
          type: boolean
        cursor:
          nullable: true
          type: string
        ids:
          items:
            type: integer
          nullable: true
          type: array
        limit:
          maximum: 100
          minimum: 1
          type: integer
        sort:
          allOf:
          - $ref: '#/components/schemas/BindingsColor'
          nullable: true
      required:
      - limit
      - active
      type: object
    SearchItemsRespBody:
      $ref: '#/components/schemas/ItemList'
    SearchProductsReqBody:
      properties:
        keywords:
          items:
            $ref: '#/components/schemas/ScalarsTag'
          nullable: true
          type: array
        limit:
          allOf:
          - $ref: '#/components/schemas/Cents'
          default: 20
          nullable: true
      type: object
    SearchProductsRespBody:
      $ref: '#/components/schemas/ProductPage'
    SearchReq:
      description: |-
        SearchReq mixes every supported @query shape in one struct. Note
        that the optional cursor stays a `string?` (the v1 binder supports
        `*string`), but the optional sort uses an enum (string-shape on
        the wire, so the optional binder works just like for plain
        strings).
      properties:
        active:
          type: boolean
        cursor:
          nullable: true
          type: string
        ids:
          items:
            type: integer
          nullable: true
          type: array
        limit:
          maximum: 100
          minimum: 1
          type: integer
        sort:
          allOf:
          - $ref: '#/components/schemas/BindingsColor'
          nullable: true
      required:
      - limit
      - active
      type: object
    ServicesUser:
      allOf:
      - $ref: '#/components/schemas/Audit'
      - properties:
          email:
            $ref: '#/components/schemas/SharedEmail'
          id:
            $ref: '#/components/schemas/ID'
          name:
            minLength: 1
            type: string
        required:
        - id
        - email
        - name
        type: object
      description: |-
        User is the full entity. Embeds `shared.Audit` via the implicit
        CROSS-PACKAGE MIXIN form (`shared.Audit` alone on a body line is
        a mixin reference, not a field) so the createdAt / updatedAt /
        createdBy bookkeeping lands at the wire root without a nested
        envelope.
      type: object
    Severity:
      enum:
      - Info
      - Warning
      - Error
      - Critical
      type: string
    SharedEmail:
      format: email
      maxLength: 254
      type: string
    Str_Combos:
      description: |-
        Str_Combos stacks length + pattern + format on a single field so
        the generator's decorator-ordering / emit-order assumptions get
        exercised together. Each combo line carries every gate the
        canonical "email or short identifier" use cases require.
      properties:
        codeID:
          maxLength: 16
          minLength: 3
          pattern: ^[A-Z0-9_]+$
          type: string
        email1:
          format: email
          maxLength: 80
          minLength: 1
          pattern: ^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$
          type: string
        email2:
          format: email
          maxLength: 254
          minLength: 3
          type: string
      required:
      - email1
      - email2
      - codeID
      type: object
    Str_Default:
      description: |-
        Str_Default covers the @default + @length combination. The DSL
        grammar requires `?` on the type whenever @default is supplied;
        the generated Go field is `*string` and the missing-value path
        substitutes the pre-fill before validation.
      properties:
        greeting:
          default: hello
          maxLength: 100
          minLength: 1
          nullable: true
          type: string
      type: object
    Str_EchoReq:
      description: |-
        Str_EchoReq is the request body for the service's echo endpoint —
        it bundles a sample of each interesting validator shape so logic
        code receives a single struct with the full menu of constraints
        already enforced at the handler boundary.
      properties:
        bio:
          maxLength: 500
          nullable: true
          type: string
        code:
          pattern: ^[A-Z]{2,4}$
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        greeting:
          default: hello
          maxLength: 100
          minLength: 1
          nullable: true
          type: string
        name:
          maxLength: 80
          minLength: 1
          type: string
      required:
      - name
      - email
      - code
      type: object
    Str_EchoResp:
      description: |-
        Str_EchoResp echoes the request shape back. Identical validators
        — the response is just the request after a round-trip — so the
        generated wire contract is symmetric.
      properties:
        bio:
          maxLength: 500
          nullable: true
          type: string
        code:
          pattern: ^[A-Z]{2,4}$
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        greeting:
          maxLength: 100
          minLength: 1
          type: string
        name:
          maxLength: 80
          minLength: 1
          type: string
      required:
      - name
      - email
      - code
      - greeting
      type: object
    Str_Lengths:
      description: |-
        Str_Lengths probes the boundary forms of @length / @minLength /
        @maxLength. The interesting bits:

          - zeroLower: @length(0, 100) — the lower bound is zero, so any
            `len(x) < 0` check the generator emits would be dead code.
          - exact: @length(5, 5) — lo == hi, "exactly 5 chars".
          - separate min/max: @minLength(1) and @maxLength(100) on
            distinct fields to confirm the single-bound path.
      properties:
        exact:
          maxLength: 5
          minLength: 5
          type: string
        nonEmpty:
          maxLength: 100
          minLength: 1
          type: string
        onlyMax:
          maxLength: 100
          type: string
        onlyMin:
          minLength: 1
          type: string
        zeroLower:
          maxLength: 100
          type: string
      required:
      - zeroLower
      - nonEmpty
      - exact
      - onlyMin
      - onlyMax
      type: object
    Str_Nullable:
      description: |-
        Str_Nullable forces a pointer via @nullable on a non-optional
        field. The wire payload may omit the value (validators must skip)
        but the Go type lands as `*string`. Length cap still applies when
        the field is present.
      properties:
        tag:
          maxLength: 50
          nullable: true
          type: string
      required:
      - tag
      type: object
    Str_Optionals:
      description: |-
        Str_Optionals exercises the optional + validator combinations.
        Each field is `string?` so the generator MUST nil-guard before
        dereferencing. The interesting case is `pattOpt` — pattern against
        an optional should still emit the nil-guard prefix.
      properties:
        bothOpt:
          format: email
          maxLength: 80
          minLength: 1
          nullable: true
          type: string
        lenOpt:
          maxLength: 100
          minLength: 1
          nullable: true
          type: string
        mailOpt:
          format: email
          nullable: true
          type: string
        pattOpt:
          nullable: true
          pattern: ^[A-Z]{2,4}$
          type: string
      type: object
    Str_Patterns:
      description: |-
        Str_Patterns covers @pattern with Go regex syntax. Three flavours:

          - Plain anchors + quantifier: ^[A-Z]{2,4}$.
          - Escaped plus: ^\+?[0-9]+$ — the leading `\+` is a literal `+`,
            not a regex quantifier.
          - Numeric runs separated by literal `-`: \d{3}-\d{3}-\d{4}.
      properties:
        intlNum:
          pattern: ^\+?[0-9]+$
          type: string
        phoneUS:
          pattern: \d{3}-\d{3}-\d{4}
          type: string
        upper:
          pattern: ^[A-Z]{2,4}$
          type: string
      required:
      - upper
      - intlNum
      - phoneUS
      type: object
    Str_UTF8:
      description: |-
        Str_UTF8 carries @example values containing multi-byte UTF-8
        content so the OpenAPI emitter has to preserve them through YAML
        quoting. No runtime validator difference — the test is purely on
        the docs side.
      properties:
        jaName:
          example: 日本語
          maxLength: 80
          minLength: 1
          type: string
        vnName:
          example: tên người dùng
          maxLength: 80
          minLength: 1
          type: string
      required:
      - vnName
      - jaName
      type: object
    TagSliceReqBody:
      properties:
        tags:
          items:
            $ref: '#/components/schemas/CollectionsTag'
          maxItems: 10
          minItems: 1
          type: array
          uniqueItems: true
      required:
      - tags
      type: object
    TagSliceRespBody:
      $ref: '#/components/schemas/Arr_TagSlice'
    Team:
      description: |-
        Team gates `members` with both the array-level bound decorators
        (`@minItems`, `@maxItems`) AND per-element nested validation.
        Codegen produces:

          if len(v.Members) < 1 { ... }
          if len(v.Members) > 50 { ... }
          for i0 := range v.Members { v.Members[i0].Validate() }
      properties:
        members:
          items:
            $ref: '#/components/schemas/NestedUser'
          maxItems: 50
          minItems: 1
          type: array
      required:
      - members
      type: object
    URL:
      format: url
      type: string
    UnsignedReq:
      description: UnsignedReq wraps NumberUnsigned.
      properties:
        body:
          $ref: '#/components/schemas/NumberUnsigned'
      required:
      - body
      type: object
    UploadAvatarReqBody:
      properties:
        file:
          format: binary
          type: string
      required:
      - file
      type: object
    UploadAvatarReqPath:
      properties:
        id:
          maxLength: 64
          minLength: 1
          type: string
      required:
      - id
      type: object
    UploadAvatarRespBody:
      $ref: '#/components/schemas/UserAvatar'
    UploadReq:
      description: |-
        UploadReq pairs the path-bound id with the form-file upload. The
        id is auto-bound to the `{id}` segment of /users/{id}/avatar; the
        file rides the multipart body and runs @maxSize + @mimeTypes at
        validate time.
      properties:
        file:
          format: binary
          type: string
        id:
          maxLength: 64
          minLength: 1
          type: string
      required:
      - id
      - file
      type: object
    UserAvatar:
      description: |-
        UserAvatar is the UploadAvatar response. Carries the resolved URL
        where the freshly-uploaded blob can be fetched plus the storage
        key clients can pin for cache busting.
      properties:
        key:
          maxLength: 256
          minLength: 1
          type: string
        url:
          format: url
          maxLength: 2048
          type: string
      required:
      - url
      - key
      type: object
    UserRef:
      description: |-
        UserRef is the lightweight handle: id + email. Used as a BODY
        request (POST CreateUser, POST BanUser) and as the owner field
        of services.Project.

        NOTE: UserRef cannot ride a GET request unchanged. `email
        shared.Email` is a cross-package scalar; the query-bind path in
        `collectBindings` looks up scalar declarations in the current
        package only (`pkg.Scalars[declName]`) and falls through with
        `type shared.Email cannot bind to query`. The transport
        generator never resolves the scalar across the import edge —
        recorded as a bug in the report. The path-only GetUser uses the
        local-scalar `GetUserReq` below as a workaround.
      properties:
        email:
          $ref: '#/components/schemas/SharedEmail'
        id:
          $ref: '#/components/schemas/ID'
      required:
      - id
      - email
      type: object
    ValidateAllFormatsReqBody:
      properties:
        base64:
          format: base64
          maxLength: 8192
          type: string
        base64url:
          format: base64url
          maxLength: 8192
          type: string
        cidr:
          format: cidr
          maxLength: 43
          type: string
        creditcard:
          format: creditcard
          maxLength: 19
          minLength: 12
          type: string
        date:
          format: date
          maxLength: 10
          minLength: 10
          type: string
        datetime:
          format: datetime
          maxLength: 40
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        hexcolor:
          format: hexcolor
          maxLength: 7
          type: string
        hostname:
          format: hostname
          maxLength: 253
          type: string
        ipv4:
          format: ipv4
          maxLength: 15
          type: string
        ipv6:
          format: ipv6
          maxLength: 45
          type: string
        jsonField:
          format: json
          maxLength: 65536
          type: string
        mac:
          format: mac
          maxLength: 17
          type: string
        phone:
          format: phone
          maxLength: 20
          type: string
        timeField:
          format: time
          maxLength: 8
          minLength: 8
          type: string
        uri:
          format: uri
          maxLength: 2048
          type: string
        url:
          format: url
          maxLength: 2048
          type: string
        uuid:
          format: uuid
          maxLength: 36
          minLength: 36
          type: string
      required:
      - email
      - url
      - uri
      - uuid
      - datetime
      - date
      - timeField
      - phone
      - hostname
      - ipv4
      - ipv6
      - cidr
      - mac
      - creditcard
      - base64
      - base64url
      - hexcolor
      - jsonField
      type: object
    ValidateAllFormatsRespBody:
      $ref: '#/components/schemas/AllFormats'
    ValidateArrReqBody:
      properties:
        tags:
          items:
            type: string
          maxItems: 10
          minItems: 1
          type: array
          uniqueItems: true
      required:
      - tags
      type: object
    ValidateArrRespBody:
      $ref: '#/components/schemas/PairsArr'
    ValidateChoiceReqBody:
      properties:
        a:
          nullable: true
          type: string
        b:
          nullable: true
          type: string
        c:
          nullable: true
          type: string
      type: object
    ValidateChoiceRespBody:
      $ref: '#/components/schemas/PairsChoice'
    ValidateContactReqBody:
      properties:
        email:
          format: email
          nullable: true
          type: string
        phone:
          nullable: true
          pattern: ^\+\d+$
          type: string
      type: object
    ValidateContactRespBody:
      $ref: '#/components/schemas/PairsContact'
    ValidateNumReqBody:
      properties:
        score:
          exclusiveMinimum: true
          maximum: 99
          minimum: -1
          multipleOf: 5
          type: integer
      required:
      - score
      type: object
    ValidateNumRespBody:
      $ref: '#/components/schemas/PairsNum'
    ValidateStrReqBody:
      properties:
        email:
          format: email
          maxLength: 254
          minLength: 3
          pattern: ^.*@example\.com$
          type: string
      required:
      - email
      type: object
    ValidateStrRespBody:
      $ref: '#/components/schemas/PairsStr'
    Wrapped:
      description: |-
        Wrapped nests two generic instantiations: outer Page<…> over inner
        Envelope<Order>. Probes whether codegen handles a generic argument
        that is itself a generic instance.
      properties:
        results:
          properties:
            cursor:
              type: string
            items:
              items:
                properties:
                  data:
                    $ref: '#/components/schemas/ScalarsOrder'
                  meta:
                    type: string
                required:
                - data
                type: object
              type: array
            total:
              type: integer
          required:
          - items
          - total
          type: object
      required:
      - results
      type: object
info:
  title: Cornercase API
  version: 1.0.0
openapi: 3.1.0
paths:
  /:
    get:
      operationId: ListProjects
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectsRespBody'
          description: OK
        default:
          description: ""
      tags:
      - ProjectService
  /bindings/health:
    get:
      description: Health probe. No request, no response — just a 200 OK when the
        service is reachable, plus the rate-limit 429 envelope.
      operationId: Health
      responses:
        "204":
          description: No Content
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitExceededErr'
          description: TooManyRequests
        default:
          description: ""
      tags:
      - bindings
  /bindings/items:
    get:
      description: Search items. Demonstrates the full @query matrix — optional string
        cursor, required int limit, optional enum sort, repeated int ids, required
        bool active.
      operationId: SearchItems
      parameters:
      - in: query
        name: cursor
        schema:
          nullable: true
          type: string
      - in: query
        name: limit
        required: true
        schema:
          maximum: 100
          minimum: 1
          type: integer
      - in: query
        name: sort
        schema:
          allOf:
          - $ref: '#/components/schemas/BindingsColor'
          nullable: true
      - in: query
        name: ids
        schema:
          items:
            type: integer
          nullable: true
          type: array
      - in: query
        name: active
        required: true
        schema:
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchItemsRespBody'
          description: OK
        default:
          description: ""
      tags:
      - bindings
    post:
      description: Create a new item. Surfaces DuplicateKey (409) on unique-constraint
        conflict and InvalidInput (400) on validation failure.
      operationId: AddItem
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddItemRespBody'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidInputErr'
          description: BadRequest
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateKeyErr'
          description: Conflict
        default:
          description: ""
      tags:
      - bindings
  /bindings/items/{id}:
    delete:
      description: Delete an item. Idempotent. Surfaces RecordNotFound (404) for unknown
        ids and AccessDenied (403) when the caller lacks permission.
      operationId: DeleteItem
      parameters:
      - in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/BindingsUUID'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteItemRespBody'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedErr'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordNotFoundErr'
          description: NotFound
        default:
          description: ""
      tags:
      - bindings
    get:
      description: Fetch one item by id. The path placeholder lands as the UUID scalar
        alias; the inherited @format(uuid) validator rejects malformed ids at the
        boundary.
      operationId: GetItem
      parameters:
      - in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/BindingsUUID'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetItemRespBody'
          description: OK
        default:
          description: ""
      tags:
      - bindings
  /bindings/users/{id}/avatar:
    post:
      description: Upload a user avatar. Demonstrates the path + multipart-form combo
        — id from /users/{id}/avatar, file via multipart/form-data with @maxSize +
        @mimeTypes validation.
      operationId: UploadAvatar
      parameters:
      - in: path
        name: id
        required: true
        schema:
          maxLength: 64
          minLength: 1
          type: string
      requestBody:
        content:
          multipart/form-data:
            encoding:
              file:
                contentType: image/png, image/jpeg
            schema:
              properties:
                file:
                  format: binary
                  type: string
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadAvatarRespBody'
          description: OK
        default:
          description: ""
      tags:
      - bindings
  /collections/array-bounds:
    post:
      description: |-
        ArrayBounds echoes the canonical @minItems + @maxItems +
        @uniqueItems combo from Arr_BoundsBasic.
      operationId: ArrayBounds
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArrayBoundsReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArrayBoundsRespBody'
          description: OK
        default:
          description: ""
      tags:
      - collections
  /collections/map-key-value:
    post:
      description: MapKeyValue is the scalar-on-both-sides map case.
      operationId: MapKeyValue
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapKeyValueReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapKeyValueRespBody'
          description: OK
        default:
          description: ""
      tags:
      - collections
  /collections/map-struct:
    post:
      description: |-
        MapStruct exposes the struct-valued map so the generated
        validate.go for Map_StructValue is visible in the e2e
        snapshot.
      operationId: MapStruct
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapStructReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapStructRespBody'
          description: OK
        default:
          description: ""
      tags:
      - collections
  /collections/multi-dim:
    post:
      description: |-
        MultiDim drives a 2D array of scalars through the request
        body so the doubly-nested loop emits on the wire boundary.
      operationId: MultiDim
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiDimReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiDimRespBody'
          description: OK
        default:
          description: ""
      tags:
      - collections
  /collections/tag-slice:
    post:
      description: |-
        TagSlice exercises the scalar-array case — per-element Tag
        validators (minLength + maxLength + pattern) fire on every
        element via the scalar-leaves walk.
      operationId: TagSlice
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagSliceReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagSliceRespBody'
          description: OK
        default:
          description: ""
      tags:
      - collections
  /combine/defaults/boundary:
    post:
      description: Echo the boundary-default matrix. Smoke tests assert that the pre-fill
        happens before req.Validate() so the defaulted values land in the response.
      operationId: EchoBoundary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoBoundaryReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoBoundaryRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /combine/defaults/collection:
    post:
      description: Echo the array / map default shapes. The map<,>?-with-object-default
        field is expected to be rejected at codegen time.
      operationId: EchoCollection
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoCollectionReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoCollectionRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /combine/defaults/conflict:
    post:
      description: Echo the deliberate default-vs-validator clash. The empty-string
        default would fail @minLength(1) — if codegen accepts the design, the handler
        will reject the pre-filled value.
      operationId: EchoConflict
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoConflictReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoConflictRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /combine/defaults/enum:
    post:
      description: Echo the enum default. Missing c on the wire results in c=Red after
        pre-fill.
      operationId: EchoEnum
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoEnumReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoEnumRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /combine/defaults/scalar:
    post:
      description: Echo the scalar default. Missing size on the wire results in size=20
        after pre-fill, and the scalar's @gte/@lte bounds still apply.
      operationId: EchoScalar
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoScalarReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoScalarRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /combine/pairs/arr:
    post:
      description: Validate stacked array decorators (minItems + maxItems + uniqueItems
        + each(@length)). Outer bounds plus per-element check.
      operationId: ValidateArr
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateArrReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateArrRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /combine/pairs/choice:
    post:
      description: Validate orthogonal @mutuallyExclusive + @requiresOneOf. Sending
        only c is valid; sending a+b fails exclusivity; sending nothing fails the
        one-of.
      operationId: ValidateChoice
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateChoiceReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateChoiceRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /combine/pairs/contact:
    post:
      description: Validate per-field decorators under a type-level @requiresOneOf.
        Sending neither field fails the cross-field check; sending one passes.
      operationId: ValidateContact
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateContactReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateContactRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /combine/pairs/num:
    post:
      description: Validate stacked numeric decorators (range + multipleOf + gt +
        lte). All four fire in declaration order.
      operationId: ValidateNum
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateNumReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateNumRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /combine/pairs/str:
    post:
      description: Validate stacked string decorators (length + format + pattern).
        The handler fails any of the three independently.
      operationId: ValidateStr
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateStrReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateStrRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /combine/presence:
    post:
      description: 'Echo the presence-state matrix. Smoke tests assert that plain
        is in required[], optional / nullable / bothNullable produce nullable: true,
        and the default rows surface a default key in OpenAPI.'
      operationId: EchoPresence
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoPresenceReqBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoPresenceRespBody'
          description: OK
        default:
          description: ""
      tags:
      - combine
  /nested/a:
    post:
      description: Mutual recursion entry - request A traverses A → B → A → ...
      operationId: EchoA
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoAReqBody'
        required: true
