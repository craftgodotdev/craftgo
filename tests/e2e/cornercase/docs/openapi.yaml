        int8Full:
          description: int8 full range
          maximum: 127
          minimum: -128
          type: integer
        int8Range:
          maximum: 127
          minimum: -128
          type: integer
        int16Full:
          description: int16 full range
          maximum: 32767
          minimum: -32768
          type: integer
        int32Full:
          description: int32 full range
          maximum: 2147483647
          minimum: -2147483648
          type: integer
        uint8Full:
          maximum: 255
          minimum: 0
