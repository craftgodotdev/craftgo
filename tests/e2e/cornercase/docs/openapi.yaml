    PaginatedResp:
      description: |-
        PaginatedResp carries a JSON list plus response-only fields:
        `X-Total-Count` advertises the total (a non-string int, formatted via
        strconv.Itoa), `X-Next-Page` is an optional header (nil-guarded so an
        absent value writes no header at all), `has_more` is a bool cookie
        (strconv.FormatBool), and the `session` cookie refreshes the auth
        token without a separate /refresh round trip. All four stay out of
        the JSON body via the runtime header/cookie writers.
      properties:
        items:
          items:
            $ref: '#/components/schemas/ID'
          type: array
      required:
      - items
      type: object
    Pagination:
      description: |-
        Pagination is the canonical cursor/limit envelope every list
        endpoint embeds. `limit` carries the standard 1..100 cap with a
        pre-fill of 20 when the caller omits it; `cursor` is the opaque
        continuation token returned by the previous page; `total` is the
        optional total-count summary (omitted when the upstream store can
        not cheaply compute it).

        Consumers embed this DTO via the implicit mixin form
        (`type ListUsersReq { shared.Pagination  query string? }`) so the
        pagination contract stays identical across services without copy-
        paste.
      properties:
        cursor:
          type:
          - string
          - "null"
        limit:
          default: 20
          maximum: 100
          minimum: 1
          type:
          - integer
          - "null"
        total:
          type:
          - integer
          - "null"
      type: object
