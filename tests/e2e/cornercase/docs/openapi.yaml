    NumberCounter:
      description: |-
        NumberCounter exercises every standard int* signed type with all
        three pair flavours: @range (inclusive both), @gte/@lte (inclusive
        both), @gt/@lt (strict both). Also adds @positive, @negative, and
        @multipleOf on int to cover the marquee combinations.
      properties:
        gtLtInt:
          exclusiveMaximum: 1000
          exclusiveMinimum: 0
          type: integer
        gtLtInt8:
          exclusiveMaximum: 100
          exclusiveMinimum: -100
          type: integer
        gtLtInt16:
          exclusiveMaximum: 32000
          exclusiveMinimum: -32000
          type: integer
        gtLtInt32:
          exclusiveMaximum: 2147483647
          exclusiveMinimum: -2147483648
          type: integer
        gtLtInt64:
          exclusiveMaximum: 1000000000000
          exclusiveMinimum: 0
          type: integer
        gteLteInt:
          maximum: 1000
          minimum: 0
          type: integer
        gteLteInt8:
          maximum: 100
          minimum: -100
          type: integer
        gteLteInt16:
          maximum: 32000
          minimum: -32000
          type: integer
        gteLteInt32:
          maximum: 2147483647
          minimum: 0
          type: integer
        gteLteInt64:
          maximum: 9000000000000000000
          minimum: -9000000000000000000
          type: integer
        negInt:
          exclusiveMaximum: 0
          type: integer
        posInt:
          description: '@positive / @negative — flag decorators (no parens).'
          exclusiveMinimum: 0
          type: integer
        posInt64:
          exclusiveMinimum: 0
          type: integer
        rangeInt:
          description: |-
            int — defaults to the platform's native word width but the
            semantic capacity check treats it as int64 for portability.
          maximum: 1000
          minimum: 0
          type: integer
        rangeInt8:
          description: int8 — bound capacity edge (the validator should narrow safely).
          maximum: 50
          minimum: -50
          type: integer
        rangeInt16:
          description: int16
          maximum: 1000
          minimum: -1000
          type: integer
        rangeInt32:
          description: int32 — tests MaxInt32-ish boundaries.
          maximum: 2000000000
          minimum: -2000000000
          type: integer
        rangeInt64:
          description: int64 — the widest signed.
          maximum: 1000000000
          minimum: -1000000000
          type: integer
        stepInt:
          description: '@multipleOf on int.'
          multipleOf: 5
          type: integer
        stepInt64:
          multipleOf: 100
          type: integer
      required:
      - rangeInt
      - gteLteInt
      - gtLtInt
      - rangeInt8
      - gteLteInt8
      - gtLtInt8
      - rangeInt16
      - gteLteInt16
      - gtLtInt16
      - rangeInt32
      - gteLteInt32
      - gtLtInt32
      - rangeInt64
      - gteLteInt64
      - gtLtInt64
      - posInt
      - negInt
      - posInt64
      - stepInt
      - stepInt64
