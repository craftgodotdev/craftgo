        closed-form pair; only the strict variants on equal endpoints
        (e.g. @gt(5) @lt(5)) emit empty-range diagnostics.
      properties:
        exactly0:
          description: Only value = 0
          maximum: 0
          minimum: 0
          type: integer
        exactly5:
          description: Only value = 5 is accepted.
          maximum: 5
          minimum: 5
          type: integer
        exactlyHalf:
          description: Only value = 0.5
          maximum: 0.5
          minimum: 0.5
          type: number
      required:
      - exactly5
      - exactly0
      - exactlyHalf
      type: object
    NumberMixed:
      description: NumberMixed exercises mixed strict/inclusive pair combinations.
      properties:
        floatGtLte:
          description: Asymmetric float
          exclusiveMinimum: 0
          maximum: 1
          type: number
        gtLte:
          description: strict-lower + inclusive-upper
          exclusiveMinimum: 0
          maximum: 100
          type: integer
        gteLt:
          description: inclusive-lower + strict-upper
          exclusiveMaximum: 100
          minimum: 0
          type: integer
        negRange:
          description: All-negative inclusive range — only negative values accepted.
          maximum: -1
          minimum: -100
          type: integer
        negStrict:
          description: All-negative strict range.
          exclusiveMaximum: -1
          exclusiveMinimum: -100
          type: integer
