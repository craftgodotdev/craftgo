          - "null"
        items:
          items:
            type: string
          type: array
        total:
          type: integer
      required:
      - items
      - total
      type: object
    PageSize:
      maximum: 100
      minimum: 1
      type: integer
    PageWithAuditOfScalarsOrder:
      allOf:
      - $ref: '#/components/schemas/AuditFields'
      - properties:
