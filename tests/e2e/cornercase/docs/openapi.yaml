        uint8Range:
          description: uint8 full range
          maximum: 255
          minimum: 0
          type: integer
        uint16Full:
          description: uint16 full range
          maximum: 65535
          minimum: 0
          type: integer
        uint32Full:
          description: uint32 full range
          maximum: 4294967295
          minimum: 0
          type: integer
      required:
      - int8Full
