        gteLteF32:
          maximum: 1.5
          minimum: 0.5
          type: number
        gteLteF64:
          maximum: 1.5
          minimum: -1.5
          type: number
        negFloat:
          exclusiveMaximum: 0
          type: number
        posF32:
          exclusiveMinimum: 0
          type: number
        posFloat:
