          minimum: 0
          type: integer
        rangeUint64:
          description: uint64 — even bigger.
          maximum: 1000000000000
          minimum: 0
          type: integer
      required:
      - rangeUint
      - gteLteUint
      - gtLtUint
      - rangeUint8
      - gteLteUint8
      - gtLtUint8
      - rangeUint16
      - gteLteUint16
      - gtLtUint16
      - rangeUint32
      - gteLteUint32
      - gtLtUint32
      - rangeUint64
      - gteLteUint64
      - gtLtUint64
      - posUint
