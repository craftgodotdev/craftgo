output:
  types:      ./internal/types
  transport:  ./internal/transport
  routes:     ./internal/routes
  service:    ./internal/service
  svccontext: ./svccontext/svccontext.go
  openapi:    ./docs/openapi.yaml
  main:       "-"
openapi:
  title:    Cornercase API
  version:  1.0.0
  basePath: /api
  securitySchemes:
    AdminBearer:
      type: http
      scheme: bearer
      description: Admin-tier bearer token used by extend-service inheritance fixture.
    AdminWriteScope:
      type: http
      scheme: bearer
      description: Write-scope override applied at the method level on top of AdminBearer.
